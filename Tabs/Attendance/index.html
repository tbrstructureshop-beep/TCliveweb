<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --panel: #151921; --border: rgba(255, 255, 255, 0.1); --accent: #0ea5e9; 
            --text-main: #94a3b8; --text-bold: #ffffff; --input-bg: rgba(255, 255, 255, 0.05);
        }
        .light {
            --bg: transparent; --panel: #ffffff; --border: #e2e8f0; --accent: #0284c7; 
            --text-main: #475569; --text-bold: #1e293b; --input-bg: #f8fafc;
        }
        body { background: transparent; color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; transition: all 0.3s ease; }
        .text-white, h1, h2, h3, h4 { color: var(--text-bold) !important; }
        
        /* Navigation */
        .unit-nav-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; }
        .unit-nav { display: flex; gap: 0.4rem; padding: 0.4rem; background: rgba(0,0,0,0.2); border-radius: 1rem; border: 1px solid var(--border); overflow-x: auto; flex: 1; scroll-behavior: smooth; }
        .unit-nav::-webkit-scrollbar { display: none; }
        .unit-tab { padding: 0.5rem 1rem; border-radius: 0.75rem; font-size: 10px; font-weight: 800; white-space: nowrap; transition: 0.3s; color: var(--text-main); border: 1px solid transparent; }
        .unit-tab.active { background: var(--accent); color: white !important; }
        .nav-arrow { background: var(--panel); border: 1px solid var(--border); border-radius: 50%; width: 28px; height: 28px; display: flex; items-center; justify-content: center; color: var(--accent); cursor: pointer; }

        /* Card Metrics */
        .attendance-card { background-color: var(--panel) !important; border: 1px solid var(--border) !important; border-radius: 1.5rem; padding: 1.25rem; margin-bottom: 1rem; }
        .metric-ribbon { display: flex; align-items: center; gap: 1rem; background: rgba(0,0,0,0.2); padding: 0.6rem 1rem; border-radius: 1rem; margin-bottom: 1rem; border: 1px solid var(--border); overflow-x: auto; }
        .metric-item { display: flex; align-items: center; gap: 0.4rem; white-space: nowrap; }
        .metric-val { font-weight: 900; color: var(--text-bold); font-size: 0.9rem; }
        .metric-lab { font-size: 7px; font-weight: 800; text-transform: uppercase; opacity: 0.4; }

        /* Tabs */
        .card-tabs { display: flex; gap: 0.2rem; background: var(--input-bg); padding: 0.2rem; border-radius: 0.6rem; margin-bottom: 0.75rem; width: fit-content; }
        .c-tab { padding: 0.3rem 0.7rem; border-radius: 0.4rem; font-size: 8px; font-weight: 900; text-transform: uppercase; transition: 0.2s; color: var(--text-main); opacity: 0.5; }
        .c-tab.active { background: var(--panel); color: var(--accent) !important; opacity: 1; }

        /* Detail Items */
        .detail-item { background: var(--input-bg); border: 1px solid var(--border); border-radius: 0.75rem; padding: 0.6rem; margin-bottom: 0.4rem; }
        .input-field { width: 100%; background: var(--input-bg) !important; border: 1px solid var(--border) !important; color: var(--text-bold) !important; border-radius: 0.5rem; padding: 0.6rem; font-size: 13px; outline: none; }
        
        select option { background-color: #ffffff !important; color: #1e293b !important; }
        :not(.light) select option { background-color: #151921 !important; color: #ffffff !important; }

        #local-loader { display: none; position: fixed; inset: 0; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .label-style { text-transform: uppercase; font-size: 9px; font-weight: 800; opacity: 0.4; margin-bottom: 0.2rem; display: block; color: var(--text-main); }
    </style>
</head>
<body class="p-4 md:p-6">

    <div id="local-loader">
        <div class="w-10 h-10 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin mb-2"></div>
        <span class="text-[9px] font-mono text-sky-500 font-bold uppercase">Syncing_Records...</span>
    </div>

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-black text-white uppercase tracking-tighter">Attendance Log</h1>
            <p class="text-[9px] opacity-40 font-mono uppercase">Operational Force Dashboard</p>
        </div>
        <button onclick="openModal()" class="bg-sky-600 hover:bg-sky-500 text-white px-4 py-2 rounded-lg font-bold text-[10px] uppercase transition-all active:scale-95">
            <i data-lucide="plus" class="inline-block mr-1" size="12"></i> Log Entry
        </button>
    </div>

    <div class="unit-nav-wrapper">
        <button onclick="scrollNav(-100)" class="nav-arrow"><i data-lucide="chevron-left" size="14"></i></button>
        <div id="unit-tabs" class="unit-nav"></div>
        <button onclick="scrollNav(100)" class="nav-arrow"><i data-lucide="chevron-right" size="14"></i></button>
    </div>

    <div id="main-content"></div>

    <!-- MODAL -->
    <div id="attend-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[2rem] w-full max-w-5xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-5 border-b border-white/5 flex justify-between items-center">
                <h3 id="modal-title" class="text-lg font-bold text-white uppercase">Attendance Registry</h3>
                <button onclick="closeModal()" class="p-2 text-white/30 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <form id="attend-form" class="p-6 overflow-y-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Column 1: Core Info -->
                <div class="space-y-4">
                    <div class="grid grid-cols-1 gap-3">
                        <div><label class="label-style">Unit Code</label><select id="UnitCode" name="UnitCode" required class="input-field" onchange="updateShiftDropdown()"></select></div>
                        <div><label class="label-style">Shift Category</label><select id="ShiftCategory" name="ShiftCategory" required class="input-field" onchange="syncManpowerFromShift()"></select></div>
                    </div>
                    <div class="p-4 bg-white/5 rounded-xl border border-white/5 grid grid-cols-2 gap-4">
                        <div><span class="label-style">Manpower</span><span id="total-personnel" class="text-xl font-black text-white">0</span></div>
                        <div class="text-right"><span class="label-style">Availability</span><span id="availability-pct" class="text-xl font-black text-emerald-400">0%</span></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="label-style">Hadir</label><input type="number" id="Hadir" name="Hadir" required class="input-field text-center font-bold" oninput="doCalculations()"></div>
                        <div><label class="label-style">Absen</label><input type="number" id="Absen" name="Absen" readonly class="input-field text-center opacity-40"></div>
                    </div>
                    <div><label class="label-style">Utilize (<span id="util-val">50</span>%)</label><input type="range" id="Utilization" name="Utilization" min="0" max="100" value="50" oninput="document.getElementById('util-val').innerText = this.value"></div>
                    <div><label class="label-style">Highlight Note</label><textarea id="HighlightManpower" name="HighlightManpower" class="input-field h-24 resize-none" placeholder="Enter notes..."></textarea></div>
                </div>

                <!-- Column 2: Absence & Inspectors -->
                <div class="space-y-6">
                    <div>
                        <label class="label-style">Absence Detail</label>
                        <div class="space-y-2 mb-2">
                            <input id="abs-name" class="input-field" placeholder="Full Name">
                            <div class="flex gap-2">
                                <select id="abs-status" class="input-field flex-1"><option>Sick</option><option>Leave</option><option>Work Outside</option><option>Training</option><option>Other</option></select>
                                <button type="button" onclick="addItem('abs')" class="bg-sky-600 px-4 rounded-lg text-white font-bold text-xs">ADD</button>
                            </div>
                            <input id="abs-note" class="input-field" placeholder="Remark / Reason">
                        </div>
                        <div id="list-abs" class="max-h-32 overflow-y-auto space-y-1"></div>
                    </div>
                    <div>
                        <label class="label-style">Inspector Detail</label>
                        <div class="flex gap-2 mb-2"><input id="insp-name" class="input-field" placeholder="Name"><input id="insp-task" class="input-field" placeholder="Job"><button type="button" onclick="addItem('insp')" class="bg-sky-600 px-4 rounded-lg text-white font-bold text-xs">ADD</button></div>
                        <div id="list-insp" class="max-h-32 overflow-y-auto space-y-1"></div>
                    </div>
                </div>

                <!-- Column 3: Advanced Overtime -->
                <div class="space-y-6">
                    <div>
                        <label class="label-style text-sky-400">Overtime Details</label>
                        <div class="bg-white/5 p-3 rounded-xl border border-white/5 space-y-2 mb-2">
                            <input id="ot-name" class="input-field" placeholder="Person Name">
                            <div class="grid grid-cols-2 gap-2">
                                <div><label class="label-style !text-[7px]">Start</label><input id="ot-start" type="datetime-local" class="input-field !p-1.5 text-[10px]"></div>
                                <div><label class="label-style !text-[7px]">End</label><input id="ot-end" type="datetime-local" class="input-field !p-1.5 text-[10px]"></div>
                            </div>
                            <input id="ot-task" class="input-field" placeholder="Job Description">
                            <div class="flex items-center gap-2 px-1">
                                <input type="checkbox" id="ot-myhc" class="w-4 h-4 accent-sky-500">
                                <label for="ot-myhc" class="text-[10px] font-bold uppercase opacity-60">Submitted MyHC</label>
                            </div>
                            <button type="button" onclick="addItem('ot')" class="w-full bg-sky-600 py-2 rounded-lg text-white font-bold text-[10px] uppercase">Add OVT Request</button>
                        </div>
                        <div id="list-ot" class="max-h-48 overflow-y-auto space-y-1"></div>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-white hover:bg-emerald-500 uppercase tracking-widest text-[10px]">Commit Records</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        let allShifts = [], masterData = [], activeUnit = null, editId = null;
        let listAbs = [], listInsp = [], listOt = [];

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, shiftRes, attendRes] = await Promise.all([API.get('UNIT'), API.get('SHIFTS'), API.get('ATTENDANCE')]);
                allShifts = shiftRes.data || [];
                masterData = attendRes.data || [];
                document.getElementById('UnitCode').innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderTabs(unitRes.data);
                if(!activeUnit && unitRes.data.length > 0) activeUnit = unitRes.data[0].UnitCode;
                renderView();
            } catch (e) { console.error(e); } finally { loader.style.display = 'none'; }
        }

        function renderTabs(units) { document.getElementById('unit-tabs').innerHTML = units.map(u => `<button onclick="switchUnit('${u.UnitCode}')" class="unit-tab ${u.UnitCode === activeUnit ? 'active' : ''}">${u.UnitCode}</button>`).join(''); }
        function scrollNav(amt) { document.getElementById('unit-tabs').scrollLeft += amt; }
        function switchUnit(uCode) { activeUnit = uCode; document.querySelectorAll('.unit-tab').forEach(t => t.classList.toggle('active', t.innerText === uCode)); renderView(); }

        function renderView() {
            const container = document.getElementById('main-content');
            const items = masterData.filter(i => i.UnitCode === activeUnit).reverse();
            if(!activeUnit) { container.innerHTML = `<div class="py-20 text-center opacity-20 font-mono uppercase">No_Node_Selected</div>`; return; }

            container.innerHTML = items.map((item, idx) => {
                const id = `at-${idx}`;
                return `
                <div class="attendance-card">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <span class="bg-sky-500/10 text-sky-400 px-2 py-1 rounded text-[9px] font-black border border-sky-500/20 uppercase">${item.ShiftCategory}</span>
                            <span class="opacity-20 font-mono text-[9px]">${item.Timestamp}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick='editAttend(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="text-sky-500/40 hover:text-sky-400"><i data-lucide="edit-3" size="14"></i></button>
                            <button onclick="deleteAttend('${item.Timestamp}')" class="text-red-500/30 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                        </div>
                    </div>

                    <div class="metric-ribbon no-scrollbar">
                        <div class="metric-item"><span class="metric-lab">Hadir:</span><span class="metric-val">${item.Hadir}</span></div>
                        <div class="metric-item"><span class="metric-lab text-red-500/50">Absen:</span><span class="metric-val text-red-500">${item.Absen}</span></div>
                        <div class="metric-item border-l border-white/5 pl-3"><span class="metric-lab">Avail:</span><span class="metric-val text-emerald-400">${item.Availability}%</span></div>
                        <div class="metric-item"><span class="metric-lab">Util:</span><span class="metric-val text-sky-400">${item.Utilization}%</span></div>
                        <div class="metric-item border-l border-white/5 pl-3"><span class="metric-lab">Inspectors:</span><span class="metric-val">${item.InspectorNo || 0}</span></div>
                    </div>

                    <div class="card-tabs">
                        <button onclick="switchCardTab('${id}', 'info')" class="c-tab active" id="tab-${id}-info">Overview</button>
                        <button onclick="switchCardTab('${id}', 'abs')" class="c-tab" id="tab-${id}-abs">Absence</button>
                        <button onclick="switchCardTab('${id}', 'insp')" class="c-tab" id="tab-${id}-insp">Inspectors</button>
                        <button onclick="switchCardTab('${id}', 'ot')" class="c-tab" id="tab-${id}-ot">Overtime</button>
                    </div>

                    <div id="content-${id}" class="animate-in fade-in duration-300">
                        ${renderCardInfo(item)}
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function renderCardInfo(item) { return `<div class="p-3 bg-white/5 rounded-xl border border-white/5"><span class="label-style !text-[7px]">Log Highlights</span><p class="text-xs italic opacity-60 leading-relaxed">${item.HighlightManpower || 'No major highlights.'}</p></div>`; }
        
        function renderCardList(jsonStr, type) {
            try {
                const data = JSON.parse(jsonStr || '[]');
                if(!data.length) return `<div class="py-6 text-center opacity-10 text-[9px] font-mono uppercase">NO_RECORDS</div>`;
                return data.map(i => {
                    if(type === 'ot') return `<div class="detail-item"><div class="flex justify-between items-start mb-1"><span class="text-[10px] font-black text-white">${i.name}</span><span class="px-1.5 py-0.5 rounded text-[7px] font-bold ${i.myhc ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}">${i.myhc ? 'MYHC SUBMITTED' : 'NOT SUBMITTED'}</span></div><p class="text-[9px] opacity-40 mb-1 font-mono">${i.start.replace('T',' ')} ➔ ${i.end.split('T')[1]}</p><p class="text-[9px] text-sky-500 italic uppercase font-bold">Task: ${i.job}</p></div>`;
                    if(type === 'abs') return `<div class="detail-item"><div class="flex justify-between items-center"><span class="text-[10px] font-bold text-white">${i.name}</span><span class="text-[8px] font-black px-2 py-0.5 bg-white/5 rounded border border-white/5 uppercase text-red-400">${i.status}</span></div><p class="text-[9px] opacity-40 mt-1 italic">${i.note || 'No notes.'}</p></div>`;
                    return `<div class="detail-item flex justify-between items-center"><span class="text-[10px] font-bold text-white">${i.name}</span><span class="text-[9px] font-mono opacity-40 uppercase">${i.job}</span></div>`;
                }).join('');
            } catch(e) { return 'Parse Error'; }
        }

        function switchCardTab(cardId, type) {
            const itemIdx = cardId.split('-')[1];
            const item = masterData.filter(i => i.UnitCode === activeUnit).reverse()[itemIdx];
            const content = document.getElementById(`content-${cardId}`);
            if(type === 'info') content.innerHTML = renderCardInfo(item);
            else if(type === 'abs') content.innerHTML = renderCardList(item.DetailAbsen, 'abs');
            else if(type === 'insp') content.innerHTML = renderCardList(item.DetailInspectorName, 'insp');
            else if(type === 'ot') content.innerHTML = renderCardList(item.PermintaanOvertime, 'ot');
            document.querySelectorAll(`#tab-${cardId}-info, #tab-${cardId}-abs, #tab-${cardId}-insp, #tab-${cardId}-ot`).forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${cardId}-${type}`).classList.add('active');
        }

        // --- FORM ENGINE ---
        function openModal() {
            editId = null; document.getElementById('attend-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = "Attendance Registry";
            document.getElementById('attend-form').reset();
            listAbs=[]; listInsp=[]; listOt=[]; renderAllLists(); updateShiftDropdown();
        }

        function editAttend(item) {
            editId = item.Timestamp; document.getElementById('attend-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = "Update Registry Entry";
            document.getElementById('UnitCode').value = item.UnitCode; updateShiftDropdown();
            document.getElementById('ShiftCategory').value = item.ShiftCategory;
            document.getElementById('Hadir').value = item.Hadir;
            document.getElementById('HighlightManpower').value = item.HighlightManpower;
            document.getElementById('Utilization').value = item.Utilization;
            document.getElementById('util-val').innerText = item.Utilization;
            listAbs = JSON.parse(item.DetailAbsen || '[]'); listInsp = JSON.parse(item.DetailInspectorName || '[]'); listOt = JSON.parse(item.PermintaanOvertime || '[]');
            syncManpowerFromShift(); renderAllLists();
        }

        function addItem(type) {
            if(type === 'abs') { 
                const n = document.getElementById('abs-name').value; 
                const note = document.getElementById('abs-note').value;
                if(!n) return; 
                listAbs.push({name: n, status: document.getElementById('abs-status').value, note: note}); 
                document.getElementById('abs-name').value=''; document.getElementById('abs-note').value='';
            }
            if(type === 'insp') { 
                const n = document.getElementById('insp-name').value; 
                if(!n) return; 
                listInsp.push({name: n, job: document.getElementById('insp-task').value}); 
                document.getElementById('insp-name').value=''; document.getElementById('insp-task').value='';
            }
            if(type === 'ot') { 
                const n = document.getElementById('ot-name').value;
                const start = document.getElementById('ot-start').value;
                const end = document.getElementById('ot-end').value;
                const task = document.getElementById('ot-task').value;
                const myhc = document.getElementById('ot-myhc').checked;
                if(!n || !start || !end) return; 
                listOt.push({name: n, start: start, end: end, job: task, myhc: myhc}); 
                document.getElementById('ot-name').value=''; document.getElementById('ot-task').value=''; document.getElementById('ot-myhc').checked = false;
            }
            renderAllLists();
        }

        function removeItem(type, idx) {
            if(type === 'abs') listAbs.splice(idx, 1); if(type === 'insp') listInsp.splice(idx, 1); if(type === 'ot') listOt.splice(idx, 1);
            renderAllLists();
        }

        function renderAllLists() {
            const render = (cid, data, type) => {
                document.getElementById(cid).innerHTML = data.map((item, i) => `
                    <div class="detail-item !py-2 !px-3 flex justify-between items-center">
                        <span class="text-[9px] font-bold text-white">${item.name} <span class="opacity-30">(${item.status || item.job})</span></span>
                        <button type="button" onclick="removeItem('${type}', ${i})" class="text-red-500/40 hover:text-red-500"><i data-lucide="x" size="10"></i></button>
                    </div>`).join('');
                lucide.createIcons();
            };
            render('list-abs', listAbs, 'abs'); render('list-insp', listInsp, 'insp'); render('list-ot', listOt, 'ot');
        }

        // --- CALC ENGINE ---
        function updateShiftDropdown() {
            const uCode = document.getElementById('UnitCode').value;
            const available = allShifts.filter(s => s.UnitCode === uCode);
            document.getElementById('ShiftCategory').innerHTML = available.length 
                ? available.map(s => `<option value="${s.ShiftCategory}">${s.ShiftCategory}</option>`).join('')
                : '<option disabled>No Shifts</option>';
            syncManpowerFromShift();
        }

        function syncManpowerFromShift() {
            const unit = document.getElementById('UnitCode').value;
            const cat = document.getElementById('ShiftCategory').value;
            const match = allShifts.find(s => s.UnitCode === unit && s.ShiftCategory === cat);
            document.getElementById('total-personnel').innerText = match ? match.TotalManpower : '0';
            doCalculations();
        }

        function doCalculations() {
            const total = parseInt(document.getElementById('total-personnel').innerText) || 0;
            const hadir = parseInt(document.getElementById('Hadir').value) || 0;
            document.getElementById('Absen').value = Math.max(0, total - hadir);
            document.getElementById('availability-pct').innerText = total > 0 ? ((hadir / total) * 100).toFixed(1) + '%' : '0%';
        }

        document.getElementById('attend-form').onsubmit = async (e) => {
            e.preventDefault();
            loader.style.display = 'flex';
            const formData = new FormData(e.target);
            const payload = {
                tab: 'ATTENDANCE', action: editId ? 'update' : 'add',
                primaryId: editId || formData.get('UnitCode'),
                DetailAbsen: JSON.stringify(listAbs),
                DetailInspectorName: JSON.stringify(listInsp),
                PermintaanOvertime: JSON.stringify(listOt),
                Availability: document.getElementById('availability-pct').innerText.replace('%',''),
                InspectorNo: listInsp.length
            };
            formData.forEach((v, k) => payload[k] = v);
            try { await API.post(payload); Swal.fire({ icon: 'success', title: 'Cycle Synced', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false }); closeModal(); init(); }
            catch(e) { console.error(e); } finally { loader.style.display = 'none'; }
        }

        async function deleteAttend(ts) {
            const res = await Swal.fire({ title: 'Purge Entry?', text: "Permanent removal.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) { loader.style.display = 'flex'; await API.post({ tab: 'ATTENDANCE', action: 'delete', primaryId: ts }); init(); }
        }

        function closeModal() { document.getElementById('attend-modal').classList.add('hidden'); }
        init();
    </script>
</body>
</html>
