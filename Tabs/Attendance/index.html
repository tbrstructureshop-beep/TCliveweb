<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --panel: #151921; --border: rgba(255, 255, 255, 0.1); --accent: #0ea5e9; 
            --text-main: #94a3b8; --text-bold: #ffffff; --input-bg: rgba(255, 255, 255, 0.05);
        }
        .light {
            --bg: transparent; --panel: #ffffff; --border: #e2e8f0; --accent: #0284c7; 
            --text-main: #475569; --text-bold: #1e293b; --input-bg: #f8fafc;
        }
        body { background: transparent; color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; transition: all 0.3s ease; }
        .text-white, h1, h2, h3, h4 { color: var(--text-bold) !important; }
        
        /* Unit Tab Switcher */
        .unit-nav-wrapper { position: relative; display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
        .unit-nav { display: flex; gap: 0.4rem; padding: 0.4rem; background: rgba(0,0,0,0.2); border-radius: 1.25rem; border: 1px solid var(--border); overflow-x: auto; scroll-behavior: smooth; flex: 1; }
        .unit-nav::-webkit-scrollbar { display: none; }
        .unit-tab { padding: 0.6rem 1.25rem; border-radius: 0.9rem; font-size: 10px; font-weight: 800; white-space: nowrap; transition: 0.3s; color: var(--text-main); border: 1px solid transparent; }
        .unit-tab.active { background: var(--accent); color: white !important; box-shadow: 0 8px 15px -5px rgba(14, 165, 233, 0.4); }
        .nav-arrow { background: var(--panel); border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; display: flex; items-center; justify-content: center; color: var(--accent); cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .nav-arrow:hover { background: var(--accent); color: white; }

        .attendance-card { background-color: var(--panel) !important; border: 1px solid var(--border) !important; border-radius: 2rem; padding: 1.25rem; margin-bottom: 1rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2); }
        
        /* Metric Ribbon (Horizontal) */
        .metric-ribbon { display: flex; flex-wrap: wrap; gap: 1rem; background: rgba(0,0,0,0.1); padding: 0.6rem 1rem; border-radius: 1rem; border: 1px solid var(--border); margin-bottom: 1rem; }
        .metric-item { display: flex; align-items: baseline; gap: 0.4rem; }
        .metric-val { font-size: 1rem; font-weight: 900; color: var(--text-bold); font-mono; }
        .metric-lab { font-size: 8px; font-weight: 800; text-transform: uppercase; opacity: 0.4; }

        /* Compact Card Tabs */
        .card-tabs { display: flex; gap: 0.2rem; background: var(--input-bg); padding: 0.2rem; border-radius: 0.8rem; margin-bottom: 0.75rem; width: fit-content; }
        .c-tab { padding: 0.4rem 0.8rem; border-radius: 0.6rem; font-size: 8px; font-weight: 900; text-transform: uppercase; transition: 0.2s; color: var(--text-main); opacity: 0.5; }
        .c-tab.active { background: var(--panel); color: var(--accent) !important; opacity: 1; }

        .detail-item { background: var(--input-bg); border: 1px solid var(--border); border-radius: 0.8rem; padding: 0.6rem; margin-bottom: 0.3rem; }
        .input-field { width: 100%; background: var(--input-bg) !important; border: 1px solid var(--border) !important; color: var(--text-bold) !important; border-radius: 0.6rem; padding: 0.6rem; font-size: 0.8rem; outline: none; }
        
        select option { background-color: #ffffff !important; color: #1e293b !important; }
        :not(.light) select option { background-color: #151921 !important; color: #ffffff !important; }

        #local-loader { display: none; position: fixed; inset: 0; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .light .bg-sky-500\/10 { background-color: rgba(2, 132, 199, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-10 h-10 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[9px] font-mono uppercase tracking-[0.4em] text-sky-500 font-bold">Syncing_Vault...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-black text-white tracking-tighter uppercase">Attendance Log</h1>
            <p class="text-[9px] opacity-40 font-mono mt-0.5 uppercase tracking-widest">Resource Cockpit V3.2</p>
        </div>
        <button onclick="openModal()" class="bg-sky-600 hover:bg-sky-500 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] flex items-center gap-2 transition-all active:scale-95 uppercase tracking-widest">
            <i data-lucide="plus" size="14"></i> Log Entry
        </button>
    </div>

    <!-- UNIT TAB SWITCHER -->
    <div class="unit-nav-wrapper">
        <button onclick="scrollNav(-100)" class="nav-arrow"><i data-lucide="chevron-left" size="14"></i></button>
        <div id="unit-tabs" class="unit-nav no-scrollbar"></div>
        <button onclick="scrollNav(100)" class="nav-arrow"><i data-lucide="chevron-right" size="14"></i></button>
    </div>

    <!-- MAIN DISPLAY -->
    <div id="main-content" class="grid grid-cols-1 gap-3"></div>

    <!-- MODAL -->
    <div id="attend-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[2.5rem] w-full max-w-5xl shadow-2xl flex flex-col max-h-[95vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest">Attendance Entry</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full text-white/30 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <form id="attend-form" class="p-6 overflow-y-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="label-style text-[8px]">Unit Code</label><select id="UnitCode" name="UnitCode" required class="input-field" onchange="updateShiftDropdown()"></select></div>
                        <div><label class="label-style text-[8px]">Shift Category</label><select id="ShiftCategory" name="ShiftCategory" required class="input-field" onchange="syncManpowerFromShift()"><option value="" disabled selected>Select Unit</option></select></div>
                    </div>
                    <div class="p-4 bg-white/5 rounded-xl border border-white/5 flex justify-between items-center">
                        <div><span class="label-style text-[8px]">Shift MP</span><span id="total-personnel" class="text-xl font-black text-white">0</span></div>
                        <div class="text-right"><span class="label-style text-[8px]">Availability</span><span id="availability-pct" class="text-xl font-black text-emerald-400">0%</span></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="label-style text-[8px]">Hadir</label><input type="number" id="Hadir" name="Hadir" required value="0" class="input-field text-center text-lg font-bold" oninput="doCalculations()"></div>
                        <div><label class="label-style text-[8px]">Absen (Auto)</label><input type="number" id="Absen" name="Absen" readonly class="input-field text-center text-lg font-bold opacity-30"></div>
                    </div>
                    <div><label class="label-style text-[8px]">Utilization (<span id="util-val">50</span>%)</label><input type="range" id="Utilization" name="Utilization" min="0" max="100" value="50" oninput="document.getElementById('util-val').innerText = this.value"></div>
                    <div><label class="label-style text-[8px]">Highlights Note</label><textarea id="HighlightManpower" name="HighlightManpower" class="input-field h-16 resize-none" placeholder="Daily notes..."></textarea></div>
                </div>
                <div class="space-y-5">
                    <!-- ABSENCE -->
                    <div class="p-4 bg-white/5 rounded-xl border border-white/5">
                        <label class="label-style text-[8px] mb-2">Absence Registry</label>
                        <div class="grid grid-cols-3 gap-1 mb-2">
                            <input id="abs-name" class="input-field !p-2 text-xs" placeholder="Name">
                            <select id="abs-status" class="input-field !p-2 text-xs"><option>Sick</option><option>Leave</option><option>Work Outside</option><option>Training</option><option>Other</option></select>
                            <input id="abs-note" class="input-field !p-2 text-xs" placeholder="Note (S001..)">
                        </div>
                        <button type="button" onclick="addItem('abs')" class="w-full bg-white/5 p-1 rounded-md text-[8px] font-bold uppercase hover:bg-white/10 transition">+ Add Absence</button>
                        <div id="list-abs" class="max-h-20 overflow-y-auto mt-2 space-y-1"></div>
                    </div>
                    <!-- OVERTIME -->
                    <div class="p-4 bg-white/5 rounded-xl border border-white/5">
                        <label class="label-style text-[8px] mb-2">Overtime Flow (OVT)</label>
                        <div class="grid grid-cols-2 gap-1 mb-1"><input id="ot-name" class="input-field !p-2 text-xs col-span-2" placeholder="Personnel Name"><input id="ot-start" type="datetime-local" class="input-field !p-2 text-[10px]"><input id="ot-end" type="datetime-local" class="input-field !p-2 text-[10px]"></div>
                        <div class="grid grid-cols-3 gap-1 mb-2"><input id="ot-task" class="input-field !p-2 text-xs col-span-2" placeholder="Task Detail"><select id="ot-hc" class="input-field !p-2 text-xs"><option value="Open">Open</option><option value="Submitted">MyHC OK</option></select></div>
                        <button type="button" onclick="addItem('ot')" class="w-full bg-white/5 p-1 rounded-md text-[8px] font-bold uppercase hover:bg-white/10 transition">+ Add Overtime</button>
                        <div id="list-ot" class="max-h-20 overflow-y-auto mt-2 space-y-1"></div>
                    </div>
                    <button type="submit" class="w-full bg-sky-600 py-3 rounded-xl font-black text-white hover:bg-sky-500 transition-all uppercase tracking-widest text-[10px]">Execute Data Authorization</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        let allShifts = [], masterData = [], activeUnit = null, editId = null;
        let listAbs = [], listInsp = [], listOt = [];

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, shiftRes, attendRes] = await Promise.all([API.get('UNIT'), API.get('SHIFTS'), API.get('ATTENDANCE')]);
                allShifts = shiftRes.data; masterData = attendRes.data;
                document.getElementById('UnitCode').innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderTabs(unitRes.data);
                if(!activeUnit && unitRes.data.length > 0) activeUnit = unitRes.data[0].UnitCode;
                renderView();
            } catch (e) { Swal.fire('Error', 'API Failure', 'error'); } finally { loader.style.display = 'none'; }
        }

        function renderTabs(units) {
            document.getElementById('unit-tabs').innerHTML = units.map(u => `<button onclick="switchUnit('${u.UnitCode}')" class="unit-tab ${u.UnitCode === activeUnit ? 'active' : ''}">${u.UnitCode}</button>`).join('');
        }
        function scrollNav(amt) { document.getElementById('unit-tabs').scrollLeft += amt; }
        function switchUnit(uCode) { activeUnit = uCode; document.querySelectorAll('.unit-tab').forEach(t => t.classList.toggle('active', t.innerText === uCode)); renderView(); }

        function renderView() {
            const container = document.getElementById('main-content');
            const items = masterData.filter(i => i.UnitCode === activeUnit).reverse();
            if(!activeUnit) { container.innerHTML = `<div class="py-20 text-center opacity-20 font-mono tracking-widest">SELECT_NODE</div>`; return; }

            container.innerHTML = items.map((item, idx) => {
                const id = `at-${idx}`;
                return `
                <div class="attendance-card">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <span class="bg-sky-500/10 text-sky-400 px-2 py-0.5 rounded text-[8px] font-black border border-sky-500/20 uppercase">${item.ShiftCategory}</span>
                            <span class="opacity-30 font-mono text-[9px]">${item.Timestamp}</span>
                        </div>
                        <div class="flex gap-1">
                            <button onclick='editAttend(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="p-2 hover:text-sky-400 transition opacity-30 hover:opacity-100"><i data-lucide="edit-3" size="12"></i></button>
                            <button onclick="deleteAttend('${item.Timestamp}')" class="p-2 hover:text-red-500 transition opacity-30 hover:opacity-100"><i data-lucide="trash-2" size="12"></i></button>
                        </div>
                    </div>
                    <div class="metric-ribbon">
                        <div class="metric-item"><span class="metric-lab">Hadir:</span><span class="metric-val">${item.Hadir}</span></div>
                        <div class="metric-item"><span class="metric-lab">Absen:</span><span class="metric-val text-red-500">${item.Absen}</span></div>
                        <div class="metric-item border-l border-white/5 pl-4"><span class="metric-lab">Avail:</span><span class="metric-val text-emerald-400">${item.Availability}%</span></div>
                        <div class="metric-item"><span class="metric-lab">Util:</span><span class="metric-val text-sky-400">${item.Utilization}%</span></div>
                    </div>
                    <div class="card-tabs">
                        <button onclick="switchCardTab('${id}', 'info')" class="c-tab active" id="tab-${id}-info">Overview</button>
                        <button onclick="switchCardTab('${id}', 'abs')" class="c-tab" id="tab-${id}-abs">Absence</button>
                        <button onclick="switchCardTab('${id}', 'ot')" class="c-tab" id="tab-${id}-ot">Overtime</button>
                    </div>
                    <div id="content-${id}" class="animate-in fade-in duration-300">
                        ${renderCardInfo(item)}
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function renderCardInfo(item) { return `<div class="p-2 bg-white/5 rounded-lg border border-white/5"><p class="text-[10px] italic opacity-60">${item.HighlightManpower || 'No highlights.'}</p></div>`; }
        
        function renderCardList(jsonStr, type) {
            try {
                const data = JSON.parse(jsonStr || '[]');
                if(!data.length) return `<div class="py-4 text-center opacity-20 text-[8px] font-mono uppercase">NO_RECORDS</div>`;
                return data.map(i => {
                    if(type === 'abs') return `<div class="detail-item"><div class="flex flex-col"><span class="text-[10px] font-bold text-white">${i.name}</span><span class="text-[8px] opacity-40 uppercase">${i.status} - ${i.note || ''}</span></div></div>`;
                    if(type === 'ot') return `<div class="detail-item"><div class="flex flex-col"><span class="text-[10px] font-bold text-white">${i.name} <span class="${i.hc === 'Submitted' ? 'text-emerald-400' : 'text-amber-400'} text-[7px]">[${i.hc}]</span></span><span class="text-[8px] opacity-40 uppercase">${i.task} (${i.start.split('T')[1]} - ${i.end.split('T')[1]})</span></div></div>`;
                }).join('');
            } catch(e) { return 'Error'; }
        }

        function switchCardTab(cardId, type) {
            const itemIdx = cardId.split('-')[1];
            const item = masterData.filter(i => i.UnitCode === activeUnit).reverse()[itemIdx];
            const content = document.getElementById(`content-${cardId}`);
            if(type === 'info') content.innerHTML = renderCardInfo(item);
            else content.innerHTML = renderCardList(type === 'abs' ? item.DetailAbsen : item.PermintaanOvertime, type);
            document.querySelectorAll(`#tab-${cardId}-info, #tab-${cardId}-abs, #tab-${cardId}-ot`).forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${cardId}-${type}`).classList.add('active');
        }

        function openModal() {
            editId = null; document.getElementById('attend-modal').classList.remove('hidden');
            document.getElementById('attend-form').reset(); listAbs=[]; listOt=[]; renderAllLists();
        }

        function editAttend(item) {
            editId = item.Timestamp; document.getElementById('attend-modal').classList.remove('hidden');
            document.getElementById('UnitCode').value = item.UnitCode; updateShiftDropdown();
            document.getElementById('ShiftCategory').value = item.ShiftCategory;
            document.getElementById('Hadir').value = item.Hadir;
            document.getElementById('HighlightManpower').value = item.HighlightManpower;
            document.getElementById('Utilization').value = item.Utilization;
            listAbs = JSON.parse(item.DetailAbsen || '[]'); listOt = JSON.parse(item.PermintaanOvertime || '[]');
            syncManpowerFromShift(); renderAllLists();
        }

        function addItem(type) {
            if(type === 'abs') {
                const n = document.getElementById('abs-name').value; 
                if(!n) return; 
                listAbs.push({name: n, status: document.getElementById('abs-status').value, note: document.getElementById('abs-note').value}); 
                document.getElementById('abs-name').value=''; document.getElementById('abs-note').value='';
            } else if(type === 'ot') {
                const n = document.getElementById('ot-name').value;
                if(!n) return;
                listOt.push({ name: n, start: document.getElementById('ot-start').value, end: document.getElementById('ot-end').value, task: document.getElementById('ot-task').value, hc: document.getElementById('ot-hc').value });
                document.getElementById('ot-name').value=''; document.getElementById('ot-task').value='';
            }
            renderAllLists();
        }

        function removeItem(type, idx) {
            if(type === 'abs') listAbs.splice(idx, 1); else listOt.splice(idx, 1);
            renderAllLists();
        }

        function renderAllLists() {
            document.getElementById('list-abs').innerHTML = listAbs.map((i, idx) => `<div class="detail-item !p-2 flex justify-between items-center"><span class="text-[9px] font-bold text-white">${i.name} <span class="opacity-30">(${i.status})</span></span><button type="button" onclick="removeItem('abs', ${idx})" class="text-red-500/40"><i data-lucide="x" size="10"></i></button></div>`).join('');
            document.getElementById('list-ot').innerHTML = listOt.map((i, idx) => `<div class="detail-item !p-2 flex justify-between items-center"><span class="text-[9px] font-bold text-white">${i.name} <span class="opacity-30">(${i.hc})</span></span><button type="button" onclick="removeItem('ot', ${idx})" class="text-red-500/40"><i data-lucide="x" size="10"></i></button></div>`).join('');
            lucide.createIcons();
        }

        function updateShiftDropdown() {
            const uCode = document.getElementById('UnitCode').value;
            const available = allShifts.filter(s => s.UnitCode === uCode);
            document.getElementById('ShiftCategory').innerHTML = available.map(s => `<option value="${s.ShiftCategory}">${s.ShiftCategory}</option>`).join('');
            syncManpowerFromShift();
        }

        function syncManpowerFromShift() {
            const unit = document.getElementById('UnitCode').value;
            const shift = document.getElementById('ShiftCategory').value;
            const match = allShifts.find(s => s.UnitCode === unit && s.ShiftCategory === shift);
            document.getElementById('total-personnel').innerText = match ? match.TotalManpower : '0';
            doCalculations();
        }

        function doCalculations() {
            const total = parseInt(document.getElementById('total-personnel').innerText) || 0;
            const hadir = parseInt(document.getElementById('Hadir').value) || 0;
            const avail = total > 0 ? ((hadir / total) * 100).toFixed(1) : 0;
            document.getElementById('Absen').value = Math.max(0, total - hadir);
            document.getElementById('availability-pct').innerText = avail + '%';
        }

        document.getElementById('attend-form').onsubmit = async (e) => {
            e.preventDefault();
            loader.style.display = 'flex';
            const formData = new FormData(e.target);
            const payload = {
                tab: 'ATTENDANCE', action: editId ? 'update' : 'add', primaryId: editId || formData.get('UnitCode'),
                DetailAbsen: JSON.stringify(listAbs), PermintaanOvertime: JSON.stringify(listOt),
                Availability: document.getElementById('availability-pct').innerText.replace('%',''), InspectorNo: 0
            };
            formData.forEach((v, k) => payload[k] = v);
            try { await API.post(payload); Swal.fire({ icon: 'success', title: 'Data Committed', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false }); closeModal(); init(); }
            catch(e) { Swal.fire('Error', 'Commit Failed', 'error'); } finally { loader.style.display = 'none'; }
        }

        async function deleteAttend(ts) {
            const res = await Swal.fire({ title: 'Purge?', text: "Delete permanently.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) { loader.style.display = 'flex'; await API.post({ tab: 'ATTENDANCE', action: 'delete', primaryId: ts }); init(); }
        }

        function closeModal() { document.getElementById('attend-modal').classList.add('hidden'); }
        init();
    </script>
</body>
</html>
