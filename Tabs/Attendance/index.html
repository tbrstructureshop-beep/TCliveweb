<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --panel: #151921; 
            --border: rgba(255, 255, 255, 0.1); 
            --accent: #0ea5e9; 
        }
        body { background: transparent; color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .unit-group-header { border-left: 3px solid var(--accent); padding-left: 1rem; margin-bottom: 1.5rem; }
        .attendance-card {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .attendance-card:hover { border-color: rgba(14, 165, 233, 0.3); }

        .input-field {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem;
            outline: none;
            color: white;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }
        .input-field:focus { border-color: var(--accent); }
        
        .label-style {
            text-transform: uppercase;
            font-size: 10px;
            font-weight: 700;
            opacity: 0.4;
            margin-bottom: 0.25rem;
            display: block;
            letter-spacing: 0.1em;
        }

        #local-loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(11, 14, 20, 0.9);
            backdrop-filter: blur(8px);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.5rem 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #262c36; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- LOCAL LOADER -->
    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-sky-500 animate-pulse font-bold">Syncing_Nodes...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tight uppercase">Attendance Log</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Manpower distribution & Node status</p>
        </div>
        <button onclick="openModal()" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 shadow-lg shadow-sky-600/20 transition-all active:scale-95">
            <i data-lucide="plus" size="18"></i> LOG ATTENDANCE
        </button>
    </div>

    <div id="group-container" class="space-y-12">
        <!-- Grouped Units here -->
    </div>

    <!-- MODAL -->
    <div id="attend-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[2.5rem] w-full max-w-4xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <h3 class="text-xl font-bold text-white uppercase tracking-widest">Attendance Entry</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <form id="attend-form" class="p-8 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-8">
                <input type="hidden" id="primaryId">
                
                <!-- Left Column -->
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="label-style">Unit Code</label>
                            <select id="UnitCode" name="UnitCode" required class="input-field" onchange="syncShiftData()"></select>
                        </div>
                        <div>
                            <label class="label-style">Shift Category</label>
                            <select id="ShiftCategory" name="ShiftCategory" required class="input-field" onchange="syncShiftData()">
                                <option value="" disabled selected>Select Shift</option>
                                <option>Day</option><option>Night</option><option>Swing</option>
                            </select>
                        </div>
                    </div>

                    <div class="p-4 bg-white/5 rounded-2xl border border-white/5 flex justify-between items-center">
                        <div>
                            <span class="label-style">Total Personnel</span>
                            <span id="total-personnel" class="text-2xl font-bold text-white font-mono">0</span>
                        </div>
                        <div class="text-right">
                            <span class="label-style">Availability</span>
                            <span id="availability-pct" class="text-2xl font-bold text-emerald-400 font-mono">0%</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="label-style">Hadir (Manual)</label>
                            <input type="number" id="Hadir" name="Hadir" required value="0" class="input-field text-center text-xl font-bold" oninput="doCalculations()">
                        </div>
                        <div>
                            <label class="label-style">Absen (Auto)</label>
                            <input type="number" id="Absen" name="Absen" readonly class="input-field text-center text-xl font-bold opacity-40">
                        </div>
                    </div>

                    <div>
                        <label class="label-style">Utilization (<span id="util-val">50</span>%)</label>
                        <input type="range" id="Utilization" name="Utilization" min="0" max="100" value="50" oninput="document.getElementById('util-val').innerText = this.value">
                    </div>
                </div>

                <!-- Right Column (Special Lists) -->
                <div class="space-y-6">
                    <div>
                        <label class="label-style">Absence Detail List</label>
                        <div class="flex gap-2 mb-3">
                            <input id="abs-name" class="input-field" placeholder="Name">
                            <select id="abs-status" class="input-field w-32">
                                <option>Sick</option><option>Leave</option><option>Other</option><option>End Contract</option>
                            </select>
                            <button type="button" onclick="addAbsItem()" class="bg-sky-500 p-3 rounded-xl text-white"><i data-lucide="plus"></i></button>
                        </div>
                        <div id="list-abs" class="max-h-24 overflow-y-auto"></div>
                    </div>

                    <div>
                        <label class="label-style">Inspector Detail List (<span id="insp-count">0</span>)</label>
                        <div class="flex gap-2 mb-3">
                            <input id="insp-name" class="input-field" placeholder="Name">
                            <input id="insp-task" class="input-field" placeholder="Job Task">
                            <button type="button" onclick="addInspItem()" class="bg-sky-500 p-3 rounded-xl text-white"><i data-lucide="plus"></i></button>
                        </div>
                        <div id="list-insp" class="max-h-24 overflow-y-auto"></div>
                    </div>

                    <div>
                        <label class="label-style">Overtime Request</label>
                        <div class="flex gap-2 mb-3">
                            <input id="ot-name" class="input-field" placeholder="Name">
                            <input id="ot-hr" type="number" class="input-field w-20" placeholder="Hr">
                            <button type="button" onclick="addOtItem()" class="bg-sky-500 p-3 rounded-xl text-white"><i data-lucide="plus"></i></button>
                        </div>
                        <div id="list-ot" class="max-h-24 overflow-y-auto"></div>
                    </div>
                </div>

                <div class="md:col-span-2">
                    <label class="label-style">Highlights Note</label>
                    <textarea id="HighlightManpower" name="HighlightManpower" class="input-field h-20 resize-none" placeholder="Enter key manpower highlights..."></textarea>
                </div>

                <div class="md:col-span-2 flex pt-4">
                    <button type="submit" class="w-full bg-sky-600 py-4 rounded-2xl font-bold text-white hover:bg-sky-500 transition-all uppercase tracking-widest text-xs">Authorize Entry</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        let allShifts = [];
        let listAbs = [];
        let listInsp = [];
        let listOt = [];

        async function init() {
            loader.style.display = 'flex';
            try {
                // 1. Fetch Units
                const unitRes = await API.get('UNIT');
                document.getElementById('UnitCode').innerHTML = '<option value="" disabled selected>Select Unit</option>' + 
                    unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');

                // 2. Fetch All Shifts for reference
                const shiftRes = await API.get('SHIFTS');
                allShifts = shiftRes.data;

                // 3. Load Attendance Records
                const attendRes = await API.get('ATTENDANCE');
                renderData(attendRes.data);
            } catch (e) {
                Swal.fire('Node Error', 'Communication with server failed.', 'error');
            } finally {
                loader.style.display = 'none';
            }
        }

        // --- CALCULATION LOGIC ---
        function syncShiftData() {
            const uCode = document.getElementById('UnitCode').value;
            const shiftCat = document.getElementById('ShiftCategory').value;
            
            const match = allShifts.find(s => s.UnitCode === uCode && s.ShiftCategory === shiftCat);
            const total = match ? parseInt(match.TotalManpower) : 0;
            
            document.getElementById('total-personnel').innerText = total;
            doCalculations();
        }

        function doCalculations() {
            const total = parseInt(document.getElementById('total-personnel').innerText) || 0;
            const hadir = parseInt(document.getElementById('Hadir').value) || 0;
            
            const absen = Math.max(0, total - hadir);
            const avail = total > 0 ? ((hadir / total) * 100).toFixed(1) : 0;
            
            document.getElementById('Absen').value = absen;
            document.getElementById('availability-pct').innerText = avail + '%';
        }

        // --- DYNAMIC LISTS ---
        function addAbsItem() {
            const n = document.getElementById('abs-name').value;
            const s = document.getElementById('abs-status').value;
            if(!n) return;
            listAbs.push({name: n, status: s});
            renderList('list-abs', listAbs);
            document.getElementById('abs-name').value = '';
        }

        function addInspItem() {
            const n = document.getElementById('insp-name').value;
            const t = document.getElementById('insp-task').value;
            if(!n) return;
            listInsp.push({name: n, job: t});
            renderList('list-insp', listInsp);
            document.getElementById('insp-count').innerText = listInsp.length;
            document.getElementById('insp-name').value = '';
            document.getElementById('insp-task').value = '';
        }

        function addOtItem() {
            const n = document.getElementById('ot-name').value;
            const h = document.getElementById('ot-hr').value;
            if(!n) return;
            listOt.push({name: n, job: 'Operational', hour: h, status: 'Open Review'});
            renderList('list-ot', listOt);
            document.getElementById('ot-name').value = '';
            document.getElementById('ot-hr').value = '';
        }

        function renderList(containerId, data) {
            const el = document.getElementById(containerId);
            el.innerHTML = data.map((item, i) => `
                <div class="list-item">
                    <span class="text-xs text-white/80">${item.name} <span class="opacity-30">(${item.status || item.job || item.hour+'hr'})</span></span>
                    <button type="button" onclick="removeItem('${containerId}', ${i})" class="text-red-500/50 hover:text-red-500"><i data-lucide="x-circle" size="14"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function removeItem(cid, idx) {
            if(cid === 'list-abs') listAbs.splice(idx, 1);
            if(cid === 'list-insp') { listInsp.splice(idx, 1); document.getElementById('insp-count').innerText = listInsp.length; }
            if(cid === 'list-ot') listOt.splice(idx, 1);
            renderList(cid, cid === 'list-abs' ? listAbs : cid === 'list-insp' ? listInsp : listOt);
        }

        // --- RENDER CARDS ---
        function renderData(data) {
            const container = document.getElementById('group-container');
            const grouped = data.reduce((acc, item) => {
                if(!acc[item.UnitCode]) acc[item.UnitCode] = [];
                acc[item.UnitCode].push(item);
                return acc;
            }, {});

            container.innerHTML = Object.keys(grouped).map(uCode => `
                <div>
                    <div class="unit-group-header">
                        <h2 class="text-white font-bold text-lg uppercase tracking-widest">${uCode}</h2>
                    </div>
                    <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                        ${grouped[uCode].reverse().map(item => `
                            <div class="attendance-card">
                                <div class="flex justify-between items-start mb-6">
                                    <div class="bg-sky-500/10 px-3 py-1 rounded-lg text-[10px] font-mono text-sky-400 border border-sky-500/20">${item.Timestamp}</div>
                                    <div class="text-right">
                                        <span class="label-style">Availability</span>
                                        <span class="text-emerald-400 font-bold">${item.Availability}%</span>
                                    </div>
                                </div>
                                
                                <div class="grid grid-cols-4 gap-2 mb-6 text-center border-y border-white/5 py-4">
                                    <div><span class="label-style">Shift</span><span class="text-white font-bold text-xs">${item.ShiftCategory}</span></div>
                                    <div><span class="label-style">Hadir</span><span class="text-white font-bold text-xs">${item.Hadir}</span></div>
                                    <div><span class="label-style">Absen</span><span class="text-red-500 font-bold text-xs">${item.Absen}</span></div>
                                    <div><span class="label-style">Utilize</span><span class="text-sky-400 font-bold text-xs">${item.Utilization}%</span></div>
                                </div>

                                <div class="space-y-2">
                                    <span class="label-style">Highlight Node</span>
                                    <p class="text-xs italic opacity-60 leading-relaxed line-clamp-1">${item.HighlightManpower || 'No special highlights recorded.'}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openModal() { document.getElementById('attend-modal').classList.remove('hidden'); }
        function closeModal() { 
            document.getElementById('attend-modal').classList.add('hidden');
            document.getElementById('attend-form').reset();
            listAbs=[]; listInsp=[]; listOt=[];
            renderList('list-abs', []); renderList('list-insp', []); renderList('list-ot', []);
            document.getElementById('insp-count').innerText = "0";
            document.getElementById('total-personnel').innerText = "0";
            document.getElementById('availability-pct').innerText = "0%";
        }

        document.getElementById('attend-form').onsubmit = async (e) => {
            e.preventDefault();
            loader.style.display = 'flex';
            
            const formData = new FormData(e.target);
            const payload = {
                tab: 'ATTENDANCE',
                action: 'add',
                DetailAbsen: JSON.stringify(listAbs),
                DetailInspectorName: JSON.stringify(listInsp),
                PermintaanOvertime: JSON.stringify(listOt),
                Availability: document.getElementById('availability-pct').innerText.replace('%',''),
                InspectorNo: listInsp.length,
                primaryId: formData.get('UnitCode')
            };

            formData.forEach((v, k) => payload[k] = v);

            try {
                const res = await API.post(payload);
                if(res.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'Committed', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: '#151921', color: '#fff' });
                    closeModal();
                    init();
                }
            } catch (err) {
                Swal.fire('Error', 'Record authentication failed.', 'error');
            } finally {
                loader.style.display = 'none';
            }
        };

        init();
    </script>
</body>
</html>
