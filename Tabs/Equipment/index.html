<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --panel: #151921; 
            --border: rgba(255, 255, 255, 0.1); 
            --accent: #0ea5e9; 
            --text-main: #94a3b8;
            --text-bold: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.05);
            --c-srv: #10b981; --c-usrv: #ef4444; --c-ins: #3b82f6;
        }
    
        /* Interface Mode (Light) Variables */
        .light {
            --bg: transparent; 
            --panel: #ffffff; 
            --border: #e2e8f0; 
            --accent: #0284c7; 
            --text-main: #475569;
            --text-bold: #1e293b;
            --input-bg: #f8fafc;
        }
    
        body { 
            background: transparent; 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            transition: all 0.3s ease;
            overflow-x: hidden; 
        }
    
        /* Global Text & Heading Color Correction */
        .text-white, h1, h2, h3, h4, .stat-val { color: var(--text-bold) !important; }
        
        /* Equipment Card Fix */
        .eq-card { 
            background: var(--panel) !important; 
            border: 1px solid var(--border) !important; 
            border-radius: 2.5rem; 
            padding: 2rem; 
            margin-bottom: 2rem; 
            transition: all 0.3s ease; 
        }
        .eq-card:hover { border-color: var(--accent); }
    
        /* Input & Select Field Fix */
        .input-field, .st-select { 
            width: 100%; 
            background: var(--input-bg) !important; 
            border: 1px solid var(--border) !important; 
            color: var(--text-bold) !important;
            border-radius: 0.75rem; 
            padding: 0.75rem; 
            outline: none; 
            font-size: 0.875rem; 
            transition: all 0.2s ease; 
        }
        .input-field:focus { border-color: var(--accent); }
    
        /* Ensure dropdown options are always readable */
        select option {
            background-color: white !important;
            color: #1e293b !important;
        }
        /* Restoration for Dark Mode options if needed via class */
        .dark select option {
            background-color: #151921 !important;
            color: white !important;
        }
        
        .label-style { text-transform: uppercase; font-size: 10px; font-weight: 700; opacity: 0.4; margin-bottom: 0.25rem; display: block; letter-spacing: 0.1em; }
    
        /* Stat Box Adjustments */
        .stat-box { 
            flex: 1; min-width: 90px; padding: 12px 8px; border-radius: 1.25rem; 
            border: 1px solid var(--border); text-align: center; 
            background: rgba(0,0,0,0.05); /* Soft background that works in both */
        }
        .light .stat-box { background: rgba(0,0,0,0.02); }
        .stat-val { display: block; font-size: 1.25rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
        .stat-lab { font-size: 8px; font-weight: 800; text-transform: uppercase; opacity: 0.5; }
    
        /* Specific Equipment Tracker Selectors */
        .st-select { border-radius: 6px; font-size: 10px; font-weight: 700; padding: 4px 8px; width: auto; }
        
        #local-loader { 
            display: none; position: fixed; inset: 0; 
            background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); 
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center; 
        }
    
        .bulk-table-container { border: 1px solid var(--border); border-radius: 1rem; overflow: hidden; background: rgba(0,0,0,0.05); }
        .bulk-table { width: 100%; font-size: 11px; }
        .bulk-table th { padding: 12px; background: rgba(0,0,0,0.05); text-align: left; opacity: 0.5; }
        .bulk-table td { padding: 10px; border-top: 1px solid var(--border); }
    
        /* Modal Fix */
        #eq-modal > div {
            background-color: var(--panel) !important;
            border: 1px solid var(--border) !important;
        }
    
        /* Accessibility / Readability for Blue Accents in Light Mode */
        .light .text-sky-500, .light .text-sky-400 {
            color: #0369a1 !important; 
        }
        .light .bg-sky-500\/10, .light .bg-sky-600\/10 {
            background-color: rgba(2, 132, 199, 0.1) !important;
            border-color: rgba(2, 132, 199, 0.2) !important;
        }
    
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-sky-500 animate-pulse font-bold">Scanning_Inventory...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tighter uppercase">Equipment Tracker</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Inventory Health & Resource Management</p>
        </div>
        <div class="flex gap-3">
            <button onclick="openModal('bulk')" class="bg-white/5 border border-white/10 hover:bg-white/10 text-white px-5 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 transition-all">
                <i data-lucide="package-search" size="16"></i> BULK GRID LOAD
            </button>
            <button onclick="openModal('single')" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-sky-600/20 transition-all">
                <i data-lucide="plus" size="16"></i> ADD ITEM
            </button>
        </div>
    </div>

    <div id="eq-container"></div>

    <!-- MODAL -->
    <div id="eq-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-5xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest">Inventory Control</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="label-style">Deployment Node</label>
                        <select id="UnitCode" class="input-field"></select>
                    </div>
                </div>

                <!-- Bulk View -->
                <div id="bulk-container" class="hidden">
                    <textarea id="paste-buffer" class="absolute opacity-0 pointer-events-none"></textarea>
                    <div onclick="focusBuffer()" class="border-2 border-dashed border-white/10 rounded-2xl p-10 mb-6 text-center cursor-pointer hover:border-sky-500/50 transition-all bg-white/[0.02]">
                        <i data-lucide="scan-barcode" class="mx-auto mb-3 opacity-20 w-10 h-10"></i>
                        <p class="text-sm text-sky-400 font-bold">Paste from Excel (CTRL+V)</p>
                        <p class="text-[10px] opacity-30 mt-1 uppercase font-mono">Format: PN | DESC | NOTE</p>
                    </div>
                    <div class="bulk-table-container">
                        <table class="bulk-table">
                            <thead><tr><th>Part Number</th><th>Description</th><th>Note</th><th class="w-10"></th></tr></thead>
                            <tbody id="bulk-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Single View -->
                <div id="single-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label class="label-style">Part Number</label><input id="s-pno" class="input-field" placeholder="PN-999-X"></div>
                    <div><label class="label-style">Eqp Description</label><input id="s-desc" class="input-field" placeholder="Pressure Gauge, Torque Wrench..."></div>
                    <div class="md:col-span-2"><label class="label-style">Note</label><input id="s-note" class="input-field" placeholder="Storage rack or condition details..."></div>
                    <div>
                        <label class="label-style">Initial Status</label>
                        <select id="s-status" class="input-field">
                            <option>Servicable (good condition)</option>
                            <option>Unserviceable (Damaged)</option>
                            <option>In Service (Calibrated)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="p-8 border-t border-white/5">
                <button onclick="submitData()" class="w-full bg-sky-600 py-4 rounded-2xl font-black text-white hover:bg-sky-500 transition-all uppercase tracking-widest text-xs">Execute Inventory Commit</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const TAB_NAME = 'EQUIPMENT';
        let bulkData = [], currentMode = 'single', editId = null;
    
        const ST_ORDER = { 'Unserviceable (Damaged)': 0, 'In Service (Calibrated)': 1, 'Servicable (good condition)': 2 };
    
        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, eqRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                document.getElementById('UnitCode').innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderCards(eqRes.data);
            } catch (e) { Swal.fire('Error', 'Communication Failed', 'error'); } 
            finally { loader.style.display = 'none'; }
        }
    
        function renderCards(data) {
            const container = document.getElementById('eq-container');
            const grouped = data.reduce((acc, item) => {
                const uc = item.UnitCode || 'Unknown';
                if(!acc[uc]) acc[uc] = [];
                acc[uc].push(item);
                return acc;
            }, {});
    
            if(Object.keys(grouped).length === 0) {
                container.innerHTML = `<div class="py-32 text-center opacity-20 font-mono tracking-[0.5em]">SYSTEM_INVENTORY_EMPTY</div>`;
                return;
            }
    
            container.innerHTML = Object.keys(grouped).map(uCode => {
                const items = grouped[uCode].sort((a, b) => ST_ORDER[a.Status] - ST_ORDER[b.Status]);
                
                const stats = {
                    total: items.length,
                    srv: items.filter(i => i.Status === 'Servicable (good condition)').length,
                    unsrv: items.filter(i => i.Status === 'Unserviceable (Damaged)').length,
                    insrv: items.filter(i => i.Status === 'In Service (Calibrated)').length
                };
    
                return `
                <div class="eq-card">
                    <div class="flex flex-col xl:flex-row justify-between items-center gap-6 mb-8">
                        <div class="w-full xl:w-auto">
                            <span class="label-style">Storage Node</span>
                            <h2 class="text-3xl font-black text-white tracking-tighter uppercase">${uCode}</h2>
                        </div>
                        <div class="flex flex-wrap gap-2 w-full xl:w-auto">
                            <div class="stat-box border-sky-500/20"><span class="stat-val">${stats.total}</span><span class="stat-lab">Total</span></div>
                            <div class="stat-box border-emerald-500/20"><span class="stat-val text-emerald-400">${stats.srv}</span><span class="stat-lab">Good</span></div>
                            <div class="stat-box border-blue-500/20"><span class="stat-val text-blue-400">${stats.insrv}</span><span class="stat-lab">Calib</span></div>
                            <div class="stat-box border-red-500/30 ${stats.unsrv > 0 ? 'animate-pulse' : ''}"><span class="stat-val text-red-500">${stats.unsrv}</span><span class="stat-lab">Damaged</span></div>
                        </div>
                    </div>
    
                    <details class="group" open>
                        <summary class="list-none flex items-center justify-between p-4 bg-white/5 border border-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition">
                            <span class="text-[10px] font-bold tracking-widest uppercase text-sky-400">Inventory Registry Details</span>
                            <i data-lucide="chevron-down" class="group-open:rotate-180 transition"></i>
                        </summary>
                        <div class="mt-6 overflow-x-auto">
                            <table class="w-full text-left text-xs">
                                <thead class="opacity-20 uppercase font-bold border-b border-white/5">
                                    <tr><th class="p-3">Part Number</th><th class="p-3">Description</th><th class="p-3">Note</th><th class="p-3">Status</th><th class="p-3 text-right">Actions</th></tr>
                                </thead>
                                <tbody>
                                    ${items.map(item => `
                                        <tr class="border-b border-white/[0.02] hover:bg-white/[0.02] ${item.Status === 'Unserviceable (Damaged)' ? 'bg-red-500/5 border-l-2 border-l-red-500' : ''}">
                                            <td class="p-3 font-mono text-sky-400">${item.EqpPartNumber || '-'}</td>
                                            <td class="p-3 font-black text-white uppercase">${item.EqpDescription || '-'}</td>
                                            <td class="p-3 opacity-60 text-[11px]">${item.Note || '-'}</td>
                                            <td class="p-3">
                                                <select onchange="quickUpdateStatus('${item.Timestamp}', this.value)" class="st-select">
                                                    ${['Servicable (good condition)', 'Unserviceable (Damaged)', 'In Service (Calibrated)'].map(s => `<option ${item.Status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                                </select>
                                            </td>
                                            <td class="p-3 text-right">
                                                <div class="flex gap-2 justify-end">
                                                    <button onclick='editItem(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="text-white/20 hover:text-sky-400 transition"><i data-lucide="edit-3" size="14"></i></button>
                                                    <button onclick="deleteItem('${item.Timestamp}')" class="text-white/10 hover:text-red-500 transition"><i data-lucide="trash-2" size="14"></i></button>
                                                </div>
                                            </td>
                                        </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </details>
                </div>`;
            }).join('');
            lucide.createIcons();
        }
    
        function openModal(mode) {
            currentMode = mode;
            editId = null;
            document.getElementById('eq-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = mode === 'bulk' ? 'Bulk Registry Engine' : 'Manual Item Entry';
            document.getElementById('single-container').classList.toggle('hidden', mode === 'bulk');
            document.getElementById('bulk-container').classList.toggle('hidden', mode === 'single');
            if(mode === 'single') document.getElementById('s-pno').disabled = false;
            if(mode === 'bulk') focusBuffer();
        }
    
        function editItem(item) {
            openModal('single');
            editId = item.Timestamp;
            document.getElementById('modal-title').innerText = 'Edit Inventory Record';
            document.getElementById('UnitCode').value = item.UnitCode;
            document.getElementById('s-pno').value = item.EqpPartNumber;
            document.getElementById('s-desc').value = item.EqpDescription;
            document.getElementById('s-note').value = item.Note;
            document.getElementById('s-status').value = item.Status;
        }
    
        function closeModal() { document.getElementById('eq-modal').classList.add('hidden'); bulkData = []; renderBulkTable(); editId = null; }
        function focusBuffer() { document.getElementById('paste-buffer').focus(); }
    
        document.getElementById('paste-buffer').addEventListener('paste', (e) => {
            e.preventDefault();
            const raw = (e.clipboardData || window.clipboardData).getData('text');
            const rows = raw.split(/\r\n|\n/).filter(r => r.trim() !== "");
            bulkData = rows.map(r => {
                const cols = r.split('\t');
                return { pno: cols[0] || '', desc: cols[1] || '', note: cols[2] || '' };
            });
            renderBulkTable();
        });
    
        function renderBulkTable() {
            const body = document.getElementById('bulk-table-body');
            body.innerHTML = bulkData.length ? bulkData.map((d, i) => `
                <tr>
                    <td><input value="${d.pno}" oninput="bulkData[${i}].pno=this.value" class="bg-transparent outline-none w-full border-b border-white/5 font-mono text-sky-400"></td>
                    <td><input value="${d.desc}" oninput="bulkData[${i}].desc=this.value" class="bg-transparent outline-none w-full border-b border-white/5 uppercase"></td>
                    <td><input value="${d.note}" oninput="bulkData[${i}].note=this.value" class="bg-transparent outline-none w-full border-b border-white/5 opacity-60"></td>
                    <td><button onclick="bulkData.splice(${i},1);renderBulkTable()" class="text-red-500/20 hover:text-red-500"><i data-lucide="x" size="14"></i></button></td>
                </tr>
            `).join('') : '<tr><td colspan="4" class="text-center py-10 opacity-20 italic">No stream detected...</td></tr>';
            lucide.createIcons();
        }
    
        async function submitData() {
            loader.style.display = 'flex';
            const unit = document.getElementById('UnitCode').value;
            try {
                if(currentMode === 'single') {
                    const payload = { 
                        tab: TAB_NAME, 
                        action: editId ? 'update' : 'add', 
                        primaryId: editId || document.getElementById('s-pno').value,
                        UnitCode: unit, 
                        EqpPartNumber: document.getElementById('s-pno').value, 
                        EqpDescription: document.getElementById('s-desc').value, 
                        Status: document.getElementById('s-status').value, 
                        Note: document.getElementById('s-note').value 
                    };
                    await API.post(payload);
                } else {
                    for(let d of bulkData) {
                        await API.post({ tab: TAB_NAME, action: 'add', UnitCode: unit, EqpPartNumber: d.pno, EqpDescription: d.desc, Status: 'Servicable (good condition)', Note: d.note, primaryId: d.pno });
                    }
                }
                Swal.fire({ icon: 'success', title: 'Committed', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false });
                closeModal(); init();
            } catch(e) { Swal.fire('Error', 'Transaction Failed', 'error'); } 
            finally { loader.style.display = 'none'; }
        }
    
        async function quickUpdateStatus(ts, status) {
            loader.style.display = 'flex';
            try {
                await API.post({ tab: TAB_NAME, action: 'update', primaryId: ts, Status: status });
                init();
            } catch(e) { Swal.fire('Error', 'Update Failed', 'error'); loader.style.display = 'none'; }
        }
    
        async function deleteItem(ts) {
            const res = await Swal.fire({ title: 'Purge Item?', text: "Permanent removal from inventory.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) {
                loader.style.display = 'flex';
                try {
                    await API.post({ tab: TAB_NAME, action: 'delete', primaryId: ts });
                    init();
                } catch(e) { Swal.fire('Error', 'Delete Failed', 'error'); loader.style.display = 'none'; }
            }
        }
    
        init();
    </script>
</body>
</html>
