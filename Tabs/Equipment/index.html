<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --panel: #151921; --border: rgba(255, 255, 255, 0.1); --accent: #0ea5e9; 
            --text-main: #94a3b8; --text-bold: #ffffff; --input-bg: rgba(255, 255, 255, 0.05);
        }
        .light {
            --bg: transparent; --panel: #ffffff; --border: #e2e8f0; --accent: #0284c7; 
            --text-main: #475569; --text-bold: #1e293b; --input-bg: #f8fafc;
        }
        body { background: transparent; color: var(--text-main); font-family: 'Inter', sans-serif; transition: all 0.3s ease; overflow-x: hidden; }
        .text-white, h1, h2, h3, h4, .stat-val { color: var(--text-bold) !important; }
        
        /* Unit Tab Navigation */
        .unit-nav-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; }
        .unit-nav { display: flex; gap: 0.5rem; padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 1.25rem; border: 1px solid var(--border); overflow-x: auto; flex: 1; scroll-behavior: smooth; }
        .unit-nav::-webkit-scrollbar { display: none; }
        .unit-tab { padding: 0.75rem 1.5rem; border-radius: 1rem; font-size: 11px; font-weight: 800; white-space: nowrap; transition: 0.3s; color: var(--text-main); border: 1px solid transparent; }
        .unit-tab.active { background: var(--accent); color: white !important; box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4); }
        .nav-arrow { background: var(--panel); border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; display: flex; items-center; justify-content: center; color: var(--accent); cursor: pointer; transition: 0.2s; flex-shrink: 0; }

        .eq-card { background: var(--panel) !important; border: 1px solid var(--border) !important; border-radius: 2.5rem; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 15px 35px -10px rgba(0,0,0,0.3); }
        .stat-box { flex: 1; min-width: 90px; padding: 12px 8px; border-radius: 1.25rem; border: 1px solid var(--border); text-align: center; background: var(--input-bg); }
        
        .input-field, .st-select { width: 100%; background: var(--input-bg) !important; border: 1px solid var(--border) !important; color: var(--text-bold) !important; border-radius: 0.75rem; padding: 0.75rem; outline: none; font-size: 0.875rem; }
        select option { background-color: #ffffff !important; color: #1e293b !important; }
        :not(.light) select option { background-color: #151921 !important; color: #ffffff !important; }
        
        .label-style { text-transform: uppercase; font-size: 10px; font-weight: 700; opacity: 0.4; margin-bottom: 0.25rem; display: block; letter-spacing: 0.1em; }
        #local-loader { display: none; position: fixed; inset: 0; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        
        .master-table { width: 100%; font-size: 11px; }
        .master-table th { padding: 12px; text-align: left; opacity: 0.4; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .master-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); vertical-align: middle; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin mb-3"></div>
        <span class="text-[10px] font-mono text-sky-500 font-bold uppercase tracking-widest">Scanning_Inventory...</span>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tighter uppercase">Equipment Tracker</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Inventory Health & Resource Management</p>
        </div>
        <div class="flex gap-3">
            <button onclick="openModal('bulk')" class="bg-white/5 border border-white/10 hover:bg-white/10 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase transition-all">
                <i data-lucide="package-search" size="14"></i> Bulk Load
            </button>
            <button onclick="openModal('single')" class="bg-sky-600 hover:bg-sky-500 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase transition-all shadow-lg shadow-sky-600/20">
                <i data-lucide="plus" size="14"></i> Add Item
            </button>
        </div>
    </div>

    <!-- UNIT TAB SWITCHER -->
    <div class="unit-nav-wrapper">
        <button onclick="scrollNav(-150)" class="nav-arrow"><i data-lucide="chevron-left" size="16"></i></button>
        <div id="unit-tabs" class="unit-nav"></div>
        <button onclick="scrollNav(150)" class="nav-arrow"><i data-lucide="chevron-right" size="16"></i></button>
    </div>

    <div id="eq-container"></div>

    <!-- MODAL -->
    <div id="eq-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-5xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest">Inventory Control</h3>
                <button onclick="closeModal()" class="p-2 text-white/30 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <div class="p-8 overflow-y-auto flex-1">
                <div class="mb-8"><label class="label-style">Deployment Node</label><select id="UnitCode" class="input-field"></select></div>
                <div id="bulk-container" class="hidden">
                    <textarea id="paste-buffer" class="absolute opacity-0 pointer-events-none"></textarea>
                    <div onclick="focusBuffer()" class="border-2 border-dashed border-white/10 rounded-2xl p-10 mb-6 text-center cursor-pointer hover:border-sky-500/50 transition-all bg-white/[0.02]">
                        <p class="text-sm text-sky-400 font-bold">Paste from Excel (CTRL+V)</p>
                        <p class="text-[10px] opacity-30 mt-1 uppercase font-mono">PN | DESC | NOTE</p>
                    </div>
                    <div class="border border-white/10 rounded-xl overflow-hidden">
                        <table class="master-table"><thead><tr><th>PN</th><th>Desc</th><th>Note</th><th class="w-10"></th></tr></thead><tbody id="bulk-table-body"></tbody></table>
                    </div>
                </div>
                <div id="single-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <input type="hidden" id="primaryId">
                    <div><label class="label-style">Part Number</label><input id="s-pno" class="input-field" placeholder="PN-XXX"></div>
                    <div><label class="label-style">Eqp Description</label><input id="s-desc" class="input-field" placeholder="Description..."></div>
                    <div class="md:col-span-2"><label class="label-style">Note</label><input id="s-note" class="input-field" placeholder="Condition or location..."></div>
                    <div><label class="label-style">Status</label><select id="s-status" class="input-field"><option>Servicable (good condition)</option><option>Unserviceable (Damaged)</option><option>In Service (Calibrated)</option></select></div>
                </div>
            </div>
            <div class="p-8 border-t border-white/5"><button onclick="submitData()" class="w-full bg-sky-600 py-4 rounded-2xl font-black text-white hover:bg-sky-500 uppercase tracking-widest text-[10px]">Execute Inventory Commit</button></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const TAB_NAME = 'EQUIPMENT';
        let rawData = [], activeUnit = null, bulkData = [], currentMode = 'single', editId = null;
        const ST_ORDER = { 'Unserviceable (Damaged)': 0, 'In Service (Calibrated)': 1, 'Servicable (good condition)': 2 };

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, eqRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                rawData = eqRes.data || [];
                document.getElementById('UnitCode').innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderTabs(unitRes.data);
                if(!activeUnit && unitRes.data.length > 0) activeUnit = unitRes.data[0].UnitCode;
                renderCards();
            } catch (e) { Swal.fire('Error', 'Communication Failed', 'error'); } finally { loader.style.display = 'none'; }
        }

        function renderTabs(units) {
            document.getElementById('unit-tabs').innerHTML = units.map(u => `<button onclick="switchUnit('${u.UnitCode}')" class="unit-tab ${u.UnitCode === activeUnit ? 'active' : ''}">${u.UnitCode}</button>`).join('');
        }

        function scrollNav(amt) { document.getElementById('unit-tabs').scrollLeft += amt; }

        function switchUnit(uCode) {
            activeUnit = uCode;
            document.querySelectorAll('.unit-tab').forEach(t => t.classList.toggle('active', t.innerText === uCode));
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('eq-container');
            const items = rawData.filter(i => i.UnitCode === activeUnit).sort((a, b) => ST_ORDER[a.Status] - ST_ORDER[b.Status]);
            if(!activeUnit) { container.innerHTML = `<div class="py-20 text-center opacity-20 font-mono uppercase tracking-widest">Select_Node</div>`; return; }

            const stats = { total: items.length, srv: items.filter(i => i.Status === 'Servicable (good condition)').length, unsrv: items.filter(i => i.Status === 'Unserviceable (Damaged)').length, insrv: items.filter(i => i.Status === 'In Service (Calibrated)').length };

            container.innerHTML = `
                <div class="eq-card animate-in fade-in duration-500">
                    <div class="flex flex-col xl:flex-row justify-between items-center gap-6 mb-8">
                        <div class="w-full xl:w-auto"><span class="label-style">Active Node</span><h2 class="text-4xl font-black text-white tracking-tighter">${activeUnit}</h2></div>
                        <div class="flex flex-wrap gap-2 w-full xl:w-auto">
                            <div class="stat-box"><span class="stat-val">${stats.total}</span><span class="stat-lab">Total</span></div>
                            <div class="stat-box border-emerald-500/20"><span class="stat-val text-emerald-400">${stats.srv}</span><span class="stat-lab">Good</span></div>
                            <div class="stat-box border-blue-500/20"><span class="stat-val text-blue-400">${stats.insrv}</span><span class="stat-lab">Calib</span></div>
                            <div class="stat-box border-red-500/30 ${stats.unsrv > 0 ? 'animate-pulse' : ''}"><span class="stat-val text-red-500">${stats.unsrv}</span><span class="stat-lab">Damaged</span></div>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="master-table">
                            <thead><tr><th>PN</th><th>Description</th><th>Note</th><th>Status</th><th class="text-right">Action</th></tr></thead>
                            <tbody>
                                ${items.map(item => `
                                    <tr class="group hover:bg-white/5 border-b border-white/[0.02] ${item.Status === 'Unserviceable (Damaged)' ? 'bg-red-500/5 border-l-4 border-l-red-500' : ''}">
                                        <td class="font-mono text-sky-400 text-[10px]">${item.EqpPartNumber}</td>
                                        <td class="font-black text-white uppercase text-[10px]">${item.EqpDescription}</td>
                                        <td class="opacity-60 text-[10px]">${item.Note || '-'}</td>
                                        <td>
                                            <select onchange="quickUpdateStatus('${item.Timestamp}', this.value)" class="bg-transparent border-none text-[10px] font-bold outline-none cursor-pointer">
                                                ${['Servicable (good condition)', 'Unserviceable (Damaged)', 'In Service (Calibrated)'].map(s => `<option ${item.Status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                            </select>
                                        </td>
                                        <td class="text-right">
                                            <div class="flex gap-2 justify-end opacity-0 group-hover:opacity-100 transition">
                                                <button onclick='editItem(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="text-sky-500/50 hover:text-sky-400 transition"><i data-lucide="edit-3" size="14"></i></button>
                                                <button onclick="deleteItem('${item.Timestamp}')" class="text-red-500/30 hover:text-red-500 transition"><i data-lucide="trash-2" size="14"></i></button>
                                            </div>
                                        </td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function openModal(mode) {
            currentMode = mode; editId = null; document.getElementById('eq-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = mode === 'bulk' ? 'Bulk Registry Engine' : 'Manual Item Entry';
            document.getElementById('single-container').classList.toggle('hidden', mode === 'bulk');
            document.getElementById('bulk-container').classList.toggle('hidden', mode === 'single');
            if(mode === 'bulk') focusBuffer();
        }

        function editItem(item) {
            openModal('single'); editId = item.Timestamp; document.getElementById('modal-title').innerText = 'Edit Inventory Record';
            document.getElementById('UnitCode').value = item.UnitCode; document.getElementById('s-pno').value = item.EqpPartNumber;
            document.getElementById('s-desc').value = item.EqpDescription; document.getElementById('s-note').value = item.Note; document.getElementById('s-status').value = item.Status;
        }

        function closeModal() { document.getElementById('eq-modal').classList.add('hidden'); bulkData = []; editId = null; }
        function focusBuffer() { document.getElementById('paste-buffer').focus(); }

        document.getElementById('paste-buffer').addEventListener('paste', (e) => {
            e.preventDefault();
            const raw = (e.clipboardData || window.clipboardData).getData('text');
            const rows = raw.split(/\r\n|\n/).filter(r => r.trim() !== "");
            bulkData = rows.map(r => { const cols = r.split('\t'); return { pno: cols[0] || '', desc: cols[1] || '', note: cols[2] || '' }; });
            renderBulkTable();
        });

        function renderBulkTable() {
            document.getElementById('bulk-table-body').innerHTML = bulkData.length ? bulkData.map((d, i) => `<tr><td><input value="${d.pno}" oninput="bulkData[${i}].pno=this.value" class="bg-transparent border-none outline-none w-full"></td><td><input value="${d.desc}" oninput="bulkData[${i}].desc=this.value" class="bg-transparent border-none outline-none w-full uppercase"></td><td><input value="${d.note}" oninput="bulkData[${i}].note=this.value" class="bg-transparent border-none outline-none w-full opacity-60"></td><td><button onclick="bulkData.splice(${i},1);renderBulkTable()" class="text-red-500/20 hover:text-red-500"><i data-lucide="x" size="14"></i></button></td></tr>`).join('') : '<tr><td colspan="4" class="text-center py-10 opacity-20 italic">No stream...</td></tr>';
            lucide.createIcons();
        }

        async function submitData() {
            loader.style.display = 'flex';
            try {
                if(currentMode === 'single') {
                    await API.post({ tab: TAB_NAME, action: editId ? 'update' : 'add', primaryId: editId || document.getElementById('s-pno').value, UnitCode: document.getElementById('UnitCode').value, EqpPartNumber: document.getElementById('s-pno').value, EqpDescription: document.getElementById('s-desc').value, Status: document.getElementById('s-status').value, Note: document.getElementById('s-note').value });
                } else {
                    for(let d of bulkData) await API.post({ tab: TAB_NAME, action: 'add', UnitCode: document.getElementById('UnitCode').value, EqpPartNumber: d.pno, EqpDescription: d.desc, Status: 'Servicable (good condition)', Note: d.note, primaryId: d.pno });
                }
                closeModal(); await init();
            } catch(e) { loader.style.display = 'none'; }
        }

        async function quickUpdateStatus(ts, status) { loader.style.display = 'flex'; try { await API.post({ tab: TAB_NAME, action: 'update', primaryId: ts, Status: status }); await init(); } catch(e) { loader.style.display = 'none'; } }
        async function deleteItem(ts) {
            const res = await Swal.fire({ title: 'Purge Item?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) { loader.style.display = 'flex'; try { await API.post({ tab: 'EQUIPMENT', action: 'delete', primaryId: ts }); await init(); } catch(e) { loader.style.display = 'none'; } }
        }
        init();
    </script>
</body>
</html>
