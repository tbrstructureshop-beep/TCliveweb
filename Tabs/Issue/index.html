<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --panel: #151921; --border: rgba(255, 255, 255, 0.1); --accent: #0ea5e9; 
            --text-primary: #ffffff; --text-secondary: #94a3b8; --input-bg: rgba(255, 255, 255, 0.05);
        }
        .light { 
            --bg: transparent; --panel: #ffffff; --border: #e2e8f0; --accent: #0284c7; 
            --text-primary: #1e293b; --text-secondary: #475569; --input-bg: #f8fafc;
        }
        body { background: transparent; color: var(--text-secondary); font-family: 'Inter', sans-serif; transition: all 0.3s ease; overflow-x: hidden; }
        
        /* Unit Tab Navigation */
        .unit-nav-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; }
        .unit-nav { display: flex; gap: 0.5rem; padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 1.25rem; border: 1px solid var(--border); overflow-x: auto; flex: 1; scroll-behavior: smooth; }
        .unit-nav::-webkit-scrollbar { display: none; }
        .unit-tab { padding: 0.75rem 1.5rem; border-radius: 1rem; font-size: 11px; font-weight: 800; white-space: nowrap; transition: 0.3s; color: var(--text-secondary); border: 1px solid transparent; }
        .unit-tab.active { background: var(--accent); color: white !important; box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4); }
        .nav-arrow { background: var(--panel); border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; display: flex; items-center; justify-content: center; color: var(--accent); cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .nav-arrow:hover { background: var(--accent); color: white; }

        .issue-card { background-color: var(--panel) !important; border: 1px solid var(--border) !important; border-radius: 2.5rem; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 15px 35px -10px rgba(0,0,0,0.3); }
        
        .escalation-banner { background: linear-gradient(90deg, rgba(239, 68, 68, 0.15) 0%, rgba(245, 158, 11, 0.05) 100%); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; backdrop-filter: blur(10px); }
        h1, h2, h3, h4, .text-white { color: var(--text-primary) !important; }

        /* Widgets */
        .stat-box { flex: 1; min-width: 80px; padding: 12px 8px; border-radius: 1.25rem; border: 1px solid var(--border); text-align: center; background: var(--input-bg); transition: 0.3s; }
        .stat-val { display: block; font-size: 1.25rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
        .stat-lab { font-size: 8px; font-weight: 800; text-transform: uppercase; opacity: 0.5; }

        /* Table */
        .master-table { width: 100%; font-size: 11px; }
        .master-table th { padding: 12px; text-align: left; opacity: 0.4; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .master-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); vertical-align: middle; }

        .input-field, .st-select { width: 100%; background: var(--input-bg) !important; border: 1px solid var(--border) !important; color: var(--text-primary) !important; border-radius: 0.75rem; padding: 0.75rem; outline: none; font-size: 0.875rem; }
        select option { background-color: #ffffff !important; color: #1e293b !important; }
        :not(.light) select option { background-color: #151921 !important; color: #ffffff !important; }

        #local-loader { display: none; position: fixed; inset: 0; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        
        .light .bg-sky-500\/10 { background-color: rgba(2, 132, 199, 0.1); border-color: rgba(2, 132, 199, 0.2); }
        .light .text-sky-500 { color: #0369a1 !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin mb-3"></div>
        <span class="text-[10px] font-mono text-sky-500 font-bold uppercase tracking-widest">Scanning_Issues...</span>
    </div>

    <!-- ESCALATION BANNER (Main Note) -->
    <div class="escalation-banner flex items-start gap-4">
        <div class="bg-red-500/20 p-3 rounded-xl text-red-500 animate-pulse"><i data-lucide="alert-triangle" size="24"></i></div>
        <div>
            <h3 class="font-bold text-sm uppercase tracking-wider mb-1">Peringatan Keputusan & Eskalasi</h3>
            <p class="text-xs opacity-70 leading-relaxed italic">Laporkan setiap isu yang membutuhkan keputusan atau dukungan di luar kewenangan shift. Segera hubungi Node Leader untuk tindakan kritis.</p>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
        <div>
            <h1 class="text-2xl font-black text-white uppercase tracking-tighter">5M Management Issue</h1>
            <p class="text-[10px] opacity-40 font-mono uppercase tracking-widest">Critical Blockers Registry</p>
        </div>
        <button onclick="openModal('add')" class="bg-red-600 hover:bg-red-500 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase transition-all shadow-lg shadow-red-600/20 active:scale-95">
            <i data-lucide="plus-circle" class="inline-block mr-1" size="14"></i> Raise Issue
        </button>
    </div>

    <!-- UNIT TAB SWITCHER -->
    <div class="unit-nav-wrapper">
        <button onclick="scrollNav(-150)" class="nav-arrow"><i data-lucide="chevron-left" size="16"></i></button>
        <div id="unit-tabs" class="unit-nav"></div>
        <button onclick="scrollNav(150)" class="nav-arrow"><i data-lucide="chevron-right" size="16"></i></button>
    </div>

    <div id="issue-display"></div>

    <!-- MODAL -->
    <div id="issue-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest">Issue Entry</h3>
                <button onclick="closeModal()" class="p-2 text-white/30 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <div class="p-8 overflow-y-auto flex-1 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label class="label-style">Reporting Node</label><select id="UnitCode" class="input-field"></select></div>
                    <div><label class="label-style">5M Category</label><select id="s-cat" class="input-field">
                        <option value="Man">MAN (Manpower)</option><option value="Machine">MACHINE (Equipment)</option>
                        <option value="Material">MATERIAL (Supply)</option><option value="Method">METHOD (Process)</option>
                        <option value="Money">MONEY (Budget)</option>
                    </select></div>
                </div>
                <div><label class="label-style">Finding Detail</label><textarea id="s-detail" class="input-field h-28 resize-none" placeholder="Describe blockers..."></textarea></div>
                <div><label class="label-style">Initial Status</label><select id="s-status" class="input-field"><option>Top Urgent</option><option>Highlighted</option><option>Open</option><option>Progress</option><option>Closed</option></select></div>
            </div>
            <div class="p-8 border-t border-white/5"><button id="submit-btn" onclick="submitIssue()" class="w-full bg-red-600 py-4 rounded-2xl font-black text-white hover:bg-red-500 uppercase tracking-widest text-[10px]">Execute Escalation</button></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const TAB_NAME = 'ISSUE';
        const PRIORITY = { 'Top Urgent': 0, 'Highlighted': 1, 'Open': 2, 'Progress': 3, 'Closed': 4 };
        let cachedIssues = [], activeUnit = null, currentAction = 'add', editId = null;

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, issueRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                cachedIssues = issueRes.data || [];
                document.getElementById('UnitCode').innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderTabs(unitRes.data);
                if(!activeUnit && unitRes.data.length > 0) activeUnit = unitRes.data[0].UnitCode;
                renderView();
            } catch (e) { Swal.fire('Error', 'Communication Link Failure', 'error'); } finally { loader.style.display = 'none'; }
        }

        function renderTabs(units) {
            document.getElementById('unit-tabs').innerHTML = units.map(u => `<button onclick="switchUnit('${u.UnitCode}')" class="unit-tab ${u.UnitCode === activeUnit ? 'active' : ''}">${u.UnitCode}</button>`).join('');
        }

        function scrollNav(amt) { document.getElementById('unit-tabs').scrollLeft += amt; }

        function switchUnit(uCode) {
            activeUnit = uCode;
            document.querySelectorAll('.unit-tab').forEach(t => t.classList.toggle('active', t.innerText === uCode));
            renderView();
        }

        function renderView() {
            const container = document.getElementById('issue-display');
            const items = cachedIssues.filter(i => i.UnitCode === activeUnit).sort((a, b) => PRIORITY[a.Status] - PRIORITY[b.Status]);
            
            if(!activeUnit) { container.innerHTML = `<div class="py-20 text-center opacity-20 font-mono uppercase tracking-widest">Select_Node_To_Start</div>`; return; }

            const stats = { total: items.length, urgent: items.filter(i => i.Status === 'Top Urgent').length, high: items.filter(i => i.Status === 'Highlighted').length, open: items.filter(i => i.Status === 'Open').length, done: items.filter(i => i.Status === 'Closed').length };

            container.innerHTML = `
                <div class="issue-card animate-in fade-in duration-500">
                    <div class="flex flex-col xl:flex-row justify-between items-center gap-6 mb-8">
                        <div class="w-full xl:w-auto"><span class="label-style">Reporting Node</span><h2 class="text-4xl font-black text-white tracking-tighter">${activeUnit}</h2></div>
                        <div class="flex flex-wrap gap-2 w-full xl:w-auto">
                            <div class="stat-box"><span class="stat-val">${stats.total}</span><span class="stat-lab">Total</span></div>
                            <div class="stat-box border-red-500/30"><span class="stat-val text-red-500">${stats.urgent}</span><span class="stat-lab text-red-500">Urgent</span></div>
                            <div class="stat-box border-purple-500/20"><span class="stat-val text-purple-400">${stats.high}</span><span class="stat-lab text-purple-400">High</span></div>
                            <div class="stat-box border-emerald-500/20"><span class="stat-val text-emerald-400">${stats.done}</span><span class="stat-lab text-emerald-400">Done</span></div>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="master-table">
                            <thead><tr><th>Category</th><th>Issue Detail</th><th>Status</th><th class="text-right">Action</th></tr></thead>
                            <tbody>
                                ${items.map(item => {
                                    let borderStyle = item.Status === 'Top Urgent' ? "border-l-4 border-l-red-500 bg-red-500/5" : (item.Status === 'Highlighted' ? "border-l-4 border-l-purple-500 bg-purple-500/5" : "");
                                    return `
                                    <tr class="group/row hover:bg-white/5 ${borderStyle}">
                                        <td><span class="px-2 py-0.5 rounded bg-white/5 text-[9px] font-black uppercase border border-white/5">${item.Category}</span></td>
                                        <td class="text-white/60 leading-relaxed text-[10px] max-w-sm">${item.Detail}</td>
                                        <td>
                                            <select onchange="updateStatus('${activeUnit}', '${item.Timestamp}', this.value)" class="bg-transparent border-none text-[10px] font-bold outline-none cursor-pointer">
                                                ${['Top Urgent', 'Highlighted', 'Open', 'Progress', 'Closed'].map(s => `<option ${item.Status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                            </select>
                                        </td>
                                        <td class="text-right">
                                            <div class="flex gap-2 justify-end opacity-0 group-hover/row:opacity-100 transition">
                                                <button onclick="editIssue('${item.Timestamp}')" class="text-sky-500/50 hover:text-sky-400"><i data-lucide="edit-3" size="14"></i></button>
                                                <button onclick="deleteIssue('${item.Timestamp}')" class="text-red-500/30 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                                            </div>
                                        </td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function openModal(mode = 'add') {
            currentAction = mode; document.getElementById('issue-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = mode === 'add' ? 'Raise New Issue' : 'Update Registry';
            if(mode === 'add') { document.getElementById('s-detail').value = ''; editId = null; }
        }

        function closeModal() { document.getElementById('issue-modal').classList.add('hidden'); }

        function editIssue(ts) {
            const item = cachedIssues.find(i => i.Timestamp === ts);
            if(!item) return; editId = ts;
            document.getElementById('UnitCode').value = item.UnitCode;
            document.getElementById('s-cat').value = item.Category;
            document.getElementById('s-detail').value = item.Detail;
            document.getElementById('s-status').value = item.Status;
            openModal('update');
        }

        async function submitIssue() {
            const detail = document.getElementById('s-detail').value;
            if(!detail) return Swal.fire('Error', 'Detail is required', 'error');
            loader.style.display = 'flex';
            try {
                await API.post({ tab: TAB_NAME, action: currentAction, UnitCode: document.getElementById('UnitCode').value, Category: document.getElementById('s-cat').value, Detail: detail, Status: document.getElementById('s-status').value, primaryId: editId || document.getElementById('UnitCode').value });
                closeModal(); await init();
                Swal.fire({ icon: 'success', title: 'Issue Synced', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false });
            } catch(e) { loader.style.display = 'none'; }
        }

        async function updateStatus(u, ts, status) {
            loader.style.display = 'flex';
            try { await API.post({ tab: TAB_NAME, action: 'update', primaryId: ts, Status: status }); await init(); } catch(e) { loader.style.display = 'none'; }
        }

        async function deleteIssue(ts) {
            const res = await Swal.fire({ title: 'Purge Entry?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) { loader.style.display = 'flex'; try { await API.post({ tab: 'ISSUE', action: 'delete', primaryId: ts }); await init(); } catch(e) { loader.style.display = 'none'; } }
        }

        init();
    </script>
</body>
</html>
