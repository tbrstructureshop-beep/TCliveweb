<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --panel: #151921; 
            --border: rgba(255, 255, 255, 0.1); 
            --accent: #0ea5e9; 
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --input-bg: rgba(255, 255, 255, 0.05);
        }
        
        .light { 
            --bg: transparent;
            --panel: #ffffff; 
            --border: #e2e8f0; 
            --accent: #0284c7;
            --text-primary: #1e293b; 
            --text-secondary: #475569; 
            --input-bg: #f8fafc;
        }
        
        body { 
            background: transparent; 
            color: var(--text-secondary); 
            font-family: 'Inter', sans-serif; 
            transition: all 0.3s ease;
        }
        
        .issue-card {
            background-color: var(--panel) !important;
            border: 1px solid var(--border) !important;
            border-radius: 2.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .issue-card:hover { 
            border-color: var(--accent) !important;
            transform: translateY(-2px);
        }

        .escalation-banner {
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.15) 0%, rgba(245, 158, 11, 0.05) 100%);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2.5rem;
            backdrop-filter: blur(10px);
        }

        h1, h2, h3, h4, .text-white { color: var(--text-primary) !important; }

        .input-field, .st-select {
            width: 100%;
            background-color: var(--input-bg) !important;
            border: 1px solid var(--border) !important;
            border-radius: 0.75rem;
            padding: 0.75rem;
            outline: none;
            color: var(--text-primary) !important;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            appearance: none;
        }

        select option { background-color: #ffffff !important; color: #1e293b !important; }
        :not(.light) select option { background-color: #151921 !important; color: #ffffff !important; }

        .label-style { text-transform: uppercase; font-size: 10px; font-weight: 700; color: var(--text-secondary); opacity: 0.8; margin-bottom: 0.25rem; display: block; letter-spacing: 0.1em; }

        .stat-box { flex: 1; min-width: 70px; padding: 10px 5px; border-radius: 1rem; border: 1px solid var(--border); text-align: center; background: rgba(0,0,0,0.2); }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
        .stat-lab { font-size: 7px; font-weight: 800; text-transform: uppercase; opacity: 0.5; }

        #issue-modal > div { background-color: var(--panel) !important; border: 1px solid var(--border) !important; width: 100%; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }

        #local-loader { display: none; position: fixed; inset: 0; background: var(--bg); backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-sky-500 animate-pulse font-bold">Scanning_System_Issues...</span>
        </div>
    </div>

    <!-- ESCALATION NOTE -->
    <div class="escalation-banner flex items-start gap-4">
        <div class="bg-red-500/20 p-3 rounded-xl text-red-500 animate-pulse">
            <i data-lucide="alert-triangle" size="24"></i>
        </div>
        <div>
            <h3 class="text-white font-bold text-sm uppercase tracking-wider mb-1">Peringatan Keputusan & Eskalasi</h3>
            <p class="text-xs text-white/60 leading-relaxed italic">
                Laporkan setiap isu yang membutuhkan keputusan atau dukungan di luar kewenangan shift.
            </p>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tighter uppercase">5M Management Issue</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Man · Machine · Material · Method · Money</p>
        </div>
        <button onclick="openModal('add')" class="bg-red-600 hover:bg-red-500 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-red-600/20 transition-all active:scale-95">
            <i data-lucide="plus-circle" size="18"></i> RAISE NEW ISSUE
        </button>
    </div>

    <div id="issue-container"></div>

    <!-- MODAL -->
    <div id="issue-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest">Issue Log Entry</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="label-style">Reporting Node (Unit)</label>
                        <select id="UnitCode" class="input-field"></select>
                    </div>
                    <div>
                        <label class="label-style">5M Category</label>
                        <select id="s-cat" class="input-field">
                            <option value="Man">MAN (Manpower / OVT Extension)</option>
                            <option value="Machine">MACHINE (Equipment Manual / Buy-Lease)</option>
                            <option value="Material">MATERIAL (Low Stock / Fast Order)</option>
                            <option value="Method">METHOD (Vendor Manual / Mfg Method)</option>
                            <option value="Money">MONEY (Budget / Payment Issues)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="label-style">Issue Detail & Findings</label>
                    <textarea id="s-detail" class="input-field h-28 resize-none" placeholder="Explain the decision needed..."></textarea>
                </div>

                <div>
                    <label class="label-style">Initial Priority Status</label>
                    <select id="s-status" class="input-field">
                        <option>Top Urgent</option><option>Highlighted</option><option>Open</option><option>Progress</option><option>Closed</option>
                    </select>
                </div>
            </div>

            <div class="p-8 border-t border-white/5 bg-white/[0.01]">
                <button id="submit-btn" onclick="submitIssue()" class="w-full bg-red-600 py-4 rounded-2xl font-black text-white hover:bg-red-500 transition-all uppercase tracking-widest text-xs">Authorize & Escalate</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const TAB_NAME = 'ISSUE';
        const PRIORITY = { 'Top Urgent': 0, 'Highlighted': 1, 'Open': 2, 'Progress': 3, 'Closed': 4 };
        let currentAction = 'add';
        let editId = null;
        let cachedIssues = [];

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, issueRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                cachedIssues = issueRes.data;
                document.getElementById('UnitCode').innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderIssues(cachedIssues);
            } catch (e) { Swal.fire('Error', 'Network connection unstable.', 'error'); } finally { loader.style.display = 'none'; }
        }

        function renderIssues(data) {
            const container = document.getElementById('issue-container');
            const grouped = data.reduce((acc, item) => {
                const uc = item.UnitCode || 'Unassigned';
                if(!acc[uc]) acc[uc] = [];
                acc[uc].push(item);
                return acc;
            }, {});

            if(Object.keys(grouped).length === 0) {
                container.innerHTML = `<div class="py-32 text-center opacity-20 font-mono tracking-[0.5em]">ALL_SYSTEMS_CLEAR</div>`;
                return;
            }

            container.innerHTML = Object.keys(grouped).map(uCode => {
                const items = grouped[uCode].sort((a, b) => PRIORITY[a.Status] - PRIORITY[b.Status]);
                
                return `
                <div class="issue-card">
                    <div class="flex flex-col xl:flex-row justify-between items-center gap-6 mb-8">
                        <h2 class="text-3xl font-black text-white tracking-tighter uppercase">${uCode}</h2>
                    </div>

                    <details class="group" open>
                        <summary class="list-none flex items-center justify-between p-4 bg-white/5 border border-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition">
                            <span class="text-[10px] font-bold tracking-widest uppercase text-red-400">Task Escalate Details</span>
                            <i data-lucide="chevron-down" class="group-open:rotate-180 transition"></i>
                        </summary>
                        <div class="mt-6 overflow-x-auto">
                            <table class="w-full text-left text-xs">
                                <thead class="opacity-20 uppercase font-bold border-b border-white/5">
                                    <tr><th class="p-3">Category</th><th class="p-3">Issue Detail</th><th class="p-3">Status</th><th class="p-3 text-right">Actions</th></tr>
                                </thead>
                                <tbody>
                                    ${items.map(item => `
                                        <tr class="border-b border-white/[0.02] hover:bg-white/[0.02]">
                                            <td class="p-3"><span class="font-black text-white uppercase text-[10px]">${item.Category}</span></td>
                                            <td class="p-3 opacity-60 text-[11px] leading-relaxed max-w-xs">${item.Detail || '-'}</td>
                                            <td class="p-3">
                                                <select onchange="updateStatus('${uCode}', '${item.Timestamp}', this.value)" class="st-select">
                                                    ${['Top Urgent', 'Highlighted', 'Open', 'Progress', 'Closed'].map(s => `<option ${item.Status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                                </select>
                                            </td>
                                            <td class="p-3 text-right">
                                                <div class="flex justify-end gap-2">
                                                    <button onclick="editIssue('${item.Timestamp}')" class="text-white/10 hover:text-sky-500 transition"><i data-lucide="edit-3" size="14"></i></button>
                                                    <button onclick="deleteIssue('${item.Timestamp}')" class="text-white/10 hover:text-red-500 transition"><i data-lucide="trash-2" size="14"></i></button>
                                                </div>
                                            </td>
                                        </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </details>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function openModal(mode = 'add') {
            currentAction = mode;
            document.getElementById('issue-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = mode === 'add' ? 'Raise New Issue' : 'Update Issue Entry';
            document.getElementById('submit-btn').innerText = mode === 'add' ? 'Authorize & Escalate' : 'Update & Resync';
            if(mode === 'add') {
                document.getElementById('s-detail').value = '';
                editId = null;
            }
        }

        function closeModal() { document.getElementById('issue-modal').classList.add('hidden'); }

        function editIssue(timestamp) {
            const item = cachedIssues.find(i => i.Timestamp === timestamp);
            if(!item) return;

            editId = timestamp;
            document.getElementById('UnitCode').value = item.UnitCode;
            document.getElementById('s-cat').value = item.Category;
            document.getElementById('s-detail').value = item.Detail;
            document.getElementById('s-status').value = item.Status;

            openModal('update');
        }

        async function submitIssue() {
            const detail = document.getElementById('s-detail').value;
            if(!detail) return Swal.fire('Error', 'Detail cannot be empty', 'error');

            loader.style.display = 'flex';
            try {
                const payload = {
                    tab: TAB_NAME, 
                    action: currentAction,
                    UnitCode: document.getElementById('UnitCode').value,
                    Category: document.getElementById('s-cat').value,
                    Detail: detail,
                    Status: document.getElementById('s-status').value,
                    primaryId: currentAction === 'update' ? editId : document.getElementById('UnitCode').value,
                    Timestamp: currentAction === 'update' ? editId : undefined
                };

                await API.post(payload);
                Swal.fire({ icon: 'success', title: currentAction === 'add' ? 'Issue Escalated' : 'Record Updated', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false });
                closeModal(); init();
            } catch(e) { Swal.fire('Error', 'Commit Failed', 'error'); } finally { loader.style.display = 'none'; }
        }

        async function updateStatus(uCode, timestamp, status) {
            loader.style.display = 'flex';
            await API.post({ tab: TAB_NAME, action: 'update', primaryId: timestamp, Status: status });
            init();
        }

        async function deleteIssue(timestamp) {
            const res = await Swal.fire({ title: 'Purge Entry?', text: "Permanent removal.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) {
                loader.style.display = 'flex';
                await API.post({ tab: TAB_NAME, action: 'delete', primaryId: timestamp });
                init();
            }
        }

        init();
    </script>
</body>
</html>
