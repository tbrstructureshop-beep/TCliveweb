<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --panel: #151921; --border: rgba(255, 255, 255, 0.1); --accent: #0ea5e9; 
            --c-planned: #94a3b8; --c-pro: #3b82f6; --c-done: #10b981; --c-urgent: #ef4444;
        }
        body { background: transparent; color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Plan Card Industrial */
        .plan-card { 
            background-color: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); 
            border-radius: 2.5rem; padding: 2rem; margin-bottom: 2rem; transition: all 0.3s ease; 
        }
        .plan-card:hover { border-color: rgba(14, 165, 233, 0.2); }

        .group-zone { margin-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1rem; }
        .group-header { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; display: flex; items-center: center; gap: 8px; }

        .input-field { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 0.75rem; padding: 0.75rem; outline: none; color: white; font-size: 0.875rem; transition: all 0.2s ease; }
        .input-field:focus { border-color: var(--accent); }
        
        .label-style { text-transform: uppercase; font-size: 10px; font-weight: 700; opacity: 0.4; margin-bottom: 0.25rem; display: block; letter-spacing: 0.1em; }

        .st-select { background: #0b0e14; border: 1px solid var(--border); border-radius: 6px; font-size: 10px; font-weight: 700; color: white; padding: 4px 8px; outline: none; }
        
        #local-loader { display: none; position: fixed; inset: 0; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }

        .badge-scope { font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #262c36; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-sky-500 animate-pulse font-bold">Synchronizing_Future_Plans...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tighter uppercase">Next Cycle Planning</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Strategic Target & Resource Readiness</p>
        </div>
        <button onclick="openModal()" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-sky-600/20 transition-all active:scale-95">
            <i data-lucide="calendar-plus" size="18"></i> CREATE NEW PLAN
        </button>
    </div>

    <div id="plan-container"></div>

    <!-- MODAL -->
    <div id="plan-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <h3 class="text-xl font-bold text-white uppercase tracking-widest text-sky-400">Planning Engine</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="label-style">Reporting Node (Unit)</label>
                        <select id="UnitCode" class="input-field"></select>
                    </div>
                    <div>
                        <label class="label-style">Prototype Grouping</label>
                        <select id="s-group" class="input-field">
                            <option value="Group_1">1. Target Utama Shift Berikutnya</option>
                            <option value="Group_2">2. Item Menunggu Dukungan Unit Lain</option>
                            <option value="Group_3">3. Eskalasi / Keputusan Management</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="label-style">Functional Scope</label>
                    <select id="s-scope" class="input-field">
                        <option>Production Team</option>
                        <option>Engineering Support</option>
                        <option>Material & MPC</option>
                        <option>Tool & Equipment Team</option>
                        <option>Keuangan / Finance</option>
                        <option>Leader & Top Leader</option>
                    </select>
                </div>

                <div>
                    <label class="label-style">Plan / Target Description</label>
                    <textarea id="s-detail" class="input-field h-28 resize-none" placeholder="What needs to be achieved or decided?"></textarea>
                </div>

                <div>
                    <label class="label-style">Execution Status</label>
                    <select id="s-status" class="input-field">
                        <option>Planned</option>
                        <option>In Progress</option>
                        <option>Achieved</option>
                    </select>
                </div>
            </div>

            <div class="p-8 border-t border-white/5 bg-white/[0.01]">
                <button onclick="submitPlan()" class="w-full bg-sky-600 py-4 rounded-2xl font-black text-white hover:bg-sky-500 transition-all uppercase tracking-widest text-xs">Commit Plan to Cycle</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const TAB_NAME = 'NEXT PLAN';
        const STATUS_PRIO = { 'In Progress': 0, 'Planned': 1, 'Achieved': 2 };

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, planRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                document.getElementById('UnitCode').innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderData(planRes.data);
            } catch (e) { Swal.fire('Error', 'Communication Failed', 'error'); } finally { loader.style.display = 'none'; }
        }

        function renderData(data) {
            const container = document.getElementById('plan-container');
            const groupedByUnit = data.reduce((acc, item) => {
                const uc = item.UnitCode || 'Unknown';
                if(!acc[uc]) acc[uc] = [];
                acc[uc].push(item);
                return acc;
            }, {});

            if(Object.keys(groupedByUnit).length === 0) {
                container.innerHTML = `<div class="py-32 text-center opacity-20 font-mono tracking-[0.5em]">NO_PLANS_RECORDED</div>`;
                return;
            }

            container.innerHTML = Object.keys(groupedByUnit).map(uCode => {
                const items = groupedByUnit[uCode];
                
                return `
                <div class="plan-card">
                    <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-6">
                        <div>
                            <span class="label-style">Reporting Node</span>
                            <h2 class="text-3xl font-black text-white tracking-tighter uppercase">${uCode}</h2>
                        </div>
                        <div class="h-12 w-12 rounded-2xl bg-sky-500/10 flex items-center justify-center border border-sky-500/20">
                            <i data-lucide="layers-3" class="text-sky-500"></i>
                        </div>
                    </div>

                    ${renderGroupSection(items, 'Group_1', 'Target Utama Shift Berikutnya', 'target')}
                    ${renderGroupSection(items, 'Group_2', 'Menunggu Dukungan Unit Lain', 'users')}
                    ${renderGroupSection(items, 'Group_3', 'Eskalasi / Keputusan Management', 'shield-alert')}
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function renderGroupSection(items, groupKey, title, icon) {
            const filtered = items.filter(i => (i.ScopeGroup === groupKey || i.Category === title)) // Support old data if exists
                                 .sort((a, b) => STATUS_PRIO[a.Status] - STATUS_PRIO[b.Status]);
            
            if(filtered.length === 0) return '';

            return `
            <div class="group-zone">
                <div class="group-header ${groupKey === 'Group_3' ? 'text-red-500' : 'text-sky-500/60'}">
                    <i data-lucide="${icon}" size="12"></i> ${title}
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <tbody>
                            ${filtered.map(item => `
                                <tr class="border-b border-white/[0.02] group/row">
                                    <td class="py-3 pr-4 w-32">
                                        <span class="badge-scope">${item.FunctionalScope || 'Production'}</span>
                                    </td>
                                    <td class="py-3 pr-4 opacity-70 leading-relaxed font-medium">
                                        ${item.Detail}
                                        <div class="text-[8px] opacity-30 mt-1 font-mono uppercase">${item.Timestamp}</div>
                                    </td>
                                    <td class="py-3 pr-4 w-32">
                                        <select onchange="updatePlanStatus('${item.Timestamp}', this.value)" class="st-select">
                                            ${['Planned', 'In Progress', 'Achieved'].map(s => `<option ${item.Status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                        </select>
                                    </td>
                                    <td class="py-3 text-right w-10">
                                        <button onclick="deletePlan('${item.Timestamp}')" class="text-white/10 hover:text-red-500 transition opacity-0 group-hover/row:opacity-100">
                                            <i data-lucide="trash-2" size="14"></i>
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>`;
        }

        // --- CORE LOGIC ---
        function openModal() { document.getElementById('plan-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('plan-modal').classList.add('hidden'); }

        async function submitPlan() {
            const detail = document.getElementById('s-detail').value;
            if(!detail) return Swal.fire('Error', 'Detail is mandatory', 'error');

            loader.style.display = 'flex';
            try {
                await API.post({
                    tab: TAB_NAME, action: 'add',
                    UnitCode: document.getElementById('UnitCode').value,
                    ScopeGroup: document.getElementById('s-group').value,
                    FunctionalScope: document.getElementById('s-scope').value,
                    Detail: detail,
                    Status: document.getElementById('s-status').value,
                    primaryId: Date.now()
                });
                Swal.fire({ icon: 'success', title: 'Plan Deployed', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false });
                closeModal(); init();
                document.getElementById('s-detail').value = '';
            } catch(e) { Swal.fire('Error', 'Execution Failed', 'error'); } finally { loader.style.display = 'none'; }
        }

        async function updatePlanStatus(timestamp, status) {
            loader.style.display = 'flex';
            await API.post({ tab: TAB_NAME, action: 'update', primaryId: timestamp, Status: status });
            init();
        }

        async function deletePlan(timestamp) {
            const res = await Swal.fire({ title: 'Delete Plan?', text: "Permanent removal from node strategy.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) {
                loader.style.display = 'flex';
                await API.post({ tab: TAB_NAME, action: 'delete', primaryId: timestamp });
                init();
            }
        }

        init();
    </script>
</body>
</html>
