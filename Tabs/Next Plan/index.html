<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --panel: #151921; --border: rgba(255, 255, 255, 0.1); --accent: #0ea5e9; 
            --text-primary: #ffffff; --text-secondary: #94a3b8; --input-bg: rgba(255, 255, 255, 0.05);
        }
        .light { 
            --bg: transparent; --panel: #ffffff; --border: #e2e8f0; --accent: #0284c7;
            --text-primary: #1e293b; --text-secondary: #475569; --input-bg: #f8fafc;
        }
        body { background: transparent; color: var(--text-secondary); font-family: 'Inter', sans-serif; overflow-x: hidden; transition: all 0.3s ease; }
        
        /* CARD SYSTEM */
        .plan-card { 
            background-color: var(--panel) !important; border: 1px solid var(--border) !important; 
            border-radius: 2.5rem; padding: 2rem; margin-bottom: 2rem; transition: all 0.3s ease; 
        }

        /* STAT CARDS Summary */
        .stat-square {
            border-radius: 1.5rem; padding: 1.25rem; border: 1px solid var(--border);
            background: var(--input-bg); transition: transform 0.2s;
        }
        .stat-square:hover { transform: translateY(-3px); border-color: var(--accent); }
        .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--text-primary); line-height: 1; }
        .stat-desc { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.6; margin-top: 4px; }

        /* Accordion List */
        details { background: var(--input-bg); border: 1px solid var(--border); border-radius: 1.25rem; overflow: hidden; }
        summary { 
            list-style: none; padding: 1.25rem; cursor: pointer; display: flex; align-items: center; 
            justify-content: space-between; font-size: 11px; font-weight: 800; text-transform: uppercase; 
            color: var(--accent); 
        }
        summary::-webkit-details-marker { display: none; }
        .details-content { padding: 0; border-top: 1px solid var(--border); }

        /* INPUTS */
        .input-field, .st-select { 
            width: 100%; background: var(--input-bg) !important; border: 1px solid var(--border) !important; 
            color: var(--text-primary) !important; border-radius: 0.75rem; padding: 0.75rem; outline: none; font-size: 0.875rem; 
        }
        select option { background-color: white !important; color: #1e293b !important; }
        .dark select option { background-color: #151921 !important; color: white !important; }

        /* TABLE */
        .bulk-table { width: 100%; font-size: 11px; color: var(--text-primary); }
        .bulk-table th { text-align: left; padding: 12px; opacity: 0.4; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .bulk-table td { padding: 12px; border-bottom: 1px solid var(--border); }

        #local-loader { 
            display: none; position: fixed; inset: 0; background: var(--bg); 
            backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; 
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-sky-500 animate-pulse font-bold">Consolidating_Plans...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tighter uppercase">Predictive Cycle</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Quad-Section Performance Architecture</p>
        </div>
        <button onclick="openModal('add')" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-sky-600/20 transition-all active:scale-95">
            <i data-lucide="layout-grid" size="18"></i> CONFIGURE MULTI-PLAN
        </button>
    </div>

    <div id="plan-container"></div>

    <!-- MODAL -->
    <div id="plan-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-6xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest text-sky-400">Planning Engine</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="text-[10px] uppercase font-bold opacity-40 ml-1">Target Node</label>
                        <select id="UnitCode" class="input-field"></select>
                    </div>
                </div>

                <div class="border border-white/5 rounded-2xl overflow-hidden bg-black/20">
                    <table class="bulk-table">
                        <thead>
                            <tr><th>Prototype Group</th><th>Functional Scope</th><th>Description</th><th>Status</th><th id="th-action" class="w-10"></th></tr>
                        </thead>
                        <tbody id="bulk-body"></tbody>
                    </table>
                    <button id="btn-add-row" onclick="addInputRow()" class="w-full p-4 text-[10px] font-bold uppercase opacity-30 hover:opacity-100 hover:bg-white/5 transition border-t border-white/5">+ Append New Row</button>
                </div>
            </div>

            <div class="p-8 border-t border-white/5">
                <button id="btn-submit" onclick="commitPlans()" class="w-full bg-sky-600 py-4 rounded-2xl font-black text-white hover:bg-sky-500 transition-all uppercase tracking-widest text-xs">Execute Data Authorization</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const TAB_NAME = 'NEXT PLAN';
        const STATUS_PRIO = { 'In Progress': 0, 'Planned': 1, 'Achieved': 2 };
        let activeUnits = [], allPlanData = [];

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, planRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                activeUnits = unitRes.data;
                allPlanData = planRes.data;
                document.getElementById('UnitCode').innerHTML = activeUnits.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderCards(allPlanData);
            } catch (e) { Swal.fire('Error', 'API Link Failure', 'error'); } finally { loader.style.display = 'none'; }
        }

        function renderCards(data) {
            const container = document.getElementById('plan-container');
            const grouped = data.reduce((acc, item) => {
                const uc = item.UnitCode || 'Unknown';
                if(!acc[uc]) acc[uc] = [];
                acc[uc].push(item);
                return acc;
            }, {});

            if(!Object.keys(grouped).length) {
                container.innerHTML = `<div class="py-32 text-center opacity-20 font-mono tracking-[0.5em]">SYSTEM_EMPTY</div>`;
                return;
            }

            container.innerHTML = Object.keys(grouped).map(uCode => {
                const items = grouped[uCode];
                const sortedItems = [...items].sort((a, b) => STATUS_PRIO[a.Status] - STATUS_PRIO[b.Status]);

                // Stats Calculation
                const stats = { G1:0, G2:0, G3:0, PL:0, IP:0, AC:0 };
                items.forEach(i => {
                    if(i.ScopeGroup === 'Group_1') stats.G1++;
                    if(i.ScopeGroup === 'Group_2') stats.G2++;
                    if(i.ScopeGroup === 'Group_3') stats.G3++;
                    if(i.Status === 'Planned') stats.PL++;
                    if(i.Status === 'In Progress') stats.IP++;
                    if(i.Status === 'Achieved') stats.AC++;
                });

                return `
                <div class="plan-card">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-3xl font-black text-white tracking-tighter uppercase">${uCode}</h2>
                        <span class="bg-sky-500/10 text-sky-500 text-[10px] font-mono px-3 py-1 rounded-lg border border-sky-500/20">${items.length} ACTIVE_ITEMS</span>
                    </div>

                    <!-- BEAUTIFIED SUMMARY GRID -->
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-8">
                        <div class="stat-square border-rose-500/20"><div class="stat-val text-rose-500">${stats.G1}</div><div class="stat-desc">Shift Target</div></div>
                        <div class="stat-square border-sky-500/20"><div class="stat-val text-sky-500">${stats.G2}</div><div class="stat-desc">Unit Support</div></div>
                        <div class="stat-square border-amber-500/20"><div class="stat-val text-amber-500">${stats.G3}</div><div class="stat-desc">Escalation</div></div>
                        <div class="stat-square border-slate-500/20"><div class="stat-val text-slate-400">${stats.PL}</div><div class="stat-desc">Planned</div></div>
                        <div class="stat-square border-blue-500/20"><div class="stat-val text-blue-400">${stats.IP}</div><div class="stat-desc">In Progress</div></div>
                        <div class="stat-square border-emerald-500/20"><div class="stat-val text-emerald-400">${stats.AC}</div><div class="stat-desc">Achieved</div></div>
                    </div>

                    <details open>
                        <summary>Master Plan Control Detail <i data-lucide="chevron-down" size="14"></i></summary>
                        <div class="details-content overflow-x-auto">
                            <table class="bulk-table">
                                <thead>
                                    <tr><th>Time</th><th>Func</th><th>Description</th><th>Status</th><th class="text-right">Actions</th></tr>
                                </thead>
                                <tbody>
                                    ${sortedItems.map(item => `
                                        <tr class="group/row">
                                            <td class="opacity-40 font-mono w-24">${item.Timestamp.split(' ')[1] || '---'}</td>
                                            <td class="font-bold text-sky-500 uppercase">${item.FunctionalScope}</td>
                                            <td class="leading-relaxed max-w-sm">${item.Detail}</td>
                                            <td>
                                                <select onchange="updateLiveStatus('${item.Timestamp}', this.value)" class="st-select !w-32">
                                                    ${Object.keys(STATUS_PRIO).map(s => `<option ${item.Status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                                </select>
                                            </td>
                                            <td class="text-right whitespace-nowrap">
                                                <button onclick="editPlan('${item.Timestamp}')" class="p-2 text-sky-500/40 hover:text-sky-400"><i data-lucide="edit-3" size="14"></i></button>
                                                <button onclick="deletePlan('${item.Timestamp}')" class="p-2 text-red-500/40 hover:text-red-400"><i data-lucide="trash-2" size="14"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </details>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // --- MODAL ENGINE ---
        function openModal(mode, data = null) {
            const modal = document.getElementById('plan-modal');
            const bulkBody = document.getElementById('bulk-body');
            const btnAdd = document.getElementById('btn-add-row');
            const unitSel = document.getElementById('UnitCode');
            const btnSubmit = document.getElementById('btn-submit');
            
            modal.classList.remove('hidden');
            bulkBody.innerHTML = "";
            
            if(mode === 'edit' && data) {
                document.getElementById('edit-id').value = data.Timestamp;
                unitSel.value = data.UnitCode;
                unitSel.disabled = true;
                btnAdd.classList.add('hidden');
                btnSubmit.innerText = "Execute Data Update";
                addInputRow(data);
            } else {
                document.getElementById('edit-id').value = "";
                unitSel.disabled = false;
                btnAdd.classList.remove('hidden');
                btnSubmit.innerText = "Execute Data Authorization";
                addInputRow();
            }
        }

        function addInputRow(existing = null) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><select class="input-field text-[10px] g-sel"><option value="Group_1">Shift Target</option><option value="Group_2">Unit Support</option><option value="Group_3">Escalation</option></select></td>
                <td><select class="input-field text-[10px] f-sel"><option>Production Team</option><option>Engineering Support</option><option>Material & MPC</option><option>Tool & Equipment Team</option><option>Keuangan / Finance</option><option>Leader & Top Leader</option></select></td>
                <td><input class="input-field d-inp" placeholder="Details..."></td>
                <td><select class="input-field text-[10px] s-sel"><option>Planned</option><option>In Progress</option><option>Achieved</option></select></td>
                <td><button onclick="this.closest('tr').remove()" class="text-red-500/30 ${existing ? 'hidden' : ''}"><i data-lucide="x" size="14"></i></button></td>
            `;
            
            if(existing) {
                tr.querySelector('.g-sel').value = existing.ScopeGroup;
                tr.querySelector('.f-sel').value = existing.FunctionalScope;
                tr.querySelector('.d-inp').value = existing.Detail;
                tr.querySelector('.s-sel').value = existing.Status;
            }
            
            document.getElementById('bulk-body').appendChild(tr);
            lucide.createIcons();
        }

        function editPlan(ts) {
            const item = allPlanData.find(p => p.Timestamp === ts);
            if(item) openModal('edit', item);
        }

        async function commitPlans() {
            const unit = document.getElementById('UnitCode').value;
            const editId = document.getElementById('edit-id').value;
            const rows = document.querySelectorAll('#bulk-body tr');
            
            loader.style.display = 'flex';
            try {
                if(editId) {
                    // Update Logic
                    const r = rows[0];
                    await API.post({
                        tab: TAB_NAME, action: 'update', primaryId: editId,
                        ScopeGroup: r.querySelector('.g-sel').value,
                        FunctionalScope: r.querySelector('.f-sel').value,
                        Detail: r.querySelector('.d-inp').value,
                        Status: r.querySelector('.s-sel').value
                    });
                } else {
                    // Bulk Add Logic
                    for(let r of rows) {
                        await API.post({
                            tab: TAB_NAME, action: 'add', UnitCode: unit,
                            ScopeGroup: r.querySelector('.g-sel').value,
                            FunctionalScope: r.querySelector('.f-sel').value,
                            Detail: r.querySelector('.d-inp').value,
                            Status: r.querySelector('.s-sel').value,
                            primaryId: Date.now() + Math.random()
                        });
                    }
                }
                closeModal(); init();
                Swal.fire({ icon: 'success', title: editId ? 'Entry Updated' : 'Cycle Committed', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false });
            } catch(e) { Swal.fire('Error', 'Transaction Failed', 'error'); } finally { loader.style.display = 'none'; }
        }

        async function updateLiveStatus(ts, stat) {
            loader.style.display = 'flex';
            await API.post({ tab: TAB_NAME, action: 'update', primaryId: ts, Status: stat });
            init();
        }

        async function deletePlan(ts) {
            const res = await Swal.fire({ title: 'Purge Entry?', text: "Permanent removal.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) {
                loader.style.display = 'flex';
                await API.post({ tab: TAB_NAME, action: 'delete', primaryId: ts });
                init();
            }
        }

        function closeModal() { document.getElementById('plan-modal').classList.add('hidden'); }
        init();
    </script>
</body>
</html>
