<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --panel: #151921; --border: rgba(255, 255, 255, 0.1); --accent: #0ea5e9; 
            --c-planned: #94a3b8; --c-pro: #3b82f6; --c-done: #10b981;
        }
        body { background: transparent; color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .plan-card { background-color: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 2.5rem; padding: 2rem; margin-bottom: 2rem; transition: all 0.3s ease; }
        
        /* Industrial Accordion */
        details { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 1rem; margin-bottom: 0.75rem; overflow: hidden; }
        summary { list-style: none; padding: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); transition: background 0.2s; }
        summary:hover { background: rgba(255, 255, 255, 0.03); }
        summary::-webkit-details-marker { display: none; }
        .details-content { padding: 1rem; border-top: 1px solid var(--border); background: rgba(0,0,0,0.1); }

        .input-field { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 0.75rem; padding: 0.75rem; outline: none; color: white; font-size: 0.875rem; transition: all 0.2s ease; }
        .input-field:focus { border-color: var(--accent); }
        
        .st-select { background: #0b0e14; border: 1px solid var(--border); border-radius: 6px; font-size: 10px; font-weight: 700; color: white; padding: 4px 8px; outline: none; }
        
        #local-loader { display: none; position: fixed; inset: 0; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }

        .bulk-table { width: 100%; font-size: 11px; color: white; }
        .bulk-table th { text-align: left; padding: 10px; opacity: 0.4; border-bottom: 1px solid var(--border); }
        .bulk-table td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        .ana-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 11px; }
        .ana-label { opacity: 0.5; }
        .ana-val { font-weight: 900; color: white; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #262c36; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-sky-500 animate-pulse font-bold">Consolidating_Plans...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tighter uppercase">Predictive Cycle Management</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Quad-Section Performance Architecture</p>
        </div>
        <button onclick="openModal()" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-sky-600/20 transition-all active:scale-95">
            <i data-lucide="layout-grid" size="18"></i> CONFIGURE MULTI-PLAN
        </button>
    </div>

    <div id="plan-container"></div>

    <!-- MODAL -->
    <div id="plan-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-6xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest text-sky-400">Planning Engine</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="text-[10px] uppercase font-bold opacity-40 ml-1">Target Node</label>
                        <select id="UnitCode" class="input-field"></select>
                    </div>
                </div>

                <div class="border border-white/5 rounded-2xl overflow-hidden bg-black/20">
                    <table class="bulk-table">
                        <thead>
                            <tr><th>Prototype Group</th><th>Functional Scope</th><th>Description</th><th>Status</th><th class="w-10"></th></tr>
                        </thead>
                        <tbody id="bulk-body"></tbody>
                    </table>
                    <button onclick="addInputRow()" class="w-full p-4 text-[10px] font-bold uppercase opacity-30 hover:opacity-100 hover:bg-white/5 transition border-t border-white/5">+ Append New Row</button>
                </div>
            </div>

            <div class="p-8 border-t border-white/5">
                <button onclick="commitPlans()" class="w-full bg-sky-600 py-4 rounded-2xl font-black text-white hover:bg-sky-500 transition-all uppercase tracking-widest text-xs">Execute Data Authorization</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const TAB_NAME = 'NEXT PLAN';
        const STATUS_PRIO = { 'In Progress': 0, 'Planned': 1, 'Achieved': 2 };
        let activeUnits = [];

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, planRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                activeUnits = unitRes.data;
                document.getElementById('UnitCode').innerHTML = activeUnits.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderCards(planRes.data);
            } catch (e) { Swal.fire('Error', 'API Link Failure', 'error'); } finally { loader.style.display = 'none'; }
        }

        function renderCards(data) {
            const container = document.getElementById('plan-container');
            const grouped = data.reduce((acc, item) => {
                const uc = item.UnitCode || 'Unknown';
                if(!acc[uc]) acc[uc] = [];
                acc[uc].push(item);
                return acc;
            }, {});

            if(!Object.keys(grouped).length) {
                container.innerHTML = `<div class="py-32 text-center opacity-20 font-mono tracking-[0.5em]">SYSTEM_EMPTY</div>`;
                return;
            }

            container.innerHTML = Object.keys(grouped).map(uCode => {
                const items = grouped[uCode];
                const sortedItems = [...items].sort((a, b) => STATUS_PRIO[a.Status] - STATUS_PRIO[b.Status]);

                // Calculations
                const scopes = { 'Group_1': 0, 'Group_2': 0, 'Group_3': 0 };
                const funcs = {};
                const stats = { 'Planned': 0, 'In Progress': 0, 'Achieved': 0 };
                
                items.forEach(i => {
                    scopes[i.ScopeGroup] = (scopes[i.ScopeGroup] || 0) + 1;
                    funcs[i.FunctionalScope] = (funcs[i.FunctionalScope] || 0) + 1;
                    stats[i.Status] = (stats[i.Status] || 0) + 1;
                });

                return `
                <div class="plan-card">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-3xl font-black text-white tracking-tighter uppercase">${uCode}</h2>
                        <div class="text-[10px] font-mono text-sky-500 opacity-40">${items.length} ACTIVE_ITEMS</div>
                    </div>

                    <!-- DROP 1: SCOPE -->
                    <details>
                        <summary>Summary Prototype Scope <i data-lucide="chevron-down" size="14"></i></summary>
                        <div class="details-content">
                            <div class="ana-row"><span class="ana-label">1. Target Utama Shift</span><span class="ana-val">${scopes.Group_1 || 0}</span></div>
                            <div class="ana-row"><span class="ana-label">2. Dukungan Unit Lain</span><span class="ana-val">${scopes.Group_2 || 0}</span></div>
                            <div class="ana-row"><span class="ana-label text-red-500">3. Eskalasi Management</span><span class="ana-val text-red-500">${scopes.Group_3 || 0}</span></div>
                        </div>
                    </details>

                    <!-- DROP 2: FUNCTIONAL -->
                    <details>
                        <summary>Summary Functional Scope <i data-lucide="chevron-down" size="14"></i></summary>
                        <div class="details-content">
                            ${Object.entries(funcs).map(([f, c]) => `
                                <div class="ana-row"><span class="ana-label">${f}</span><span class="ana-val">${c}</span></div>
                            `).join('')}
                        </div>
                    </details>

                    <!-- DROP 3: STATUS -->
                    <details>
                        <summary>Summary Execution Status <i data-lucide="chevron-down" size="14"></i></summary>
                        <div class="details-content">
                            <div class="ana-row"><span class="ana-label text-slate-400">Planned</span><span class="ana-val text-slate-400">${stats.Planned}</span></div>
                            <div class="ana-row"><span class="ana-label text-blue-400">In Progress</span><span class="ana-val text-blue-400">${stats.In_Progress || stats['In Progress']}</span></div>
                            <div class="ana-row"><span class="ana-label text-emerald-400">Achieved</span><span class="ana-val text-emerald-400">${stats.Achieved}</span></div>
                        </div>
                    </details>

                    <!-- DROP 4: MASTER LIST -->
                    <details open>
                        <summary>Master Activity Detail <i data-lucide="chevron-down" size="14"></i></summary>
                        <div class="details-content overflow-x-auto p-0">
                            <table class="bulk-table">
                                <thead class="opacity-30 uppercase font-bold">
                                    <tr><th>Time</th><th>Func</th><th>Description</th><th>Status</th><th></th></tr>
                                </thead>
                                <tbody>
                                    ${sortedItems.map(item => `
                                        <tr class="group/row">
                                            <td class="opacity-30 text-[9px] font-mono w-24">${item.Timestamp.split(' ')[1] || item.Timestamp}</td>
                                            <td class="text-sky-500 font-bold text-[9px] w-24 uppercase">${item.FunctionalScope}</td>
                                            <td class="text-white/80 leading-relaxed max-w-xs">${item.Detail}</td>
                                            <td>
                                                <select onchange="updateLiveStatus('${item.Timestamp}', this.value)" class="st-select">
                                                    ${Object.keys(STATUS_PRIO).map(s => `<option ${item.Status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                                </select>
                                            </td>
                                            <td class="text-right">
                                                <button onclick="deletePlan('${item.Timestamp}')" class="text-red-500/20 hover:text-red-500 transition opacity-0 group-hover/row:opacity-100">
                                                    <i data-lucide="trash-2" size="14"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </details>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // --- MODAL ENGINE ---
        function openModal() {
            document.getElementById('plan-modal').classList.remove('hidden');
            document.getElementById('bulk-body').innerHTML = "";
            addInputRow();
        }

        function addInputRow() {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><select class="input-field text-[10px] g-sel"><option value="Group_1">Shift Target</option><option value="Group_2">Unit Support</option><option value="Group_3">Escalation</option></select></td>
                <td><select class="input-field text-[10px] f-sel"><option>Production Team</option><option>Engineering Support</option><option>Material & MPC</option><option>Tool & Equipment Team</option><option>Keuangan / Finance</option><option>Leader & Top Leader</option></select></td>
                <td><input class="input-field d-inp" placeholder="..."></td>
                <td><select class="input-field text-[10px] s-sel"><option>Planned</option><option>In Progress</option><option>Achieved</option></select></td>
                <td><button onclick="this.closest('tr').remove()" class="text-red-500/30"><i data-lucide="x" size="14"></i></button></td>
            `;
            document.getElementById('bulk-body').appendChild(tr);
            lucide.createIcons();
        }

        async function commitPlans() {
            const unit = document.getElementById('UnitCode').value;
            const rows = document.querySelectorAll('#bulk-body tr');
            if(!rows.length) return;

            loader.style.display = 'flex';
            try {
                for(let r of rows) {
                    await API.post({
                        tab: TAB_NAME, action: 'add', UnitCode: unit,
                        ScopeGroup: r.querySelector('.g-sel').value,
                        FunctionalScope: r.querySelector('.f-sel').value,
                        Detail: r.querySelector('.d-inp').value,
                        Status: r.querySelector('.s-sel').value,
                        primaryId: Date.now() + Math.random()
                    });
                }
                closeModal(); init();
                Swal.fire({ icon: 'success', title: 'Cycle Commited', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false });
            } catch(e) { Swal.fire('Error', 'Commit Failed', 'error'); } finally { loader.style.display = 'none'; }
        }

        async function updateLiveStatus(ts, stat) {
            loader.style.display = 'flex';
            await API.post({ tab: TAB_NAME, action: 'update', primaryId: ts, Status: stat });
            init();
        }

        async function deletePlan(ts) {
            const res = await Swal.fire({ title: 'Purge Entry?', text: "Permanent removal.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) {
                loader.style.display = 'flex';
                await API.post({ tab: TAB_NAME, action: 'delete', primaryId: ts });
                init();
            }
        }

        function closeModal() { document.getElementById('plan-modal').classList.add('hidden'); }
        init();
    </script>
</body>
</html>
