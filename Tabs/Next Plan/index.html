<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --panel: #151921; --border: rgba(255, 255, 255, 0.1); --accent: #0ea5e9; 
            --text-main: #94a3b8; --text-bold: #ffffff; --input-bg: rgba(255, 255, 255, 0.05);
        }
        .light {
            --bg: transparent; --panel: #ffffff; --border: #e2e8f0; --accent: #0284c7; 
            --text-main: #475569; --text-bold: #1e293b; --input-bg: #f8fafc;
        }
        body { background: transparent; color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; transition: all 0.3s ease; }
        
        .text-white, h1, h2, h3, h4 { color: var(--text-bold) !important; }
        .plan-card { background-color: var(--panel) !important; border: 1px solid var(--border) !important; border-radius: 2.5rem; padding: 2rem; margin-bottom: 2rem; }
        
        /* BEAUTIFIED WIDGETS */
        .widget-grid { display: grid; gap: 0.75rem; margin-bottom: 1rem; }
        .widget-card {
            border-radius: 1.25rem; padding: 1.25rem 1rem; border: 1px solid var(--border);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; transition: all 0.3s ease;
        }
        .widget-val { font-size: 1.75rem; font-weight: 900; line-height: 1; margin-bottom: 0.25rem; }
        .widget-lab { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        .widget-desc { font-size: 8px; opacity: 0.5; margin-top: 6px; line-height: 1.2; font-weight: 500; max-width: 120px; }

        /* ACCORDIONS (Hidden by Default) */
        details { background: var(--input-bg); border: 1px solid var(--border); border-radius: 1.5rem; margin-top: 0.75rem; overflow: hidden; }
        summary { list-style: none; padding: 1.25rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); }
        summary::-webkit-details-marker { display: none; }
        .details-content { padding: 1.25rem; border-top: 1px solid var(--border); background: rgba(0,0,0,0.1); }
        .light .details-content { background: rgba(0,0,0,0.02); }

        .input-field, .st-select { width: 100%; background: var(--input-bg) !important; border: 1px solid var(--border) !important; color: var(--text-bold) !important; border-radius: 0.75rem; padding: 0.75rem; outline: none; font-size: 0.875rem; }
        select option { background-color: white !important; color: #1e293b !important; }
        .dark select option { background-color: #151921 !important; color: white !important; }

        #local-loader { display: none; position: fixed; inset: 0; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .bulk-table { width: 100%; font-size: 11px; }
        .bulk-table th { text-align: left; padding: 12px; opacity: 0.4; border-bottom: 1px solid var(--border); }
        .bulk-table td { padding: 10px; border-bottom: 1px solid var(--border); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-sky-500 animate-pulse font-bold">Synchronizing_Plan_Matrix...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tighter uppercase">Predictive Cycle Management</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Strategic Planning & Resource allocation</p>
        </div>
        <button onclick="openModal('add')" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-sky-600/20 transition-all active:scale-95">
            <i data-lucide="plus-circle" size="18"></i> CONFIGURE PLAN
        </button>
    </div>

    <div id="plan-container"></div>

    <!-- MODAL -->
    <div id="plan-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-6xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest text-sky-400">Planning Engine</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="text-[10px] uppercase font-bold opacity-40 ml-1">Target Node</label>
                        <select id="UnitCode" class="input-field"></select>
                    </div>
                </div>

                <div class="border border-white/5 rounded-2xl overflow-hidden bg-black/20">
                    <table class="bulk-table">
                        <thead>
                            <tr><th>Prototype Group</th><th>Functional Scope</th><th>Description</th><th>Status</th><th class="w-10"></th></tr>
                        </thead>
                        <tbody id="bulk-body"></tbody>
                    </table>
                    <button id="add-row-btn" onclick="addInputRow()" class="w-full p-4 text-[10px] font-bold uppercase opacity-30 hover:opacity-100 hover:bg-white/5 transition border-t border-white/5">+ Append New Row</button>
                </div>
            </div>

            <div class="p-8 border-t border-white/5">
                <button id="submit-btn" onclick="commitPlans()" class="w-full bg-sky-600 py-4 rounded-2xl font-black text-white hover:bg-sky-500 transition-all uppercase tracking-widest text-xs">Execute Data Authorization</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const TAB_NAME = 'NEXT PLAN';
        const STATUS_PRIO = { 'In Progress': 0, 'Planned': 1, 'Achieved': 2 };
        
        const SCOPE_DEFS = {
            'Group_1': { lab: 'Shift Target', desc: 'Primary production goals for current shift duration', color: 'border-sky-500/30 bg-sky-500/5 text-sky-400' },
            'Group_2': { lab: 'Unit Support', desc: 'Critical cross-unit dependencies and logistics', color: 'border-indigo-500/30 bg-indigo-500/5 text-indigo-400' },
            'Group_3': { lab: 'Escalation', desc: 'Issues requiring external management authorization', color: 'border-rose-500/30 bg-rose-500/5 text-rose-500' }
        };

        const FUNC_DEFS = {
            'Production Team': 'border-blue-500/20 bg-blue-500/5 text-blue-400',
            'Engineering Support': 'border-purple-500/20 bg-purple-500/5 text-purple-400',
            'Material & MPC': 'border-amber-500/20 bg-amber-500/5 text-amber-400',
            'Tool & Equipment Team': 'border-emerald-500/20 bg-emerald-500/5 text-emerald-400',
            'Keuangan / Finance': 'border-pink-500/20 bg-pink-500/5 text-pink-400',
            'Leader & Top Leader': 'border-slate-500/20 bg-slate-500/5 text-slate-100'
        };

        let activeUnits = [], editId = null;

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, planRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                activeUnits = unitRes.data;
                document.getElementById('UnitCode').innerHTML = activeUnits.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderCards(planRes.data);
            } catch (e) { Swal.fire('Error', 'API Link Failure', 'error'); } finally { loader.style.display = 'none'; }
        }

        function renderCards(data) {
            const container = document.getElementById('plan-container');
            const grouped = data.reduce((acc, item) => {
                const uc = item.UnitCode || 'Unknown';
                if(!acc[uc]) acc[uc] = [];
                acc[uc].push(item);
                return acc;
            }, {});

            if(!Object.keys(grouped).length) {
                container.innerHTML = `<div class="py-32 text-center opacity-20 font-mono tracking-[0.5em]">SYSTEM_EMPTY</div>`;
                return;
            }

            container.innerHTML = Object.keys(grouped).map(uCode => {
                const items = grouped[uCode];
                const sortedItems = [...items].sort((a, b) => STATUS_PRIO[a.Status] - STATUS_PRIO[b.Status]);

                // Summaries
                const scopes = { 'Group_1': 0, 'Group_2': 0, 'Group_3': 0 };
                const funcs = {};
                const stats = { 'Planned': 0, 'In Progress': 0, 'Achieved': 0 };
                
                items.forEach(i => {
                    if(scopes[i.ScopeGroup] !== undefined) scopes[i.ScopeGroup]++;
                    funcs[i.FunctionalScope] = (funcs[i.FunctionalScope] || 0) + 1;
                    stats[i.Status]++;
                });

                return `
                <div class="plan-card">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-3xl font-black text-white tracking-tighter uppercase">${uCode}</h2>
                        <div class="text-[10px] font-mono text-sky-500 opacity-40">${items.length} ACTIVE_ITEMS</div>
                    </div>

                    <!-- SCOPE SUMMARY -->
                    <details>
                        <summary>Summary Prototype Scope <i data-lucide="chevron-down" size="14"></i></summary>
                        <div class="details-content">
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                ${Object.entries(SCOPE_DEFS).map(([key, def]) => `
                                    <div class="widget-card ${def.color}">
                                        <span class="widget-val">${scopes[key] || 0}</span>
                                        <span class="widget-lab">${def.lab}</span>
                                        <span class="widget-desc">${def.desc}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </details>

                    <!-- FUNCTIONAL SUMMARY -->
                    <details>
                        <summary>Summary Functional Responsibility <i data-lucide="chevron-down" size="14"></i></summary>
                        <div class="details-content">
                            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
                                ${Object.entries(FUNC_DEFS).map(([key, style]) => `
                                    <div class="widget-card ${style} !py-4">
                                        <span class="widget-val !text-xl">${funcs[key] || 0}</span>
                                        <span class="widget-lab !text-[7px]">${key.replace('Team', '').trim()}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </details>

                    <!-- EXECUTION STATUS SUMMARY -->
                    <details>
                        <summary>Summary Execution Status <i data-lucide="chevron-down" size="14"></i></summary>
                        <div class="details-content">
                            <div class="grid grid-cols-3 gap-4">
                                <div class="widget-card border-slate-500/20 bg-slate-500/5 text-slate-400">
                                    <span class="widget-val">${stats.Planned}</span><span class="widget-lab">Planned</span>
                                </div>
                                <div class="widget-card border-blue-500/20 bg-blue-500/5 text-blue-400">
                                    <span class="widget-val">${stats['In Progress'] || stats.In_Progress || 0}</span><span class="widget-lab">In Progress</span>
                                </div>
                                <div class="widget-card border-emerald-500/20 bg-emerald-500/5 text-emerald-400">
                                    <span class="widget-val">${stats.Achieved}</span><span class="widget-lab">Achieved</span>
                                </div>
                            </div>
                        </div>
                    </details>

                    <!-- MASTER LIST -->
                    <details open>
                        <summary>Activity Registry Detail <i data-lucide="chevron-down" size="14"></i></summary>
                        <div class="details-content overflow-x-auto p-0">
                            <table class="bulk-table">
                                <thead class="opacity-30 uppercase font-bold">
                                    <tr><th>Time</th><th>Functional Scope</th><th>Description</th><th>Status</th><th></th></tr>
                                </thead>
                                <tbody>
                                    ${sortedItems.map(item => `
                                        <tr class="group/row">
                                            <td class="opacity-30 text-[9px] font-mono w-24">${item.Timestamp.split(' ')[1] || item.Timestamp}</td>
                                            <td class="text-sky-500 font-bold text-[9px] w-40 uppercase">${item.FunctionalScope}</td>
                                            <td class="text-white/80 leading-relaxed text-[11px]">${item.Detail}</td>
                                            <td>
                                                <select onchange="updateLiveStatus('${item.Timestamp}', this.value)" class="st-select">
                                                    ${Object.keys(STATUS_PRIO).map(s => `<option ${item.Status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                                </select>
                                            </td>
                                            <td class="text-right">
                                                <div class="flex gap-2 justify-end opacity-0 group-hover/row:opacity-100 transition">
                                                    <button onclick='editPlan(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="text-sky-500/50 hover:text-sky-400"><i data-lucide="edit-3" size="14"></i></button>
                                                    <button onclick="deletePlan('${item.Timestamp}')" class="text-red-500/30 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </details>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function openModal() {
            editId = null;
            document.getElementById('plan-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = "Planning Engine";
            document.getElementById('add-row-btn').classList.remove('hidden');
            document.getElementById('submit-btn').innerText = "Execute Data Authorization";
            document.getElementById('bulk-body').innerHTML = "";
            addInputRow();
        }

        function editPlan(item) {
            editId = item.Timestamp;
            document.getElementById('plan-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = "Edit Strategy Plan";
            document.getElementById('add-row-btn').classList.add('hidden');
            document.getElementById('submit-btn').innerText = "Update Plan Record";
            document.getElementById('UnitCode').value = item.UnitCode;
            document.getElementById('bulk-body').innerHTML = "";
            addInputRow(item);
        }

        function addInputRow(data = null) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><select class="input-field text-[10px] g-sel">
                    <option value="Group_1" ${data?.ScopeGroup==='Group_1'?'selected':''}>Shift Target</option>
                    <option value="Group_2" ${data?.ScopeGroup==='Group_2'?'selected':''}>Unit Support</option>
                    <option value="Group_3" ${data?.ScopeGroup==='Group_3'?'selected':''}>Escalation</option>
                </select></td>
                <td><select class="input-field text-[10px] f-sel">
                    ${Object.keys(FUNC_DEFS).map(f => `<option ${data?.FunctionalScope===f?'selected':''}>${f}</option>`).join('')}
                </select></td>
                <td><input class="input-field d-inp" value="${data?.Detail || ''}" placeholder="..."></td>
                <td><select class="input-field text-[10px] s-sel">
                    ${Object.keys(STATUS_PRIO).map(s => `<option ${data?.Status === s ? 'selected' : ''}>${s}</option>`).join('')}
                </select></td>
                <td>${data ? '' : '<button onclick="this.closest(\'tr\').remove()" class="text-red-500/30"><i data-lucide="x" size="14"></i></button>'}</td>
            `;
            document.getElementById('bulk-body').appendChild(tr);
            lucide.createIcons();
        }

        async function commitPlans() {
            const unit = document.getElementById('UnitCode').value;
            const rows = document.querySelectorAll('#bulk-body tr');
            if(!rows.length) return;

            loader.style.display = 'flex';
            try {
                if(editId) {
                    const r = rows[0];
                    await API.post({
                        tab: TAB_NAME, action: 'update', primaryId: editId,
                        UnitCode: unit,
                        ScopeGroup: r.querySelector('.g-sel').value,
                        FunctionalScope: r.querySelector('.f-sel').value,
                        Detail: r.querySelector('.d-inp').value,
                        Status: r.querySelector('.s-sel').value
                    });
                } else {
                    for(let r of rows) {
                        await API.post({
                            tab: TAB_NAME, action: 'add', UnitCode: unit,
                            ScopeGroup: r.querySelector('.g-sel').value,
                            FunctionalScope: r.querySelector('.f-sel').value,
                            Detail: r.querySelector('.d-inp').value,
                            Status: r.querySelector('.s-sel').value,
                            primaryId: Date.now() + Math.random()
                        });
                    }
                }
                closeModal(); init();
                Swal.fire({ icon: 'success', title: editId ? 'Record Updated' : 'Cycle Committed', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false });
            } catch(e) { Swal.fire('Error', 'Commit Failed', 'error'); } finally { loader.style.display = 'none'; }
        }

        async function updateLiveStatus(ts, stat) {
            loader.style.display = 'flex';
            await API.post({ tab: TAB_NAME, action: 'update', primaryId: ts, Status: stat });
            init();
        }

        async function deletePlan(ts) {
            const res = await Swal.fire({ title: 'Purge Entry?', text: "Permanent removal.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) {
                loader.style.display = 'flex';
                await API.post({ tab: TAB_NAME, action: 'delete', primaryId: ts });
                init();
            }
        }

        function closeModal() { document.getElementById('plan-modal').classList.add('hidden'); }
        init();
    </script>
</body>
</html>
