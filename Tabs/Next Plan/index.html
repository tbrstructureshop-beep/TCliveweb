<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --panel: #151921; --border: rgba(255, 255, 255, 0.1); --accent: #0ea5e9; 
            --text-main: #94a3b8; --text-bold: #ffffff; --input-bg: rgba(255, 255, 255, 0.05);
        }
        .light {
            --bg: transparent; --panel: #ffffff; --border: #e2e8f0; --accent: #0284c7; 
            --text-main: #475569; --text-bold: #1e293b; --input-bg: #f8fafc;
        }
        body { background: transparent; color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; transition: all 0.3s ease; }
        
        .text-white, h1, h2, h3, h4 { color: var(--text-bold) !important; }
        
        /* Unit Tab Switcher */
        .unit-nav { display: flex; gap: 0.50rem; padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 1.5rem; border: 1px solid var(--border); overflow-x: auto; margin-bottom: 2rem; }
        .unit-tab { padding: 0.75rem 1.5rem; border-radius: 1rem; font-size: 11px; font-weight: 800; white-space: nowrap; transition: all 0.3s ease; color: var(--text-main); border: 1px solid transparent; }
        .unit-tab.active { background: var(--accent); color: white; border-color: rgba(255,255,255,0.2); box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4); }

        .plan-card { background-color: var(--panel) !important; border: 1px solid var(--border) !important; border-radius: 2.5rem; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        /* Internal Widget Tabs */
        .cockpit-tabs { display: flex; gap: 0.25rem; background: var(--input-bg); padding: 0.25rem; border-radius: 1rem; margin-bottom: 1.5rem; width: fit-content; }
        .c-tab { padding: 0.5rem 1rem; border-radius: 0.75rem; font-size: 9px; font-weight: 800; text-transform: uppercase; transition: 0.2s; opacity: 0.5; }
        .c-tab.active { background: var(--panel); color: var(--accent); opacity: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        .widget-card { border-radius: 1.25rem; padding: 1.25rem; border: 1px solid var(--border); text-align: center; }
        .widget-val { font-size: 1.75rem; font-weight: 900; line-height: 1; margin-bottom: 0.25rem; }
        .widget-lab { font-size: 8px; font-weight: 800; text-transform: uppercase; opacity: 0.6; }

        /* Master Table */
        .master-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 11px; }
        .master-table th { padding: 12px; text-align: left; opacity: 0.3; text-transform: uppercase; font-weight: 900; border-bottom: 1px solid var(--border); }
        .master-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); vertical-align: middle; }

        .input-field { width: 100%; background: var(--input-bg) !important; border: 1px solid var(--border) !important; color: var(--text-bold) !important; border-radius: 0.75rem; padding: 0.75rem; font-size: 0.875rem; }
        
        #local-loader { display: none; position: fixed; inset: 0; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        
        ::-webkit-scrollbar { height: 4px; width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-sky-500 animate-pulse font-bold">Node_Sync_Active...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
        <div>
            <h1 class="text-2xl font-black text-white tracking-tighter uppercase">Predictive Cycle</h1>
            <p class="text-[10px] opacity-40 font-mono mt-1 uppercase tracking-widest">Global Planning Engine // V3.0</p>
        </div>
        <button onclick="openModal()" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-sky-600/20 transition-all active:scale-95">
            <i data-lucide="plus" size="16"></i> NEW PLAN
        </button>
    </div>

    <!-- UNIT TAB SELECTOR -->
    <div id="unit-tabs" class="unit-nav no-scrollbar"></div>

    <!-- MAIN DISPLAY AREA -->
    <div id="main-content"></div>

    <!-- MODAL -->
    <div id="plan-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-5xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest text-sky-400">Planning Engine</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full text-white/30 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <div class="p-8 overflow-y-auto flex-1">
                <div class="mb-6"><label class="label-style">Target Unit Node</label><select id="UnitCode" class="input-field"></select></div>
                <div class="border border-white/5 rounded-2xl overflow-hidden bg-black/20">
                    <table class="master-table">
                        <thead><tr><th>Group</th><th>Scope</th><th>Description</th><th>Status</th><th class="w-10"></th></tr></thead>
                        <tbody id="bulk-body"></tbody>
                    </table>
                    <button id="add-row-btn" onclick="addInputRow()" class="w-full p-4 text-[10px] font-bold uppercase opacity-30 hover:opacity-100 transition">+ Append New Entry</button>
                </div>
            </div>
            <div class="p-8 border-t border-white/5">
                <button id="submit-btn" onclick="commitPlans()" class="w-full bg-sky-600 py-4 rounded-2xl font-black text-white hover:bg-sky-500 transition-all uppercase tracking-widest text-xs">Authorize Data Commit</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const TAB_NAME = 'NEXT PLAN';
        const STATUS_PRIO = { 'In Progress': 0, 'Planned': 1, 'Achieved': 2 };
        
        const SCOPE_DEFS = {
            'Group_1': { lab: 'Shift Target', color: 'border-sky-500/30 bg-sky-500/5 text-sky-400' },
            'Group_2': { lab: 'Unit Support', color: 'border-indigo-500/30 bg-indigo-500/5 text-indigo-400' },
            'Group_3': { lab: 'Escalation', color: 'border-rose-500/30 bg-rose-500/5 text-rose-500' }
        };

        const FUNC_DEFS = {
            'Production Team': 'border-blue-500/20 text-blue-400',
            'Engineering Support': 'border-purple-500/20 text-purple-400',
            'Material & MPC': 'border-amber-500/20 text-amber-400',
            'Tool & Equipment Team': 'border-emerald-500/20 text-emerald-400',
            'Keuangan / Finance': 'border-pink-500/20 text-pink-400',
            'Leader & Top Leader': 'border-slate-500/20 text-slate-100'
        };

        let masterData = [], activeUnit = null, editId = null;

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, planRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                masterData = planRes.data;
                
                const unitSelect = document.getElementById('UnitCode');
                unitSelect.innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');

                renderTabs(unitRes.data);
                if(!activeUnit && unitRes.data.length > 0) activeUnit = unitRes.data[0].UnitCode;
                renderView();
            } catch (e) { Swal.fire('Error', 'API Link Failure', 'error'); } finally { loader.style.display = 'none'; }
        }

        function renderTabs(units) {
            const container = document.getElementById('unit-tabs');
            container.innerHTML = units.map(u => `
                <button onclick="switchUnit('${u.UnitCode}')" class="unit-tab ${u.UnitCode === activeUnit ? 'active' : ''}">${u.UnitCode}</button>
            `).join('');
        }

        function switchUnit(uCode) {
            activeUnit = uCode;
            document.querySelectorAll('.unit-tab').forEach(t => t.classList.toggle('active', t.innerText === uCode));
            renderView();
        }

        function renderView() {
            const container = document.getElementById('main-content');
            const items = masterData.filter(i => i.UnitCode === activeUnit);
            
            if(!activeUnit) {
                container.innerHTML = `<div class="py-32 text-center opacity-20 font-mono tracking-[0.5em]">SELECT_NODE_TO_BEGIN</div>`;
                return;
            }

            // Summaries
            const scopes = { 'Group_1': 0, 'Group_2': 0, 'Group_3': 0 };
            const funcs = {};
            const stats = { 'Planned': 0, 'In Progress': 0, 'Achieved': 0 };
            items.forEach(i => {
                if(scopes[i.ScopeGroup] !== undefined) scopes[i.ScopeGroup]++;
                funcs[i.FunctionalScope] = (funcs[i.FunctionalScope] || 0) + 1;
                stats[i.Status]++;
            });

            container.innerHTML = `
                <div class="plan-card">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-4xl font-black text-white leading-none">${activeUnit}</h2>
                            <p class="text-[10px] font-mono text-sky-500 mt-1 uppercase opacity-50">Active Cycle Visualization</p>
                        </div>
                        <div class="cockpit-tabs">
                            <button onclick="switchWidget('scope')" id="w-scope" class="c-tab active">Scope</button>
                            <button onclick="switchWidget('func')" id="w-func" class="c-tab">Func</button>
                            <button onclick="switchWidget('stat')" id="w-stat" class="c-tab">Stat</button>
                        </div>
                    </div>

                    <div id="widget-area" class="mb-10 min-h-[120px]">
                        ${renderScopeWidgets(scopes)}
                    </div>

                    <div class="border-t border-white/5 pt-8">
                        <div class="flex items-center justify-between mb-6">
                            <span class="text-[10px] font-black uppercase tracking-widest text-sky-500">Registry Detail Master List</span>
                            <span class="text-[9px] opacity-20 font-mono">${items.length} ENTRIES_BUFFERED</span>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="master-table">
                                <thead>
                                    <tr><th class="w-24">Group</th><th class="w-24">Time</th><th class="w-40">Func Scope</th><th>Description</th><th class="w-32">Status</th><th class="w-16"></th></tr>
                                </thead>
                                <tbody>
                                    ${items.sort((a,b) => STATUS_PRIO[a.Status] - STATUS_PRIO[b.Status]).map(item => `
                                        <tr class="group/row">
                                            <td class="font-bold text-[10px] ${SCOPE_DEFS[item.ScopeGroup]?.color.split(' ')[2]}">${SCOPE_DEFS[item.ScopeGroup]?.lab || item.ScopeGroup}</td>
                                            <td class="opacity-30 font-mono text-[10px]">${item.Timestamp.split(' ')[1] || item.Timestamp}</td>
                                            <td class="font-bold uppercase text-[10px] ${FUNC_DEFS[item.FunctionalScope]?.split(' ')[1]}">${item.FunctionalScope}</td>
                                            <td class="text-white/70">${item.Detail}</td>
                                            <td>
                                                <select onchange="updateLiveStatus('${item.Timestamp}', this.value)" class="bg-transparent border-none text-[10px] font-bold outline-none cursor-pointer">
                                                    ${Object.keys(STATUS_PRIO).map(s => `<option ${item.Status === s ? 'selected' : ''} value="${s}">${s}</option>`).join('')}
                                                </select>
                                            </td>
                                            <td class="text-right">
                                                <div class="flex gap-2 justify-end opacity-0 group-hover/row:opacity-100 transition">
                                                    <button onclick='editPlan(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="text-sky-500/50 hover:text-sky-400"><i data-lucide="edit-3" size="14"></i></button>
                                                    <button onclick="deletePlan('${item.Timestamp}')" class="text-red-500/30 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        // --- WIDGET RENDERERS ---
        function switchWidget(type) {
            const items = masterData.filter(i => i.UnitCode === activeUnit);
            const scopes = { 'Group_1': 0, 'Group_2': 0, 'Group_3': 0 };
            const funcs = {};
            const stats = { 'Planned': 0, 'In Progress': 0, 'Achieved': 0 };
            items.forEach(i => { if(scopes[i.ScopeGroup]!==undefined) scopes[i.ScopeGroup]++; funcs[i.FunctionalScope]=(funcs[i.FunctionalScope]||0)+1; stats[i.Status]++; });
            
            const area = document.getElementById('widget-area');
            if(type==='scope') area.innerHTML = renderScopeWidgets(scopes);
            if(type==='func') area.innerHTML = renderFuncWidgets(funcs);
            if(type==='stat') area.innerHTML = renderStatWidgets(stats);
            
            document.querySelectorAll('.c-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(`w-${type}`).classList.add('active');
        }

        function renderScopeWidgets(s) { return `<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">${Object.entries(SCOPE_DEFS).map(([k,d])=>`<div class="widget-card ${d.color}"><span class="widget-val">${s[k]||0}</span><span class="widget-lab">${d.lab}</span></div>`).join('')}</div>`; }
        function renderFuncWidgets(f) { return `<div class="grid grid-cols-2 md:grid-cols-6 gap-2">${Object.entries(FUNC_DEFS).map(([k,s])=>`<div class="widget-card ${s.split(' ')[0]} ${s.split(' ')[1]} !py-4"><span class="widget-val !text-lg">${f[k]||0}</span><span class="widget-lab !text-[7px]">${k.replace('Team','').trim()}</span></div>`).join('')}</div>`; }
        function renderStatWidgets(st) { return `<div class="grid grid-cols-3 gap-4"><div class="widget-card border-slate-500/20 bg-slate-500/5 text-slate-400"><span class="widget-val">${st.Planned}</span><span class="widget-lab">Planned</span></div><div class="widget-card border-blue-500/20 bg-blue-500/5 text-blue-400"><span class="widget-val">${st['In Progress']||st.In_Progress||0}</span><span class="widget-lab">In Progress</span></div><div class="widget-card border-emerald-500/20 bg-emerald-500/5 text-emerald-400"><span class="widget-val">${st.Achieved}</span><span class="widget-lab">Achieved</span></div></div>`; }

        // --- CORE LOGIC ---
        function openModal() {
            editId = null; document.getElementById('plan-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = "Strategy Configuration";
            document.getElementById('add-row-btn').classList.remove('hidden');
            document.getElementById('bulk-body').innerHTML = ""; addInputRow();
        }

        function editPlan(item) {
            editId = item.Timestamp; document.getElementById('plan-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = "Edit Cycle Entry";
            document.getElementById('add-row-btn').classList.add('hidden');
            document.getElementById('UnitCode').value = item.UnitCode;
            document.getElementById('bulk-body').innerHTML = ""; addInputRow(item);
        }

        function addInputRow(data = null) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><select class="input-field text-[10px] g-sel">${Object.entries(SCOPE_DEFS).map(([k,d])=>`<option value="${k}" ${data?.ScopeGroup===k?'selected':''}>${d.lab}</option>`).join('')}</select></td>
                <td><select class="input-field text-[10px] f-sel">${Object.keys(FUNC_DEFS).map(f=>`<option ${data?.FunctionalScope===f?'selected':''}>${f}</option>`).join('')}</select></td>
                <td><input class="input-field d-inp" value="${data?.Detail || ''}" placeholder="..."></td>
                <td><select class="input-field text-[10px] s-sel">${Object.keys(STATUS_PRIO).map(s=>`<option ${data?.Status===s?'selected':''}>${s}</option>`).join('')}</select></td>
                <td>${data ? '' : '<button onclick="this.closest(\'tr\').remove()" class="text-red-500/30"><i data-lucide="x" size="14"></i></button>'}</td>
            `;
            document.getElementById('bulk-body').appendChild(tr);
            lucide.createIcons();
        }

        async function commitPlans() {
            const unit = document.getElementById('UnitCode').value;
            const rows = document.querySelectorAll('#bulk-body tr');
            loader.style.display = 'flex';
            try {
                if(editId) {
                    const r = rows[0];
                    await API.post({ tab: TAB_NAME, action: 'update', primaryId: editId, UnitCode: unit, ScopeGroup: r.querySelector('.g-sel').value, FunctionalScope: r.querySelector('.f-sel').value, Detail: r.querySelector('.d-inp').value, Status: r.querySelector('.s-sel').value });
                } else {
                    for(let r of rows) await API.post({ tab: TAB_NAME, action: 'add', UnitCode: unit, ScopeGroup: r.querySelector('.g-sel').value, FunctionalScope: r.querySelector('.f-sel').value, Detail: r.querySelector('.d-inp').value, Status: r.querySelector('.s-sel').value, primaryId: Date.now() + Math.random() });
                }
                closeModal(); init();
                Swal.fire({ icon: 'success', title: 'Cycle Synced', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false });
            } catch(e) { Swal.fire('Error', 'Commit Failed', 'error'); } finally { loader.style.display = 'none'; }
        }

        async function updateLiveStatus(ts, stat) {
            loader.style.display = 'flex';
            await API.post({ tab: TAB_NAME, action: 'update', primaryId: ts, Status: stat });
            init();
        }

        async function deletePlan(ts) {
            const res = await Swal.fire({ title: 'Purge Entry?', text: "Permanent removal.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) { loader.style.display = 'flex'; await API.post({ tab: TAB_NAME, action: 'delete', primaryId: ts }); init(); }
        }

        function closeModal() { document.getElementById('plan-modal').classList.add('hidden'); }
        init();
    </script>
</body>
</html>
