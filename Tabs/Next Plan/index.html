<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --panel: #151921; --border: rgba(255, 255, 255, 0.1); --accent: #0ea5e9; 
            --c-planned: #94a3b8; --c-pro: #3b82f6; --c-done: #10b981; --c-urgent: #ef4444;
        }
        body { background: transparent; color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .plan-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 2.5rem; padding: 2rem; margin-bottom: 2rem; transition: all 0.3s ease; }
        .plan-card:hover { border-color: rgba(14, 165, 233, 0.2); }

        /* Summary Badges */
        .analytics-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ana-pill { font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; }
        .ana-pill.blue { color: var(--c-pro); border-color: rgba(59, 130, 246, 0.3); }
        .ana-pill.green { color: var(--c-done); border-color: rgba(16, 185, 129, 0.3); }

        .group-zone { margin-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1rem; }
        .group-header { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }

        .input-field { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 0.75rem; padding: 0.75rem; outline: none; color: white; font-size: 0.875rem; transition: all 0.2s ease; }
        .label-style { text-transform: uppercase; font-size: 10px; font-weight: 700; opacity: 0.4; margin-bottom: 0.25rem; display: block; letter-spacing: 0.1em; }

        .st-select { background: #0b0e14; border: 1px solid var(--border); border-radius: 6px; font-size: 10px; font-weight: 700; color: white; padding: 4px 8px; outline: none; }
        
        #local-loader { display: none; position: fixed; inset: 0; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }

        .bulk-table { width: 100%; font-size: 11px; color: white; }
        .bulk-table th { text-align: left; padding: 10px; opacity: 0.4; border-bottom: 1px solid var(--border); }
        .bulk-table td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #262c36; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-sky-500 animate-pulse font-bold">Synchronizing_Cycle_Plans...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tighter uppercase">Next Cycle Execution</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Strategic Nodes & Resource Forecast</p>
        </div>
        <button onclick="openModal('add')" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-emerald-600/20 transition-all active:scale-95">
            <i data-lucide="plus-circle" size="18"></i> SCHEDULE MULTIPLE PLANS
        </button>
    </div>

    <div id="plan-container"></div>

    <!-- MODAL ENGINE -->
    <div id="plan-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-6xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest">Plan Configurator</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="label-style">Reporting Node (Unit)</label>
                        <select id="UnitCode" class="input-field"></select>
                    </div>
                </div>

                <!-- Bulk Grid Interface -->
                <div class="border border-white/5 rounded-2xl overflow-hidden bg-black/20">
                    <table class="bulk-table">
                        <thead>
                            <tr>
                                <th>Prototype Grouping</th>
                                <th>Scope</th>
                                <th>Actionable Detail</th>
                                <th>Status</th>
                                <th class="w-10"></th>
                            </tr>
                        </thead>
                        <tbody id="bulk-body">
                            <!-- Input rows injected -->
                        </tbody>
                    </table>
                    <button onclick="addInputRow()" class="w-full p-4 text-[10px] font-bold uppercase opacity-30 hover:opacity-100 hover:bg-white/5 transition border-t border-white/5">
                        + Add Another Item
                    </button>
                </div>
            </div>

            <div class="p-8 border-t border-white/5">
                <button onclick="commitPlans()" class="w-full bg-emerald-600 py-4 rounded-2xl font-black text-white hover:bg-emerald-500 transition-all uppercase tracking-widest text-xs">Authorize Future Milestones</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const TAB_NAME = 'NEXT PLAN';
        const PRIO = { 'In Progress': 0, 'Planned': 1, 'Achieved': 2 };
        let activeUnitData = [];

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, planRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                activeUnitData = unitRes.data;
                document.getElementById('UnitCode').innerHTML = activeUnitData.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderCards(planRes.data);
            } catch (e) { Swal.fire('Error', 'Link Lost', 'error'); } finally { loader.style.display = 'none'; }
        }

        function renderCards(data) {
            const container = document.getElementById('plan-container');
            const grouped = data.reduce((acc, item) => {
                const uc = item.UnitCode || 'Unknown';
                if(!acc[uc]) acc[uc] = [];
                acc[uc].push(item);
                return acc;
            }, {});

            if(Object.keys(grouped).length === 0) {
                container.innerHTML = `<div class="py-32 text-center opacity-20 font-mono tracking-[0.5em]">SYSTEM_PLANNING_IDLE</div>`;
                return;
            }

            container.innerHTML = Object.keys(grouped).map(uCode => {
                const items = grouped[uCode];
                
                // Analytics Calculations
                const counts = {
                    planned: items.filter(i => i.Status === 'Planned').length,
                    pro: items.filter(i => i.Status === 'In Progress').length,
                    done: items.filter(i => i.Status === 'Achieved').length,
                    scopes: [...new Set(items.map(i => i.FunctionalScope))]
                };

                return `
                <div class="plan-card">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="label-style">Strategic Node</span>
                            <h2 class="text-3xl font-black text-white tracking-tighter uppercase">${uCode}</h2>
                        </div>
                        <div class="h-10 w-10 rounded-xl bg-emerald-500/10 flex items-center justify-center border border-emerald-500/20 text-emerald-400">
                            <i data-lucide="trending-up" size="20"></i>
                        </div>
                    </div>

                    <!-- ANALYTICS SUMMARY -->
                    <div class="analytics-grid">
                        <div class="ana-pill">${counts.planned} Planned</div>
                        <div class="ana-pill blue">${counts.pro} In Progress</div>
                        <div class="ana-pill green">${counts.done} Achieved</div>
                        ${counts.scopes.map(s => `<div class="ana-pill opacity-40">${s}</div>`).join('')}
                    </div>

                    ${renderSection(items, 'Group_1', '1. Target Utama Shift Berikutnya', 'target', 'text-sky-400')}
                    ${renderSection(items, 'Group_2', '2. Item Menunggu Dukungan Unit Lain', 'users', 'text-amber-400')}
                    ${renderSection(items, 'Group_3', '3. Eskalasi / Keputusan Management', 'shield-alert', 'text-red-500')}
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function renderSection(items, groupKey, title, icon, colorClass) {
            const filtered = items.filter(i => i.ScopeGroup === groupKey).sort((a, b) => PRIO[a.Status] - PRIO[b.Status]);
            if(!filtered.length) return '';

            return `
            <div class="group-zone">
                <div class="group-header ${colorClass}">
                    <i data-lucide="${icon}" size="12"></i> ${title}
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <tbody>
                            ${filtered.map(item => `
                                <tr class="border-b border-white/[0.02] group/row">
                                    <td class="py-4 pr-4 w-32">
                                        <span class="text-[8px] font-black uppercase opacity-40 px-2 py-1 bg-white/5 rounded border border-white/5">${item.FunctionalScope}</span>
                                    </td>
                                    <td class="py-4 pr-4 text-white/70 leading-relaxed font-medium">
                                        ${item.Detail}
                                        <div class="text-[8px] opacity-20 mt-1 font-mono uppercase">${item.Timestamp}</div>
                                    </td>
                                    <td class="py-4 pr-4 w-32">
                                        <select onchange="updateQuickStatus('${item.Timestamp}', this.value)" class="st-select">
                                            ${Object.keys(PRIO).map(s => `<option ${item.Status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                        </select>
                                    </td>
                                    <td class="py-4 text-right flex gap-2 justify-end opacity-0 group-hover/row:opacity-100 transition-all">
                                        <button onclick="editPlan('${item.Timestamp}')" class="text-sky-500/50 hover:text-sky-400"><i data-lucide="edit-3" size="14"></i></button>
                                        <button onclick="deletePlan('${item.Timestamp}')" class="text-red-500/50 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                                    </td>
                                </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </div>`;
        }

        // --- CORE MODAL LOGIC ---
        let inputRows = [];

        function openModal(mode, existingData = null) {
            document.getElementById('plan-modal').classList.remove('hidden');
            document.getElementById('bulk-body').innerHTML = "";
            inputRows = [];
            
            if(mode === 'add') {
                document.getElementById('modal-title').innerText = "Bulk Cycle Configurator";
                addInputRow(); // Start with one row
            }
        }

        function addInputRow(data = null) {
            const id = Date.now() + Math.random();
            const row = document.createElement('tr');
            row.id = `row-${id}`;
            row.innerHTML = `
                <td>
                    <select class="input-field text-[10px] group-sel">
                        <option value="Group_1">Shift Target</option>
                        <option value="Group_2">Unit Support</option>
                        <option value="Group_3">Escalation</option>
                    </select>
                </td>
                <td>
                    <select class="input-field text-[10px] scope-sel">
                        <option>Production Team</option><option>Engineering Support</option>
                        <option>Material & MPC</option><option>Tool & Equipment Team</option>
                        <option>Keuangan / Finance</option><option>Leader & Top Leader</option>
                    </select>
                </td>
                <td><input class="input-field detail-inp" placeholder="Target description..."></td>
                <td>
                    <select class="input-field text-[10px] status-sel">
                        <option>Planned</option><option>In Progress</option><option>Achieved</option>
                    </select>
                </td>
                <td><button onclick="this.closest('tr').remove()" class="text-red-500/20 hover:text-red-500"><i data-lucide="x" size="14"></i></button></td>
            `;
            document.getElementById('bulk-body').appendChild(row);
            lucide.createIcons();
        }

        async function commitPlans() {
            const unit = document.getElementById('UnitCode').value;
            const rows = document.querySelectorAll('#bulk-body tr');
            
            if(!rows.length) return Swal.fire('Empty', 'Add at least one plan', 'warning');

            loader.style.display = 'flex';
            try {
                for(let row of rows) {
                    await API.post({
                        tab: TAB_NAME, action: 'add',
                        UnitCode: unit,
                        ScopeGroup: row.querySelector('.group-sel').value,
                        FunctionalScope: row.querySelector('.scope-sel').value,
                        Detail: row.querySelector('.detail-inp').value,
                        Status: row.querySelector('.status-sel').value,
                        primaryId: Date.now() + Math.random()
                    });
                }
                Swal.fire({ icon: 'success', title: 'Plans Committed', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false });
                closeModal(); init();
            } catch(e) { Swal.fire('Error', 'Transaction Failed', 'error'); } finally { loader.style.display = 'none'; }
        }

        async function updateQuickStatus(ts, stat) {
            loader.style.display = 'flex';
            await API.post({ tab: TAB_NAME, action: 'update', primaryId: ts, Status: stat });
            init();
        }

        async function deletePlan(ts) {
            const res = await Swal.fire({ title: 'Purge Milestone?', text: "Permanent removal.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) {
                loader.style.display = 'flex';
                await API.post({ tab: TAB_NAME, action: 'delete', primaryId: ts });
                init();
            }
        }

        function closeModal() { document.getElementById('plan-modal').classList.add('hidden'); }
        
        init();
    </script>
</body>
</html>
