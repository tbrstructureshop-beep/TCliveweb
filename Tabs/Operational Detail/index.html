<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --panel: #151921; 
            --border: rgba(255, 255, 255, 0.1); 
            --accent: #0ea5e9; 
            --urgent: #ef4444;
        }
        body { background: transparent; color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .op-card {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 2.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }
        .op-card:hover { border-color: rgba(14, 165, 233, 0.2); }

        .input-field {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem;
            outline: none;
            color: white;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }
        .input-field:focus { border-color: var(--accent); }
        
        .label-style {
            text-transform: uppercase; font-size: 10px; font-weight: 700; opacity: 0.4;
            margin-bottom: 0.25rem; display: block; letter-spacing: 0.1em;
        }

        /* Status Colors */
        .status-select {
            background: #0b0e14; border: 1px solid var(--border);
            border-radius: 6px; font-size: 10px; font-weight: 700; color: white; padding: 2px 4px;
        }

        #local-loader {
            display: none; position: fixed; inset: 0;
            background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }

        .bulk-table-container { border: 1px solid var(--border); border-radius: 1rem; overflow: hidden; background: rgba(0,0,0,0.2); }
        .bulk-table { width: 100%; font-size: 11px; }
        .bulk-table th { padding: 12px; background: rgba(255,255,255,0.05); text-align: left; opacity: 0.5; }
        .bulk-table td { padding: 10px; border-top: 1px solid var(--border); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #262c36; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-sky-500 animate-pulse font-bold">Processing_Operations...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tighter uppercase">Operational Detail</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Production Order Flow Control</p>
        </div>
        <div class="flex gap-3">
            <button onclick="openModal('bulk')" class="bg-white/5 border border-white/10 hover:bg-white/10 text-white px-5 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 transition-all">
                <i data-lucide="table-2" size="16"></i> BULK PASTE
            </button>
            <button onclick="openModal('single')" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-sky-600/20 transition-all">
                <i data-lucide="plus" size="16"></i> ADD ORDER
            </button>
        </div>
    </div>

    <div id="op-container"></div>

    <!-- MODAL -->
    <div id="op-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-5xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest">Operation Entry</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="label-style">Target Node (Unit)</label>
                        <select id="UnitCode" class="input-field"></select>
                    </div>
                </div>

                <!-- Bulk View -->
                <div id="bulk-container" class="hidden">
                    <textarea id="paste-buffer" class="absolute opacity-0 pointer-events-none"></textarea>
                    <div onclick="focusBuffer()" class="border-2 border-dashed border-white/10 rounded-2xl p-10 mb-6 text-center cursor-pointer hover:border-sky-500/50 transition-all bg-white/[0.02]">
                        <i data-lucide="clipboard-paste" class="mx-auto mb-3 opacity-20 w-10 h-10"></i>
                        <p class="text-sm text-sky-400 font-bold">Click here then Paste (CTRL+V)</p>
                        <p class="text-[10px] opacity-30 mt-1 uppercase">Format: AC REG | ORDER NO | DESCRIPTION</p>
                    </div>
                    <div class="bulk-table-container">
                        <table class="bulk-table">
                            <thead><tr><th>AC Reg</th><th>Order No</th><th>Description</th><th>Action</th></tr></thead>
                            <tbody id="bulk-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Single View -->
                <div id="single-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label class="label-style">AC Registration</label><input id="s-ac" class="input-field" placeholder="PK-GMF"></div>
                    <div><label class="label-style">Order Number</label><input id="s-order" class="input-field" placeholder="123456"></div>
                    <div class="md:col-span-2"><label class="label-style">Work Description</label><input id="s-desc" class="input-field" placeholder="Details of the job..."></div>
                    <div>
                        <label class="label-style">Initial Status</label>
                        <select id="s-status" class="input-field">
                            <option>Open</option><option>Progress</option><option>Closed</option><option>Highlighted</option><option>Top Urgent</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="p-8 border-t border-white/5">
                <button onclick="submitData()" class="w-full bg-sky-600 py-4 rounded-2xl font-black text-white hover:bg-sky-500 transition-all uppercase tracking-widest text-xs">Execute Data Commit</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        let bulkData = [];
        let currentMode = 'single';
        const TAB_NAME = 'Operational Detail'; // Naming sesuai GitHub & Sheet

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, opRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                document.getElementById('UnitCode').innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderCards(opRes.data);
            } catch (e) {
                Swal.fire('Sync Error', 'Node connection failed.', 'error');
            } finally {
                loader.style.display = 'none';
            }
        }

        function renderCards(data) {
            const container = document.getElementById('op-container');
            const grouped = data.reduce((acc, item) => {
                const uc = item.UnitCode || 'Unknown';
                if(!acc[uc]) acc[uc] = [];
                acc[uc].push(item);
                return acc;
            }, {});

            if(Object.keys(grouped).length === 0) {
                container.innerHTML = `<div class="py-20 text-center opacity-20 font-mono tracking-[0.5em]">OPERATIONS_IDLE</div>`;
                return;
            }

            container.innerHTML = Object.keys(grouped).map(uCode => {
                const items = grouped[uCode].reverse();
                const stats = {
                    total: items.length,
                    done: items.filter(i => i.Status === 'Closed').length,
                    urgent: items.filter(i => i.Status === 'Top Urgent').length
                };

                return `
                <div class="op-card">
                    <div class="flex flex-col lg:flex-row justify-between items-center gap-6 mb-8">
                        <div>
                            <span class="label-style">Operational Node</span>
                            <h2 class="text-3xl font-black text-white tracking-tighter">${uCode}</h2>
                        </div>
                        <div class="flex gap-3">
                            <div class="bg-white/5 border border-white/5 p-4 rounded-3xl text-center min-w-[90px]">
                                <span class="text-white font-black text-xl leading-none">${stats.total}</span>
                                <span class="block text-[8px] opacity-30 uppercase font-bold mt-1">Orders</span>
                            </div>
                            <div class="bg-emerald-500/10 border border-emerald-500/10 p-4 rounded-3xl text-center min-w-[90px]">
                                <span class="text-emerald-500 font-black text-xl leading-none">${stats.done}</span>
                                <span class="block text-[8px] opacity-30 uppercase font-bold mt-1 text-emerald-500">Done</span>
                            </div>
                            <div class="bg-red-500/10 border border-red-500/10 p-4 rounded-3xl text-center min-w-[90px] ${stats.urgent > 0 ? 'animate-pulse' : ''}">
                                <span class="text-red-500 font-black text-xl leading-none">${stats.urgent}</span>
                                <span class="block text-[8px] opacity-30 uppercase font-bold mt-1 text-red-500">Urgent</span>
                            </div>
                        </div>
                    </div>

                    <details class="group">
                        <summary class="list-none flex items-center justify-between p-4 bg-white/5 border border-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition">
                            <span class="text-[10px] font-bold tracking-widest uppercase text-sky-400">Expand Tasks [Order No Control]</span>
                            <i data-lucide="chevron-down" class="group-open:rotate-180 transition"></i>
                        </summary>
                        <div class="mt-6 overflow-x-auto">
                            <table class="w-full text-left text-xs">
                                <thead class="opacity-30 uppercase font-bold border-b border-white/5">
                                    <tr><th class="p-3">AC Reg</th><th class="p-3">Order No</th><th class="p-3">Description</th><th class="p-3">Status</th><th class="p-3 text-right">Delete</th></tr>
                                </thead>
                                <tbody>
                                    ${items.map(item => `
                                        <tr class="border-b border-white/[0.02] hover:bg-white/[0.02]">
                                            <td class="p-3 font-black text-white">${item.ACReg || '-'}</td>
                                            <td class="p-3 font-mono text-sky-400">${item.OrderNo || '-'}</td>
                                            <td class="p-3 opacity-60 text-[11px]">${item.Description || '-'}</td>
                                            <td class="p-3">
                                                <select onchange="updateStatus('${item.UnitCode}', '${item.OrderNo}', this.value)" class="status-select">
                                                    <option ${item.Status === 'Open' ? 'selected' : ''}>Open</option>
                                                    <option ${item.Status === 'Progress' ? 'selected' : ''}>Progress</option>
                                                    <option ${item.Status === 'Closed' ? 'selected' : ''}>Closed</option>
                                                    <option ${item.Status === 'Highlighted' ? 'selected' : ''}>Highlighted</option>
                                                    <option ${item.Status === 'Top Urgent' ? 'selected' : ''}>Top Urgent</option>
                                                </select>
                                            </td>
                                            <td class="p-3 text-right">
                                                <button onclick="deleteOrder('${item.OrderNo}')" class="text-red-500/30 hover:text-red-500 transition"><i data-lucide="trash-2" size="14"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </details>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // --- PASTE & BULK LOGIC ---
        function openModal(mode) {
            currentMode = mode;
            document.getElementById('op-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = mode === 'bulk' ? 'Industrial Bulk Engine' : 'Manual Entry';
            document.getElementById('single-container').classList.toggle('hidden', mode === 'bulk');
            document.getElementById('bulk-container').classList.toggle('hidden', mode === 'single');
            if(mode === 'bulk') focusBuffer();
        }

        function closeModal() { document.getElementById('op-modal').classList.add('hidden'); bulkData = []; renderBulkTable(); }
        function focusBuffer() { document.getElementById('paste-buffer').focus(); }

        document.getElementById('paste-buffer').addEventListener('paste', (e) => {
            e.preventDefault();
            const raw = (e.clipboardData || window.clipboardData).getData('text');
            const rows = raw.split(/\r\n|\n/).filter(r => r.trim() !== "");
            bulkData = rows.map(r => {
                const cols = r.split('\t');
                return { ac: cols[0] || '', order: cols[1] || '', desc: cols[2] || '' };
            });
            renderBulkTable();
        });

        function renderBulkTable() {
            const body = document.getElementById('bulk-table-body');
            body.innerHTML = bulkData.length ? bulkData.map((d, i) => `
                <tr>
                    <td><input value="${d.ac}" oninput="bulkData[${i}].ac=this.value" class="bg-transparent outline-none w-full border-b border-white/5"></td>
                    <td><input value="${d.order}" oninput="bulkData[${i}].order=this.value" class="bg-transparent outline-none w-full border-b border-white/5 font-mono text-sky-400"></td>
                    <td><input value="${d.desc}" oninput="bulkData[${i}].desc=this.value" class="bg-transparent outline-none w-full border-b border-white/5 opacity-60"></td>
                    <td><button onclick="bulkData.splice(${i},1);renderBulkTable()" class="text-red-500/40 hover:text-red-500"><i data-lucide="trash" size="12"></i></button></td>
                </tr>
            `).join('') : '<tr><td colspan="4" class="text-center py-10 opacity-20 italic">No data buffered...</td></tr>';
            lucide.createIcons();
        }

        async function submitData() {
            loader.style.display = 'flex';
            const unit = document.getElementById('UnitCode').value;
            try {
                if(currentMode === 'single') {
                    await API.post({
                        tab: TAB_NAME, action: 'add', UnitCode: unit,
                        ACReg: document.getElementById('s-ac').value,
                        OrderNo: document.getElementById('s-order').value,
                        Description: document.getElementById('s-desc').value,
                        Status: document.getElementById('s-status').value
                    });
                } else {
                    for(let d of bulkData) {
                        await API.post({
                            tab: TAB_NAME, action: 'add', UnitCode: unit, 
                            ACReg: d.ac, OrderNo: d.order, Description: d.desc, Status: 'Open'
                        });
                    }
                }
                Swal.fire({ icon: 'success', title: 'Data Commited', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false });
                closeModal(); init();
            } catch(e) { Swal.fire('Error', 'Transaction failed.', 'error'); } finally { loader.style.display = 'none'; }
        }

        async function updateStatus(uCode, oNo, status) {
            loader.style.display = 'flex';
            await API.post({ tab: TAB_NAME, action: 'update', primaryId: uCode, OrderNo: oNo, Status: status });
            init();
        }

        async function deleteOrder(orderNo) {
            const res = await Swal.fire({ title: 'Delete Order?', text: "This will remove the work order entry.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) {
                loader.style.display = 'flex';
                // Backend GAS logic uses Column A as ID, but you can match with OrderNo in p logic
                await API.post({ tab: TAB_NAME, action: 'delete', primaryId: orderNo });
                init();
            }
        }

        init();
    </script>
</body>
</html>
