<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --panel: #151921; 
            --border: rgba(255, 255, 255, 0.1); 
            --accent: #0ea5e9; 
            --text-main: #94a3b8;
            --text-bold: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.05);
    
            /* Status Colors preserved from original */
            --c-urgent: #ef4444; 
            --c-high: #a855f7; 
            --c-open: #94a3b8; 
            --c-pro: #3b82f6; 
            --c-done: #10b981;
        }
    
        .light {
            --bg: transparent; 
            --panel: #ffffff; 
            --border: #e2e8f0; 
            --accent: #0284c7; 
            --text-main: #475569;
            --text-bold: #1e293b;
            --input-bg: #f8fafc;
        }
    
        body { 
            background: transparent; 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            transition: all 0.3s ease;
        }
    
        /* Card Logic */
        .op-card { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 2.5rem; 
            padding: 2rem; 
            margin-bottom: 2rem; 
            transition: all 0.3s ease; 
        }
        .op-card:hover { border-color: var(--accent); }
    
        /* Input & Dropdown Logic */
        .input-field, .st-select { 
            width: 100%; 
            background: var(--input-bg); 
            border: 1px solid var(--border); 
            border-radius: 0.75rem; 
            padding: 0.75rem; 
            outline: none; 
            color: var(--text-bold); 
            font-size: 0.875rem; 
            transition: all 0.2s ease; 
        }
        .input-field:focus { border-color: var(--accent); }
    
        /* Ensure Options are readable in all browsers */
        select option {
            background-color: white !important;
            color: #1e293b !important;
        }
        .dark select option {
            background-color: #151921 !important;
            color: white !important;
        }
    
        /* Labels & Headers */
        .label-style { 
            text-transform: uppercase; 
            font-size: 10px; 
            font-weight: 700; 
            opacity: 0.4; 
            margin-bottom: 0.25rem; 
            display: block; 
            letter-spacing: 0.1em; 
            color: var(--text-main);
        }
        h1, h2, h3, h4, .text-white { color: var(--text-bold) !important; }
    
        /* Summary Badges */
        .stat-box { 
            flex: 1; 
            min-width: 80px; 
            padding: 12px 8px; 
            border-radius: 1.25rem; 
            border: 1px solid var(--border); 
            text-align: center; 
            background: var(--input-bg); 
        }
        .stat-val { display: block; font-size: 1.25rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
        .stat-lab { font-size: 8px; font-weight: 800; text-transform: uppercase; opacity: 0.5; }
    
        /* Modal Fix */
        #op-modal > div {
            background-color: var(--panel) !important;
            border: 1px solid var(--border) !important;
        }
    
        /* Bulk Table */
        .bulk-table-container { 
            border: 1px solid var(--border); 
            border-radius: 1rem; 
            overflow: hidden; 
            background: var(--input-bg); 
        }
        .bulk-table { width: 100%; font-size: 11px; }
        .bulk-table th { 
            padding: 12px; 
            background: rgba(128,128,128,0.05); 
            text-align: left; 
            opacity: 0.5; 
            color: var(--text-main);
        }
        .bulk-table td { padding: 10px; border-top: 1px solid var(--border); color: var(--text-main); }
    
        /* Accessibility Overrides for Light Mode */
        .light .text-sky-500, .light .text-sky-400 { color: #0369a1 !important; }
        .light .bg-sky-500\/10 { 
            background-color: rgba(2, 132, 199, 0.1) !important; 
            border-color: rgba(2, 132, 199, 0.2) !important; 
        }
    
        /* Layout Elements */
        #local-loader { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(11, 14, 20, 0.9); 
            backdrop-filter: blur(8px); 
            z-index: 1000; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        .light #local-loader { background: rgba(241, 245, 249, 0.8); }
    
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-sky-500 animate-pulse font-bold">Syncing_Operations...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tighter uppercase">Operational Detail</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Priority-Based Task Management</p>
        </div>
        <div class="flex gap-3">
            <button onclick="openModal('bulk')" class="bg-white/5 border border-white/10 hover:bg-white/10 text-white px-5 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 transition-all">
                <i data-lucide="layout-grid" size="16"></i> BULK TABLE
            </button>
            <button onclick="openModal('single')" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-sky-600/20 transition-all">
                <i data-lucide="plus" size="16"></i> ADD SINGLE
            </button>
        </div>
    </div>

    <div id="op-container"></div>

    <!-- MODAL -->
    <div id="op-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-5xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest">Entry Engine</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div>
                        <label class="label-style">Unit Node</label>
                        <select id="UnitCode" class="input-field"></select>
                    </div>
                </div>

                <!-- Bulk View -->
                <div id="bulk-container" class="hidden">
                    <textarea id="paste-buffer" class="absolute opacity-0 pointer-events-none"></textarea>
                    <div onclick="focusBuffer()" class="border-2 border-dashed border-white/10 rounded-2xl p-10 mb-6 text-center cursor-pointer hover:border-sky-500/50 transition-all bg-white/[0.02]">
                        <i data-lucide="clipboard-type" class="mx-auto mb-3 opacity-20 w-10 h-10"></i>
                        <p class="text-sm text-sky-400 font-bold">Direct Paste (CTRL+V)</p>
                        <p class="text-[10px] opacity-30 mt-1 uppercase font-mono">Format: AC REG | ORDER NO | DESCRIPTION</p>
                    </div>
                    <div class="bulk-table-container">
                        <table class="bulk-table">
                            <thead><tr><th>AC Reg</th><th>Order No</th><th>Description</th><th class="w-10"></th></tr></thead>
                            <tbody id="bulk-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Single View -->
                <div id="single-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label class="label-style">AC Registration</label><input id="s-ac" class="input-field" placeholder="PK-GMF"></div>
                    <div><label class="label-style">Order Number</label><input id="s-order" class="input-field" placeholder="123456"></div>
                    <div class="md:col-span-2"><label class="label-style">Work Description</label><input id="s-desc" class="input-field" placeholder="Details of the job..."></div>
                    <div>
                        <label class="label-style">Status</label>
                        <select id="s-status" class="input-field">
                            <option>Top Urgent</option><option>Highlighted</option><option>Open</option><option>Progress</option><option>Closed</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="p-8 border-t border-white/5">
                <button onclick="submitData()" class="w-full bg-sky-600 py-4 rounded-2xl font-black text-white hover:bg-sky-500 transition-all uppercase tracking-widest text-xs">Authorize Data Commit</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const TAB_NAME = 'Operational Detail';
        let bulkData = [], currentMode = 'single';

        const PRIORITY = { 'Top Urgent': 0, 'Highlighted': 1, 'Open': 2, 'Progress': 3, 'Closed': 4 };

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, opRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                document.getElementById('UnitCode').innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderCards(opRes.data);
            } catch (e) { Swal.fire('Error', 'Communication Failed', 'error'); } finally { loader.style.display = 'none'; }
        }

        function renderCards(data) {
            const container = document.getElementById('op-container');
            const grouped = data.reduce((acc, item) => {
                const uc = item.UnitCode || 'Unknown';
                if(!acc[uc]) acc[uc] = [];
                acc[uc].push(item);
                return acc;
            }, {});

            if(Object.keys(grouped).length === 0) {
                container.innerHTML = `<div class="py-32 text-center opacity-20 font-mono tracking-[0.5em]">SYSTEM_IDLE</div>`;
                return;
            }

            container.innerHTML = Object.keys(grouped).map(uCode => {
                // Sort by Priority
                const items = grouped[uCode].sort((a, b) => PRIORITY[a.Status] - PRIORITY[b.Status]);
                
                const stats = {
                    total: items.length,
                    urgent: items.filter(i => i.Status === 'Top Urgent').length,
                    high: items.filter(i => i.Status === 'Highlighted').length,
                    open: items.filter(i => i.Status === 'Open').length,
                    pro: items.filter(i => i.Status === 'Progress').length,
                    done: items.filter(i => i.Status === 'Closed').length
                };

                return `
                <div class="op-card">
                    <div class="flex flex-col xl:flex-row justify-between items-center gap-6 mb-8">
                        <div class="w-full xl:w-auto">
                            <span class="label-style">Production Node</span>
                            <h2 class="text-3xl font-black text-white tracking-tighter">${uCode}</h2>
                        </div>
                        <div class="flex flex-wrap gap-2 w-full xl:w-auto">
                            <div class="stat-box border-sky-500/20"><span class="stat-val text-white">${stats.total}</span><span class="stat-lab">Total</span></div>
                            <div class="stat-box border-red-500/30 ${stats.urgent > 0 ? 'animate-pulse' : ''}"><span class="stat-val text-red-500">${stats.urgent}</span><span class="stat-lab text-red-500">Urgent</span></div>
                            <div class="stat-box border-purple-500/20"><span class="stat-val text-purple-400">${stats.high}</span><span class="stat-lab text-purple-400">High</span></div>
                            <div class="stat-box border-slate-500/20"><span class="stat-val text-slate-400">${stats.open}</span><span class="stat-lab text-slate-400">Open</span></div>
                            <div class="stat-box border-blue-500/20"><span class="stat-val text-blue-400">${stats.pro}</span><span class="stat-lab text-blue-400">Pro</span></div>
                            <div class="stat-box border-emerald-500/20"><span class="stat-val text-emerald-400">${stats.done}</span><span class="stat-lab text-emerald-400">Done</span></div>
                        </div>
                    </div>

                    <details class="group">
                        <summary class="list-none flex items-center justify-between p-4 bg-white/5 border border-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition">
                            <span class="text-[10px] font-bold tracking-widest uppercase text-sky-400">Detail Task Control Flow</span>
                            <i data-lucide="chevron-down" class="group-open:rotate-180 transition"></i>
                        </summary>
                        <div class="mt-6 overflow-x-auto">
                            <table class="w-full text-left text-xs">
                                <thead class="opacity-20 uppercase font-bold border-b border-white/5">
                                    <tr><th class="p-3">AC Reg</th><th class="p-3">Order No</th><th class="p-3">Description</th><th class="p-3">Status</th><th class="p-3 text-right">Action</th></tr>
                                </thead>
                                <tbody>
                                    ${items.map(item => {
                                        let borderStyle = "";
                                        if(item.Status === 'Top Urgent') borderStyle = "border-l-2 border-l-red-500 bg-red-500/5";
                                        if(item.Status === 'Highlighted') borderStyle = "border-l-2 border-l-purple-500 bg-purple-500/5";

                                        return `
                                        <tr class="border-b border-white/[0.02] hover:bg-white/[0.02] ${borderStyle}">
                                            <td class="p-3 font-black text-white uppercase">${item.ACReg || '-'}</td>
                                            <td class="p-3 font-mono text-sky-400">${item.OrderNo || '-'}</td>
                                            <td class="p-3 opacity-60 text-[11px] leading-tight">${item.Description || '-'}</td>
                                            <td class="p-3">
                                                <select onchange="updateStatus('${uCode}', '${item.OrderNo}', this.value)" class="st-select">
                                                    ${['Top Urgent', 'Highlighted', 'Open', 'Progress', 'Closed'].map(s => `<option ${item.Status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                                </select>
                                            </td>
                                            <td class="p-3 text-right">
                                                <button onclick="deleteOrder('${item.OrderNo}')" class="text-white/10 hover:text-red-500 transition"><i data-lucide="trash-2" size="14"></i></button>
                                            </td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </details>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // --- CORE LOGIC ---
        function openModal(mode) {
            currentMode = mode;
            document.getElementById('op-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = mode === 'bulk' ? 'Bulk Engine [Grid Processor]' : 'Single Node Entry';
            document.getElementById('single-container').classList.toggle('hidden', mode === 'bulk');
            document.getElementById('bulk-container').classList.toggle('hidden', mode === 'single');
            if(mode === 'bulk') focusBuffer();
        }

        function closeModal() { document.getElementById('op-modal').classList.add('hidden'); bulkData = []; renderBulkTable(); }
        function focusBuffer() { document.getElementById('paste-buffer').focus(); }

        document.getElementById('paste-buffer').addEventListener('paste', (e) => {
            e.preventDefault();
            const raw = (e.clipboardData || window.clipboardData).getData('text');
            const rows = raw.split(/\r\n|\n/).filter(r => r.trim() !== "");
            bulkData = rows.map(r => {
                const cols = r.split('\t');
                return { ac: cols[0] || '', order: cols[1] || '', desc: cols[2] || '' };
            });
            renderBulkTable();
        });

        function renderBulkTable() {
            const body = document.getElementById('bulk-table-body');
            body.innerHTML = bulkData.length ? bulkData.map((d, i) => `
                <tr>
                    <td><input value="${d.ac}" oninput="bulkData[${i}].ac=this.value" class="bg-transparent outline-none w-full border-b border-white/5 uppercase"></td>
                    <td><input value="${d.order}" oninput="bulkData[${i}].order=this.value" class="bg-transparent outline-none w-full border-b border-white/5 font-mono text-sky-400"></td>
                    <td><input value="${d.desc}" oninput="bulkData[${i}].desc=this.value" class="bg-transparent outline-none w-full border-b border-white/5 opacity-60"></td>
                    <td><button onclick="bulkData.splice(${i},1);renderBulkTable()" class="text-red-500/20 hover:text-red-500"><i data-lucide="x" size="14"></i></button></td>
                </tr>
            `).join('') : '<tr><td colspan="4" class="text-center py-10 opacity-20 italic">Awaiting data stream...</td></tr>';
            lucide.createIcons();
        }

        async function submitData() {
            loader.style.display = 'flex';
            const unit = document.getElementById('UnitCode').value;
            try {
                if(currentMode === 'single') {
                    await API.post({ tab: TAB_NAME, action: 'add', UnitCode: unit, ACReg: document.getElementById('s-ac').value, OrderNo: document.getElementById('s-order').value, Description: document.getElementById('s-desc').value, Status: document.getElementById('s-status').value, primaryId: document.getElementById('s-order').value });
                } else {
                    for(let d of bulkData) {
                        await API.post({ tab: TAB_NAME, action: 'add', UnitCode: unit, ACReg: d.ac, OrderNo: d.order, Description: d.desc, Status: 'Open', primaryId: d.order });
                    }
                }
                Swal.fire({ icon: 'success', title: 'Data Committed', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false });
                closeModal(); init();
            } catch(e) { Swal.fire('Error', 'Transaction Failed', 'error'); } finally { loader.style.display = 'none'; }
        }

        async function updateStatus(uCode, oNo, status) {
            loader.style.display = 'flex';
            await API.post({ tab: TAB_NAME, action: 'update', primaryId: oNo, Status: status });
            init();
        }

        async function deleteOrder(orderNo) {
            const res = await Swal.fire({ title: 'Delete Entry?', text: "Removing order record permanently.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) {
                loader.style.display = 'flex';
                await API.post({ tab: TAB_NAME, action: 'delete', primaryId: orderNo });
                init();
            }
        }

        init();
    </script>
</body>
</html>
