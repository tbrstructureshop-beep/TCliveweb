<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --panel: #151921; --border: rgba(255, 255, 255, 0.1); --accent: #0ea5e9; 
            --text-main: #94a3b8; --text-bold: #ffffff; --input-bg: rgba(255, 255, 255, 0.05);
        }
        .light {
            --bg: transparent; --panel: #ffffff; --border: #e2e8f0; --accent: #0284c7; 
            --text-main: #475569; --text-bold: #1e293b; --input-bg: #f8fafc;
        }
        body { background: transparent; color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; transition: all 0.3s ease; }
        .text-white, h1, h2, h3, h4 { color: var(--text-bold) !important; }
        
        /* Tab Navigation */
        .unit-nav { display: flex; gap: 0.5rem; padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 1.25rem; border: 1px solid var(--border); overflow-x: auto; flex: 1; }
        .unit-nav::-webkit-scrollbar { display: none; }
        .unit-tab { padding: 0.75rem 1.5rem; border-radius: 1rem; font-size: 11px; font-weight: 800; white-space: nowrap; transition: 0.3s; color: var(--text-main); cursor: pointer; border: 1px solid transparent; }
        .unit-tab:hover { background: rgba(255,255,255,0.05); }
        .unit-tab.active { background: var(--accent); color: white !important; box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4); border-color: rgba(255,255,255,0.2); }
        
        .op-card { background-color: var(--panel) !important; border: 1px solid var(--border) !important; border-radius: 2rem; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 15px 35px -10px rgba(0,0,0,0.3); }
        
        .stat-box { flex: 1; min-width: 90px; padding: 10px; border-radius: 1rem; border: 1px solid var(--border); text-align: center; background: var(--input-bg); }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
        .stat-lab { font-size: 7px; font-weight: 800; text-transform: uppercase; opacity: 0.5; }

        .master-table { width: 100%; font-size: 11px; border-spacing: 0 8px; border-collapse: separate; }
        .master-table th { padding: 12px; text-align: left; opacity: 0.4; text-transform: uppercase; font-size: 10px; }
        .master-table td { padding: 12px; background: rgba(255,255,255,0.01); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .master-table td:first-child { border-left: 1px solid var(--border); border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        .master-table td:last-child { border-right: 1px solid var(--border); border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

        .input-field { background: var(--input-bg) !important; border: 1px solid var(--border) !important; color: var(--text-bold) !important; border-radius: 0.75rem; padding: 0.5rem; outline: none; font-size: 0.75rem; }
        
        #local-loader { display: none; position: fixed; inset: 0; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .page-btn { padding: 0.5rem 1rem; border-radius: 0.75rem; background: var(--input-bg); border: 1px solid var(--border); font-size: 11px; font-weight: bold; transition: 0.2s; color: var(--text-bold); }
        .page-btn:hover:not(:disabled) { background: var(--accent); color: white; }
        .page-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin mb-3"></div>
        <span class="text-[10px] font-mono text-sky-500 font-bold uppercase tracking-widest">Processing_Data...</span>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
        <div>
            <h1 class="text-2xl font-black text-white uppercase tracking-tighter">Operational Detail</h1>
            <p class="text-[10px] opacity-40 font-mono uppercase tracking-widest">Hybrid Command Center (Supabase + Sheets)</p>
        </div>
        <div class="flex gap-3">
            <button onclick="openModal('bulk')" class="bg-white/5 border border-white/10 hover:bg-white/10 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase transition-all">
                <i data-lucide="layout-grid" class="inline-block mr-1" size="14"></i> Bulk Table
            </button>
            <button onclick="openModal('single')" class="bg-sky-600 hover:bg-sky-500 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase transition-all shadow-lg shadow-sky-600/20">
                <i data-lucide="plus" class="inline-block mr-1" size="14"></i> Add Single
            </button>
        </div>
    </div>

    <!-- TAB NAV -->
    <div class="unit-nav-wrapper mb-8">
        <div id="unit-tabs" class="unit-nav"></div>
    </div>

    <div id="op-container"></div>

    <!-- MODAL -->
    <div id="op-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[2.5rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 border-b border-white/5 flex justify-between items-center text-white">
                <h3 id="modal-title" class="text-lg font-bold uppercase tracking-widest">Entry Engine</h3>
                <button onclick="closeModal()" class="opacity-30 hover:opacity-100"><i data-lucide="x"></i></button>
            </div>
            <div class="p-8 space-y-4">
                <div><label class="text-[10px] font-bold uppercase mb-2 block">Unit Node</label><select id="UnitCode" class="input-field w-full"></select></div>
                <div id="bulk-container" class="hidden">
                    <textarea id="paste-buffer" onpaste="handlePaste(event)" class="w-full h-32 bg-white/5 border border-white/10 rounded-xl p-4 text-xs text-white outline-none focus:border-sky-500" placeholder="Paste data from Excel here..."></textarea>
                </div>
                <div id="single-container" class="grid grid-cols-2 gap-4">
                    <input type="hidden" id="primaryId">
                    <div><label class="text-[10px] font-bold uppercase mb-1 block">AC Reg</label><input id="s-ac" class="input-field w-full"></div>
                    <div><label class="text-[10px] font-bold uppercase mb-1 block">Order No</label><input id="s-order" class="input-field w-full"></div>
                    <div class="col-span-2"><label class="text-[10px] font-bold uppercase mb-1 block">Description</label><input id="s-desc" class="input-field w-full"></div>
                    <div class="col-span-2"><label class="text-[10px] font-bold uppercase mb-1 block">Status</label>
                        <select id="s-status" class="input-field w-full">
                            <option>Top Urgent</option><option>Highlighted</option><option>Open</option><option>Progress</option><option>Closed</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-white/5">
                <button onclick="submitData()" class="w-full bg-sky-600 py-3 rounded-xl font-bold text-white text-[11px] uppercase tracking-widest">Execute Data authorization</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const TAB_NAME = 'Operational Detail';
        
        // Configuration
        let currentPage = 1, rowsPerPage = 10;
        let rawOpData = [], supabaseData = [], activeUnit = null, currentMode = 'single', bulkData = [];
        const PRIORITY = { 'Top Urgent': 0, 'Highlighted': 1, 'Open': 2, 'Progress': 3, 'Closed': 4 };

        // Supabase Init
        const S_URL = 'https://kuzsjdtluabnfkzyffgz.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1enNqZHRsdWFibmZrenlmZmd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTEyNzI0NTQsImV4cCI6MjA2Njg0ODQ1NH0.D-OhicEqoxnnX8G-mwi2Y4X8_03dgDsy_flNj2YbYVI';
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        // Map Supabase Units
        const SUPABASE_UNITS = {
            'TCR-1': { colStatus: 'status_sm1', colDate: 'date_closed_sm1', colReport: 'report_sm1', filterCek: 'cek_sm1' },
            'TCR-2': { colStatus: 'status_cs1', colDate: 'date_closed_cs1', colReport: 'report_cs1', filterCek: 'cek_cs1' },
            'TCR-5': { colStatus: 'status_mw',  colDate: 'date_closed_mw',  colReport: 'report_mw',  filterCek: 'cek_mw' }
        };

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, opRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                rawOpData = opRes.data || [];
                
                // Fetch Supabase Data
                const { data: sData, error } = await supabaseClient.from('mdr_tracking').select('*').eq('archived', false);
                if (error) throw error;
                supabaseData = sData;

                document.getElementById('UnitCode').innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderTabs(unitRes.data);
                if(!activeUnit && unitRes.data.length > 0) activeUnit = unitRes.data[0].UnitCode;
                renderCards();
            } catch (e) { Swal.fire('Error', e.message, 'error'); } 
            finally { loader.style.display = 'none'; }
        }

        function renderTabs(units) {
            document.getElementById('unit-tabs').innerHTML = units.map(u => 
                `<button onclick="switchUnit('${u.UnitCode}')" class="unit-tab ${u.UnitCode === activeUnit ? 'active' : ''}">${u.UnitCode}</button>`
            ).join('');
        }

        function renderCards() {
            const container = document.getElementById('op-container');
            const sMap = SUPABASE_UNITS[activeUnit];
            let fullData = [];

            // Switch source based on unit
            if (sMap) {
                fullData = supabaseData
                    .filter(item => item[sMap.filterCek] === 'red' && (item[sMap.colReport] === 'checked' || item[sMap.colReport] === true))
                    .map(item => ({
                        ACReg: item.ac_reg, OrderNo: item.order, Description: item.description,
                        Status: formatStatus(item[sMap.colStatus]), isSupabase: true
                    }));
            } else {
                fullData = rawOpData.filter(i => i.UnitCode === activeUnit).map(i => ({...i, isSupabase: false}));
            }
            fullData.sort((a, b) => PRIORITY[a.Status] - PRIORITY[b.Status]);

            // Stats
            const stats = {
                total: fullData.length,
                urgent: fullData.filter(i => i.Status === 'Top Urgent').length,
                open: fullData.filter(i => i.Status === 'Open').length,
                prog: fullData.filter(i => i.Status === 'Progress').length,
                done: fullData.filter(i => i.Status === 'Closed').length
            };

            // Pagination Logic
            const limit = rowsPerPage === 'All' ? stats.total : parseInt(rowsPerPage);
            const totalPages = Math.ceil(stats.total / limit) || 1;
            const start = (currentPage - 1) * limit;
            const items = fullData.slice(start, start + limit);

            container.innerHTML = `
                <div class="op-card animate-in fade-in duration-500">
                    <div class="flex flex-col xl:flex-row justify-between gap-6 mb-8">
                        <div>
                            <span class="text-[9px] font-bold uppercase text-sky-500 tracking-[0.2em] mb-1 block">${sMap ? 'Live Database Mode' : 'Static Sheet Mode'}</span>
                            <h2 class="text-4xl font-black text-white tracking-tighter uppercase">${activeUnit}</h2>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <div class="stat-box"><span class="stat-val text-white">${stats.total}</span><span class="stat-lab">Total</span></div>
                            <div class="stat-box border-red-500/30 text-red-500"><span class="stat-val">${stats.urgent}</span><span class="stat-lab">Urgent</span></div>
                            <div class="stat-box border-blue-500/20 text-blue-400"><span class="stat-val">${stats.open}</span><span class="stat-lab">Open</span></div>
                            <div class="stat-box border-yellow-500/20 text-yellow-400"><span class="stat-val">${stats.prog}</span><span class="stat-lab">Progress</span></div>
                            <div class="stat-box border-emerald-500/20 text-emerald-400"><span class="stat-val">${stats.done}</span><span class="stat-lab">Closed</span></div>
                        </div>
                    </div>

                    <!-- Pagination Header -->
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl mb-6 border border-white/5">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-bold uppercase opacity-40">Display</span>
                            <select onchange="changeRowsPerPage(this.value)" class="input-field py-1">
                                <option value="10" ${rowsPerPage == 10 ? 'selected' : ''}>10</option>
                                <option value="25" ${rowsPerPage == 25 ? 'selected' : ''}>25</option>
                                <option value="50" ${rowsPerPage == 50 ? 'selected' : ''}>50</option>
                                <option value="All" ${rowsPerPage == 'All' ? 'selected' : ''}>All</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''} class="page-btn"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                            <span class="text-[10px] font-bold text-white uppercase tracking-widest">Page ${currentPage} of ${totalPages}</span>
                            <button onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''} class="page-btn"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="master-table">
                            <thead><tr><th>AC Reg</th><th>Order No</th><th>Description</th><th class="w-32">Status</th><th class="text-right">Action</th></tr></thead>
                            <tbody>
                                ${items.map(item => `
                                    <tr class="group">
                                        <td class="font-black text-white uppercase">${item.ACReg}</td>
                                        <td class="font-mono text-sky-400 font-bold">${item.OrderNo}</td>
                                        <td class="text-white/60 leading-tight text-xs">${item.Description}</td>
                                        <td>
                                            <select onchange="handleUpdateStatus('${activeUnit}', '${item.OrderNo}', this.value)" class="bg-transparent border-none text-[10px] font-bold outline-none cursor-pointer text-sky-500">
                                                ${['Top Urgent', 'Highlighted', 'Open', 'Progress', 'Closed'].map(s => `<option ${item.Status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                            </select>
                                        </td>
                                        <td class="text-right">
                                            <div class="flex gap-4 justify-end opacity-0 group-hover:opacity-100 transition-all">
                                                <button onclick="editOrder('${item.OrderNo}')" class="text-sky-500/50 hover:text-sky-400"><i data-lucide="edit-3" size="14"></i></button>
                                                <button onclick="deleteOrder('${item.OrderNo}')" class="text-red-500/30 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                                            </div>
                                        </td>
                                    </tr>`).join('')}
                                ${items.length === 0 ? '<tr><td colspan="5" class="text-center py-20 opacity-20 italic">No queue found in this node</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        // Logic Functions
        function switchUnit(uCode) { activeUnit = uCode; currentPage = 1; renderCards(); renderTabs(rawOpData); }
        function changePage(dir) { currentPage += dir; renderCards(); }
        function changeRowsPerPage(val) { rowsPerPage = val; currentPage = 1; renderCards(); }

        async function handleUpdateStatus(uCode, oNo, status) {
            loader.style.display = 'flex';
            const sMap = SUPABASE_UNITS[uCode];
            try {
                if (sMap) {
                    const payload = {}; payload[sMap.colStatus] = status.toUpperCase();
                    if (status === 'Closed') {
                        const now = new Date();
                        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                        payload[sMap.colDate] = `${now.getDate().toString().padStart(2,'0')}-${months[now.getMonth()]}-${now.getFullYear()}`;
                    }
                    await supabaseClient.from('mdr_tracking').update(payload).eq('order', oNo);
                } else {
                    await API.post({ tab: TAB_NAME, action: 'update', primaryId: oNo, Status: status });
                }
                await init();
            } catch (e) { loader.style.display = 'none'; }
        }

        async function submitData() {
            loader.style.display = 'flex';
            const unit = document.getElementById('UnitCode').value;
            const sMap = SUPABASE_UNITS[unit];
            const orderNo = document.getElementById('s-order').value;
            const status = document.getElementById('s-status').value;

            try {
                if (sMap && currentMode === 'edit') {
                    const payload = {}; payload[sMap.colStatus] = status.toUpperCase();
                    await supabaseClient.from('mdr_tracking').update(payload).eq('order', orderNo);
                } else {
                    const action = (currentMode === 'edit' ? 'update' : 'add');
                    await API.post({ 
                        tab: TAB_NAME, action: action, UnitCode: unit, 
                        ACReg: document.getElementById('s-ac').value, OrderNo: orderNo, 
                        Description: document.getElementById('s-desc').value, Status: status, primaryId: orderNo 
                    });
                }
                closeModal(); await init();
            } catch (e) { loader.style.display = 'none'; }
        }

        async function deleteOrder(orderNo) {
            const sMap = SUPABASE_UNITS[activeUnit];
            const res = await Swal.fire({ 
                title: 'Confirm deletion?', text: sMap ? 'This will un-report the item from LIVE Supabase.' : 'Delete from spreadsheet permanently?',
                icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' 
            });
            if(res.isConfirmed) {
                loader.style.display = 'flex';
                try {
                    if (sMap) {
                        const payload = {}; payload[sMap.colReport] = '';
                        await supabaseClient.from('mdr_tracking').update(payload).eq('order', orderNo);
                    } else {
                        await API.post({ tab: TAB_NAME, action: 'delete', primaryId: orderNo });
                    }
                    await init();
                } catch (e) { loader.style.display = 'none'; }
            }
        }

        function editOrder(orderNo) {
            const sMap = SUPABASE_UNITS[activeUnit];
            let item;
            if (sMap) {
                const raw = supabaseData.find(d => d.order === orderNo);
                item = { UnitCode: activeUnit, OrderNo: raw.order, ACReg: raw.ac_reg, Description: raw.description, Status: formatStatus(raw[sMap.colStatus]) };
            } else {
                item = rawOpData.find(d => d.OrderNo === orderNo);
            }
            if(!item) return; 
            openModal('edit');
            document.getElementById('UnitCode').value = item.UnitCode;
            document.getElementById('primaryId').value = item.OrderNo;
            document.getElementById('s-ac').value = item.ACReg;
            document.getElementById('s-order').value = item.OrderNo;
            document.getElementById('s-desc').value = item.Description;
            document.getElementById('s-status').value = item.Status;
        }

        // Helpers
        function formatStatus(s) { if (!s) return 'Open'; return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase(); }
        function handlePaste(e) { /* existing paste logic */ }
        function openModal(mode) { currentMode = mode; document.getElementById('op-modal').classList.remove('hidden'); document.getElementById('bulk-container').classList.toggle('hidden', mode !== 'bulk'); document.getElementById('single-container').classList.toggle('hidden', mode === 'bulk'); }
        function closeModal() { document.getElementById('op-modal').classList.add('hidden'); }

        init();
    </script>
</body>
</html>
