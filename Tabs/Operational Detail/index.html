<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { --bg: #0b0e14; --panel: #151921; --border: rgba(255,255,255,0.1); --accent: #0ea5e9; }
        body { background: transparent; color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .op-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); @apply rounded-[2.5rem] p-6 mb-6 transition-all duration-300; }
        .op-card:hover { border-color: rgba(14, 165, 233, 0.2); }
        
        .status-pill { @apply px-2 py-1 rounded-md text-[9px] font-black uppercase tracking-tighter border; }
        .status-open { @apply bg-slate-500/10 text-slate-400 border-slate-500/20; }
        .status-progress { @apply bg-blue-500/10 text-blue-400 border-blue-500/20; }
        .status-closed { @apply bg-emerald-500/10 text-emerald-400 border-emerald-500/20; }
        .status-highlighted { @apply bg-purple-500/10 text-purple-400 border-purple-500/20; }
        .status-urgent { @apply bg-red-500/10 text-red-400 border-red-500/20 animate-pulse; }

        .input-field { @apply w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-sky-500 text-white text-sm transition-all; }
        .label-style { @apply text-[10px] uppercase font-bold opacity-40 mb-1 block tracking-widest; }
        
        #local-loader { display: none; position: fixed; inset: 0; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        
        .summary-badge { @apply flex flex-col items-center justify-center p-3 rounded-2xl bg-white/5 border border-white/5 min-w-[70px]; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #262c36; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- LOADER -->
    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-sky-500 animate-pulse font-bold">Syncing_Operations...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tight uppercase tracking-tighter">Operational Detail</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Aircraft Service & Order Tracking</p>
        </div>
        <div class="flex gap-2">
            <button onclick="openModal('bulk')" class="bg-white/5 border border-white/10 hover:bg-white/10 text-white px-5 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 transition-all">
                <i data-lucide="clipboard-list" size="16"></i> BULK PASTE
            </button>
            <button onclick="openModal('single')" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-sky-600/20 transition-all">
                <i data-lucide="plus" size="16"></i> SINGLE ENTRY
            </button>
        </div>
    </div>

    <!-- MAIN LIST -->
    <div id="op-container"></div>

    <!-- MODAL -->
    <div id="op-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[2.5rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest">Operation Entry</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <form id="op-form" class="p-8 overflow-y-auto space-y-6">
                <input type="hidden" id="primaryId">
                
                <div>
                    <label class="label-style">Select Unit</label>
                    <select id="UnitCode" name="UnitCode" required class="input-field"></select>
                </div>

                <!-- SINGLE MODE -->
                <div id="single-fields" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="label-style">AC Reg</label><input name="ACReg" class="input-field" placeholder="e.g. PK-GMF"></div>
                        <div><label class="label-style">Order No</label><input name="OrderNo" class="input-field" placeholder="e.g. 123456"></div>
                    </div>
                    <div><label class="label-style">Description</label><input name="Description" class="input-field" placeholder="Pekerjaan detail..."></div>
                    <div>
                        <label class="label-style">Initial Status</label>
                        <select name="Status" class="input-field">
                            <option>Open</option><option>Progress</option><option>Closed</option><option>Highlighted</option><option>Top Urgent</option>
                        </select>
                    </div>
                </div>

                <!-- BULK MODE -->
                <div id="bulk-fields" class="hidden space-y-2">
                    <label class="label-style">Paste from Excel/Sheets (AC Reg | Order No | Description)</label>
                    <textarea id="bulk-data" class="input-field h-40 font-mono text-[10px] leading-tight" placeholder="PK-AAA	1001	Daily Check&#10;PK-BBB	1002	Weekly Maintenance"></textarea>
                    <p class="text-[9px] opacity-30 italic">Note: Use Tab or Pipe (|) as separator between columns.</p>
                </div>

                <div class="flex pt-4">
                    <button type="submit" class="w-full bg-sky-600 py-4 rounded-2xl font-bold text-white hover:bg-sky-500 transition-all uppercase tracking-widest text-xs">Commit Operations</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        let currentMode = 'single';

        async function init() {
            loader.style.display = 'flex';
            try {
                const unitRes = await API.get('UNIT');
                document.getElementById('UnitCode').innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');

                const opRes = await API.get('OPERASIONAL');
                renderOperations(opRes.data);
            } catch (e) {
                Swal.fire('Error', 'Communication with server failed.', 'error');
            } finally {
                loader.style.display = 'none';
            }
        }

        function renderOperations(data) {
            const container = document.getElementById('op-container');
            
            // Group by UnitCode
            const grouped = data.reduce((acc, item) => {
                if(!acc[item.UnitCode]) acc[item.UnitCode] = [];
                acc[item.UnitCode].push(item);
                return acc;
            }, {});

            if(Object.keys(grouped).length === 0) {
                container.innerHTML = `<div class="py-20 text-center opacity-20 uppercase font-mono tracking-widest">No_Active_Orders</div>`;
                return;
            }

            container.innerHTML = Object.keys(grouped).map(uCode => {
                const items = grouped[uCode].reverse();
                const total = items.length;
                const stats = {
                    open: items.filter(i => i.Status === 'Open').length,
                    progress: items.filter(i => i.Status === 'Progress').length,
                    closed: items.filter(i => i.Status === 'Closed').length,
                    high: items.filter(i => i.Status === 'Highlighted').length,
                    urgent: items.filter(i => i.Status === 'Top Urgent').length
                };

                return `
                <div class="op-card">
                    <div class="flex flex-col lg:flex-row justify-between gap-6 mb-8">
                        <div>
                            <span class="label-style">Target Node</span>
                            <h2 class="text-white text-2xl font-black uppercase tracking-tighter">${uCode}</h2>
                        </div>
                        
                        <div class="flex flex-wrap gap-2">
                            <div class="summary-badge border-sky-500/30"><span class="text-sky-500 font-black text-xl">${total}</span><span class="text-[8px] opacity-40 uppercase">Total</span></div>
                            <div class="summary-badge"><span class="text-white font-black text-xl">${stats.open}</span><span class="text-[8px] opacity-40 uppercase">Open</span></div>
                            <div class="summary-badge"><span class="text-blue-400 font-black text-xl">${stats.progress}</span><span class="text-[8px] opacity-40 uppercase">Progress</span></div>
                            <div class="summary-badge"><span class="text-emerald-400 font-black text-xl">${stats.closed}</span><span class="text-[8px] opacity-40 uppercase">Closed</span></div>
                            <div class="summary-badge"><span class="text-purple-400 font-black text-xl">${stats.high}</span><span class="text-[8px] opacity-40 uppercase">High</span></div>
                            <div class="summary-badge border-red-500/30 animate-pulse"><span class="text-red-500 font-black text-xl">${stats.urgent}</span><span class="text-[8px] opacity-40 uppercase tracking-tighter">Urgent</span></div>
                        </div>
                    </div>

                    <details class="group">
                        <summary class="list-none cursor-pointer flex items-center justify-center gap-2 p-2 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition-all text-[10px] font-bold uppercase tracking-widest text-sky-400">
                            View Detailed Order List <i data-lucide="chevron-down" class="group-open:rotate-180 transition-transform"></i>
                        </summary>
                        
                        <div class="mt-6 overflow-x-auto">
                            <table class="w-full text-left text-xs">
                                <thead class="opacity-30 uppercase font-black tracking-widest border-b border-white/5">
                                    <tr>
                                        <th class="py-3 px-2">Timestamp</th>
                                        <th class="py-3 px-2">AC Reg</th>
                                        <th class="py-3 px-2">Order No</th>
                                        <th class="py-3 px-2">Description</th>
                                        <th class="py-3 px-2">Status Control</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${items.map(item => `
                                        <tr class="border-b border-white/5 hover:bg-white/[0.02] transition">
                                            <td class="py-3 px-2 font-mono opacity-40 text-[9px]">${item.Timestamp}</td>
                                            <td class="py-3 px-2 font-black text-white">${item.ACReg}</td>
                                            <td class="py-3 px-2 font-mono text-sky-500">${item.OrderNo}</td>
                                            <td class="py-3 px-2 opacity-70">${item.Description}</td>
                                            <td class="py-3 px-2">
                                                <select onchange="quickUpdateStatus('${item.UnitCode}', '${item.OrderNo}', this.value)" class="bg-black/40 border border-white/10 rounded-lg p-1 text-[9px] font-bold outline-none focus:border-sky-500">
                                                    <option ${item.Status === 'Open' ? 'selected' : ''}>Open</option>
                                                    <option ${item.Status === 'Progress' ? 'selected' : ''}>Progress</option>
                                                    <option ${item.Status === 'Closed' ? 'selected' : ''}>Closed</option>
                                                    <option ${item.Status === 'Highlighted' ? 'selected' : ''}>Highlighted</option>
                                                    <option ${item.Status === 'Top Urgent' ? 'selected' : ''}>Top Urgent</option>
                                                </select>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </details>
                </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        // MODAL LOGIC
        function openModal(mode) {
            currentMode = mode;
            document.getElementById('op-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = mode === 'bulk' ? 'Bulk Paste Engine' : 'Single Order Entry';
            document.getElementById('single-fields').classList.toggle('hidden', mode === 'bulk');
            document.getElementById('bulk-fields').classList.toggle('hidden', mode === 'single');
        }

        function closeModal() {
            document.getElementById('op-modal').classList.add('hidden');
            document.getElementById('op-form').reset();
        }

        document.getElementById('op-form').onsubmit = async (e) => {
            e.preventDefault();
            loader.style.display = 'flex';
            const unit = document.getElementById('UnitCode').value;

            try {
                if(currentMode === 'single') {
                    const fd = new FormData(e.target);
                    const payload = { tab: 'OPERASIONAL', action: 'add', primaryId: fd.get('OrderNo') };
                    fd.forEach((v, k) => payload[k] = v);
                    await API.post(payload);
                } else {
                    // BULK PASTE LOGIC
                    const raw = document.getElementById('bulk-data').value;
                    const rows = raw.split('\n').filter(r => r.trim() !== "");
                    
                    for(let r of rows) {
                        const cols = r.split(/\t|\|/); // Split by Tab or Pipe
                        if(cols.length < 3) continue;
                        
                        await API.post({
                            tab: 'OPERASIONAL', action: 'add',
                            UnitCode: unit,
                            ACReg: cols[0].trim(),
                            OrderNo: cols[1].trim(),
                            Description: cols[2].trim(),
                            Status: 'Open'
                        });
                    }
                }
                
                Swal.fire({ icon: 'success', title: 'Data Commited', showConfirmButton: false, timer: 1500, background: '#151921', color: '#fff' });
                closeModal();
                init();
            } catch (err) {
                Swal.fire('Error', 'Failed to commit operations.', 'error');
            } finally {
                loader.style.display = 'none';
            }
        };

        async function quickUpdateStatus(unitCode, orderNo, newStatus) {
            loader.style.display = 'flex';
            try {
                await API.post({
                    tab: 'OPERASIONAL',
                    action: 'update',
                    primaryId: unitCode, // Backend uses headers[0] (UnitCode) as primaryId
                    OrderNo: orderNo,    // In GAS update, we map based on first column. 
                    Status: newStatus
                });
                // Small trick: since GAS update searches first col, make sure backend is robust.
                // Current GAS matches p.primaryId with data[i][0].
                init();
            } finally {
                loader.style.display = 'none';
            }
        }

        init();
    </script>
</body>
</html>
