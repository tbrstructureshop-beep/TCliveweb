<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --panel: #151921; 
            --border: rgba(255, 255, 255, 0.1); 
            --accent: #0ea5e9; 
            --urgent: #ef4444;
        }
        body { background: transparent; color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Industrial Card & Layout */
        .op-card {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 2.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }
        .op-card:hover { border-color: rgba(14, 165, 233, 0.2); }

        .input-field {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem;
            outline: none;
            color: white;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }
        .input-field:focus { border-color: var(--accent); }
        
        .label-style {
            text-transform: uppercase;
            font-size: 10px;
            font-weight: 700;
            opacity: 0.4;
            margin-bottom: 0.25rem;
            display: block;
            letter-spacing: 0.1em;
        }

        /* Status Colors */
        .pill { padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; text-transform: uppercase; border: 1px solid transparent; }
        .pill-open { background: rgba(148, 163, 184, 0.1); color: #94a3b8; border-color: rgba(148, 163, 184, 0.2); }
        .pill-progress { background: rgba(14, 165, 233, 0.1); color: #0ea5e9; border-color: rgba(14, 165, 233, 0.2); }
        .pill-closed { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: rgba(16, 185, 129, 0.2); }
        .pill-urgent { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.2); animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Bulk Table Styling */
        .bulk-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .bulk-table th { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); opacity: 0.4; text-transform: uppercase; }
        .bulk-table td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        #local-loader {
            display: none; position: fixed; inset: 0;
            background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #262c36; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.4em] text-sky-500 animate-pulse font-bold">Syncing_Operations...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tighter uppercase">Operational Detail</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Live Order Tracking & Management</p>
        </div>
        <div class="flex gap-3">
            <button onclick="openModal('bulk')" class="bg-white/5 border border-white/10 hover:bg-white/10 text-white px-5 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 transition-all">
                <i data-lucide="copy" size="16"></i> BULK TABLE PASTE
            </button>
            <button onclick="openModal('single')" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-sky-600/20 transition-all">
                <i data-lucide="plus" size="16"></i> NEW ORDER
            </button>
        </div>
    </div>

    <!-- CONTENT GRID -->
    <div id="op-container"></div>

    <!-- MODAL ENGINE -->
    <div id="op-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-5xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest">Operation Entry</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="md:col-span-1">
                        <label class="label-style">Target Node (Unit)</label>
                        <select id="UnitCode" class="input-field"></select>
                    </div>
                    <div class="md:col-span-2" id="paste-instruction">
                        <label class="label-style">Instruction</label>
                        <p class="text-[10px] opacity-40">Paste data from Excel/Sheets directly. Structure: AC Reg | Order No | Description</p>
                    </div>
                </div>

                <!-- Bulk Table View -->
                <div id="bulk-container" class="hidden">
                    <textarea id="paste-buffer" class="absolute opacity-0 pointer-events-none"></textarea>
                    <div onclick="focusBuffer()" class="border-2 border-dashed border-white/10 rounded-2xl p-8 mb-4 text-center cursor-pointer hover:border-sky-500/50 transition-all bg-white/[0.02]">
                        <i data-lucide="mouse-pointer-2" class="mx-auto mb-2 opacity-20"></i>
                        <p class="text-xs opacity-40">Click here then <span class="text-sky-500 font-bold">CTRL+V</span> to paste table</p>
                    </div>
                    <div class="overflow-x-auto border border-white/5 rounded-2xl bg-black/20">
                        <table class="bulk-table">
                            <thead>
                                <tr><th>AC Reg</th><th>Order No</th><th>Description</th><th>Action</th></tr>
                            </thead>
                            <tbody id="bulk-table-body">
                                <tr><td colspan="4" class="text-center py-10 opacity-20 italic">No data buffered...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Single Form View -->
                <div id="single-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="label-style">AC Registration</label><input id="s-ac" class="input-field" placeholder="PK-ABC"></div>
                    <div><label class="label-style">Order Number</label><input id="s-order" class="input-field" placeholder="WO-12345"></div>
                    <div class="md:col-span-2"><label class="label-style">Description</label><input id="s-desc" class="input-field" placeholder="Work scope details..."></div>
                    <div>
                        <label class="label-style">Initial Status</label>
                        <select id="s-status" class="input-field">
                            <option>Open</option><option>Progress</option><option>Closed</option><option>Highlighted</option><option>Top Urgent</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="p-8 border-t border-white/5 bg-white/[0.01]">
                <button onclick="submitData()" class="w-full bg-sky-600 py-4 rounded-2xl font-black text-white hover:bg-sky-500 transition-all uppercase tracking-widest text-xs shadow-xl shadow-sky-600/10">Commit Records to Node</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        let bulkData = [];
        let currentMode = 'single';

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, opRes] = await Promise.all([API.get('UNIT'), API.get('OPERASIONAL')]);
                document.getElementById('UnitCode').innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderCards(opRes.data);
            } catch (e) {
                Swal.fire('Node Offline', 'Check your API connection.', 'error');
            } finally {
                loader.style.display = 'none';
            }
        }

        function renderCards(data) {
            const container = document.getElementById('op-container');
            const grouped = data.reduce((acc, item) => {
                if(!acc[item.UnitCode]) acc[item.UnitCode] = [];
                acc[item.UnitCode].push(item);
                return acc;
            }, {});

            if(Object.keys(grouped).length === 0) {
                container.innerHTML = `<div class="py-20 text-center opacity-20 font-mono tracking-[0.5em]">SYSTEM_EMPTY</div>`;
                return;
            }

            container.innerHTML = Object.keys(grouped).map(uCode => {
                const items = grouped[uCode].reverse();
                const stats = {
                    total: items.length,
                    open: items.filter(i => i.Status === 'Open').length,
                    closed: items.filter(i => i.Status === 'Closed').length,
                    urgent: items.filter(i => i.Status === 'Top Urgent').length
                };

                return `
                <div class="op-card">
                    <div class="flex flex-col lg:flex-row justify-between items-center gap-6 mb-8">
                        <div>
                            <span class="label-style">Active Unit</span>
                            <h2 class="text-3xl font-black text-white tracking-tighter">${uCode}</h2>
                        </div>
                        <div class="flex gap-3">
                            <div class="bg-white/5 border border-white/5 p-3 rounded-2xl text-center min-w-[80px]">
                                <span class="text-white font-black text-xl">${stats.total}</span>
                                <span class="block text-[8px] opacity-30 uppercase font-bold">Orders</span>
                            </div>
                            <div class="bg-emerald-500/10 border border-emerald-500/10 p-3 rounded-2xl text-center min-w-[80px]">
                                <span class="text-emerald-500 font-black text-xl">${stats.closed}</span>
                                <span class="block text-[8px] opacity-30 uppercase font-bold text-emerald-500">Done</span>
                            </div>
                            <div class="bg-red-500/10 border border-red-500/10 p-3 rounded-2xl text-center min-w-[80px] animate-pulse">
                                <span class="text-red-500 font-black text-xl">${stats.urgent}</span>
                                <span class="block text-[8px] opacity-30 uppercase font-bold text-red-500">Urgent</span>
                            </div>
                        </div>
                    </div>

                    <details class="group">
                        <summary class="list-none flex items-center justify-between p-4 bg-white/5 border border-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition">
                            <span class="text-[10px] font-bold tracking-widest uppercase opacity-60">Expand Task Details</span>
                            <i data-lucide="chevron-down" class="group-open:rotate-180 transition"></i>
                        </summary>
                        <div class="mt-6 overflow-x-auto">
                            <table class="w-full text-left text-xs">
                                <thead class="opacity-20 uppercase font-bold border-b border-white/5">
                                    <tr><th class="py-3 px-2">AC Reg</th><th class="py-3 px-2">Order No</th><th class="py-3 px-2">Description</th><th class="py-3 px-2 text-right">Status Control</th></tr>
                                </thead>
                                <tbody>
                                    ${items.map(item => `
                                        <tr class="border-b border-white/[0.02] hover:bg-white/[0.02]">
                                            <td class="py-4 px-2 font-black text-white">${item.ACReg}</td>
                                            <td class="py-4 px-2 font-mono text-sky-500">${item.OrderNo}</td>
                                            <td class="py-4 px-2 opacity-60">${item.Description}</td>
                                            <td class="py-4 px-2 text-right">
                                                <select onchange="updateRowStatus('${item.UnitCode}', '${item.OrderNo}', this.value)" class="bg-black border border-white/10 rounded-lg p-1 text-[9px] font-black outline-none focus:border-sky-500">
                                                    <option ${item.Status === 'Open' ? 'selected' : ''}>Open</option>
                                                    <option ${item.Status === 'Progress' ? 'selected' : ''}>Progress</option>
                                                    <option ${item.Status === 'Closed' ? 'selected' : ''}>Closed</option>
                                                    <option ${item.Status === 'Highlighted' ? 'selected' : ''}>Highlighted</option>
                                                    <option ${item.Status === 'Top Urgent' ? 'selected' : ''}>Top Urgent</option>
                                                </select>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </details>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // MODAL & PASTE LOGIC
        function openModal(mode) {
            currentMode = mode;
            document.getElementById('op-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = mode === 'bulk' ? 'Bulk Industrial Paste' : 'Precision Single Entry';
            document.getElementById('single-container').classList.toggle('hidden', mode === 'bulk');
            document.getElementById('bulk-container').classList.toggle('hidden', mode === 'single');
            if(mode === 'bulk') focusBuffer();
        }

        function closeModal() {
            document.getElementById('op-modal').classList.add('hidden');
            bulkData = [];
            document.getElementById('bulk-table-body').innerHTML = `<tr><td colspan="4" class="text-center py-10 opacity-20 italic">No data buffered...</td></tr>`;
        }

        function focusBuffer() { document.getElementById('paste-buffer').focus(); }

        document.getElementById('paste-buffer').addEventListener('paste', (e) => {
            e.preventDefault();
            const raw = (e.clipboardData || window.clipboardData).getData('text');
            const rows = raw.split(/\r\n|\n/).filter(r => r.trim() !== "");
            
            bulkData = rows.map(r => {
                const cols = r.split('\t'); // Excel tabs
                return { ac: cols[0] || '', order: cols[1] || '', desc: cols[2] || '' };
            });
            renderBulkTable();
        });

        function renderBulkTable() {
            const body = document.getElementById('bulk-table-body');
            body.innerHTML = bulkData.map((d, i) => `
                <tr>
                    <td><input value="${d.ac}" oninput="bulkData[${i}].ac=this.value" class="bg-transparent border-b border-white/10 outline-none w-full"></td>
                    <td><input value="${d.order}" oninput="bulkData[${i}].order=this.value" class="bg-transparent border-b border-white/10 outline-none w-full font-mono text-sky-400"></td>
                    <td><input value="${d.desc}" oninput="bulkData[${i}].desc=this.value" class="bg-transparent border-b border-white/10 outline-none w-full opacity-60"></td>
                    <td><button onclick="bulkData.splice(${i},1);renderBulkTable()" class="text-red-500/30 hover:text-red-500"><i data-lucide="trash" size="12"></i></button></td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        async function submitData() {
            loader.style.display = 'flex';
            const unit = document.getElementById('UnitCode').value;
            
            try {
                if(currentMode === 'single') {
                    await API.post({
                        tab: 'OPERASIONAL', action: 'add',
                        UnitCode: unit,
                        ACReg: document.getElementById('s-ac').value,
                        OrderNo: document.getElementById('s-order').value,
                        Description: document.getElementById('s-desc').value,
                        Status: document.getElementById('s-status').value
                    });
                } else {
                    for(let d of bulkData) {
                        await API.post({
                            tab: 'OPERASIONAL', action: 'add',
                            UnitCode: unit, ACReg: d.ac, OrderNo: d.order, Description: d.desc, Status: 'Open'
                        });
                    }
                }
                Swal.fire({ icon: 'success', title: 'Data Committed', background: '#151921', color: '#fff', showConfirmButton: false, timer: 1500 });
                closeModal(); init();
            } catch(e) {
                Swal.fire('Error', 'Transaction failed.', 'error');
            } finally {
                loader.style.display = 'none';
            }
        }

        async function updateRowStatus(uCode, oNo, status) {
            loader.style.display = 'flex';
            await API.post({
                tab: 'OPERASIONAL', action: 'update', primaryId: uCode, // Match UnitCode first col
                OrderNo: oNo, Status: status
            });
            init();
        }

        init();
    </script>
</body>
</html>
