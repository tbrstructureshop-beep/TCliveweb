<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --panel: #151921; --border: rgba(255, 255, 255, 0.1); --accent: #0ea5e9; 
            --text-main: #94a3b8; --text-bold: #ffffff; --input-bg: rgba(255, 255, 255, 0.05);
        }
        .light {
            --bg: transparent; --panel: #ffffff; --border: #e2e8f0; --accent: #0284c7; 
            --text-main: #475569; --text-bold: #1e293b; --input-bg: #f8fafc;
        }
        body { background: transparent; color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; transition: all 0.3s ease; }
        .text-white, h1, h2, h3, h4, .text-white { color: var(--text-bold) !important; }
        
        /* Unit Tab Navigation */
        .unit-nav-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; }
        .unit-nav { display: flex; gap: 0.5rem; padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 1.25rem; border: 1px solid var(--border); overflow-x: auto; flex: 1; scroll-behavior: smooth; }
        .unit-nav::-webkit-scrollbar { display: none; }
        .unit-tab { padding: 0.75rem 1.5rem; border-radius: 1rem; font-size: 11px; font-weight: 800; white-space: nowrap; transition: 0.3s; color: var(--text-main); border: 1px solid transparent; }
        .unit-tab.active { background: var(--accent); color: white !important; box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4); }
        .nav-arrow { background: var(--panel); border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; display: flex; items-center; justify-content: center; color: var(--accent); cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .nav-arrow:hover { background: var(--accent); color: white; }

        .op-card { background-color: var(--panel) !important; border: 1px solid var(--border) !important; border-radius: 2.5rem; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 15px 35px -10px rgba(0,0,0,0.3); }
        
        /* Stat Badges */
        .stat-box { flex: 1; min-width: 80px; padding: 12px 8px; border-radius: 1.25rem; border: 1px solid var(--border); text-align: center; background: var(--input-bg); }
        .stat-val { display: block; font-size: 1.25rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
        .stat-lab { font-size: 8px; font-weight: 800; text-transform: uppercase; opacity: 0.5; }

        /* Table */
        .master-table { width: 100%; font-size: 11px; }
        .master-table th { padding: 12px; text-align: left; opacity: 0.4; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .master-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        .input-field, .st-select { width: 100%; background: var(--input-bg) !important; border: 1px solid var(--border) !important; color: var(--text-bold) !important; border-radius: 0.75rem; padding: 0.75rem; outline: none; font-size: 0.875rem; }
        
        select option { background-color: #ffffff !important; color: #1e293b !important; }
        :not(.light) select option { background-color: #151921 !important; color: #ffffff !important; }

        #local-loader { display: none; position: fixed; inset: 0; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="w-12 h-12 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin mb-3"></div>
        <span class="text-[10px] font-mono text-sky-500 font-bold uppercase tracking-widest">Syncing_Operations...</span>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
        <div>
            <h1 class="text-2xl font-black text-white uppercase tracking-tighter">Operational Detail</h1>
            <p class="text-[10px] opacity-40 font-mono uppercase tracking-widest">Task Queue Command Center</p>
        </div>
        <div class="flex gap-3">
            <button onclick="openModal('bulk')" class="bg-white/5 border border-white/10 hover:bg-white/10 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase transition-all">
                <i data-lucide="layout-grid" class="inline-block mr-1" size="14"></i> Bulk Table
            </button>
            <button onclick="openModal('single')" class="bg-sky-600 hover:bg-sky-500 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase transition-all shadow-lg shadow-sky-600/20">
                <i data-lucide="plus" class="inline-block mr-1" size="14"></i> Add Single
            </button>
        </div>
    </div>

    <!-- UNIT TAB SWITCHER -->
    <div class="unit-nav-wrapper">
        <button onclick="scrollNav(-150)" class="nav-arrow"><i data-lucide="chevron-left" size="16"></i></button>
        <div id="unit-tabs" class="unit-nav"></div>
        <button onclick="scrollNav(150)" class="nav-arrow"><i data-lucide="chevron-right" size="16"></i></button>
    </div>

    <div id="op-container"></div>

    <!-- MODAL -->
    <div id="op-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[3rem] w-full max-w-5xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest">Entry Engine</h3>
                <button onclick="closeModal()" class="p-2 text-white/30 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <div class="p-8 overflow-y-auto flex-1">
                <div class="mb-8"><label class="label-style">Unit Node</label><select id="UnitCode" class="input-field"></select></div>
                <div id="bulk-container" class="hidden">
                    <textarea id="paste-buffer" class="absolute opacity-0 pointer-events-none"></textarea>
                    <div onclick="focusBuffer()" class="border-2 border-dashed border-white/10 rounded-2xl p-10 mb-6 text-center cursor-pointer hover:border-sky-500/50 transition-all bg-white/[0.02]">
                        <p class="text-sm text-sky-400 font-bold">Paste from Excel (CTRL+V)</p>
                        <p class="text-[10px] opacity-30 mt-1 uppercase font-mono">AC REG | ORDER NO | DESCRIPTION</p>
                    </div>
                    <div class="border border-white/10 rounded-xl overflow-hidden">
                        <table class="master-table"><thead><tr><th>AC Reg</th><th>Order No</th><th>Description</th><th class="w-10"></th></tr></thead><tbody id="bulk-table-body"></tbody></table>
                    </div>
                </div>
                <div id="single-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <input type="hidden" id="primaryId">
                    <div><label class="label-style">AC Registration</label><input id="s-ac" class="input-field" placeholder="PK-GMF"></div>
                    <div><label class="label-style">Order Number</label><input id="s-order" class="input-field" placeholder="805XXXXXX"></div>
                    <div class="md:col-span-2"><label class="label-style">Work Description</label><input id="s-desc" class="input-field" placeholder="Task details..."></div>
                    <div><label class="label-style">Status</label><select id="s-status" class="input-field"><option>Top Urgent</option><option>Highlighted</option><option>Open</option><option>Progress</option><option>Closed</option></select></div>
                </div>
            </div>
            <div class="p-8 border-t border-white/5">
                <button id="submit-btn" onclick="submitData()" class="w-full bg-sky-600 py-4 rounded-2xl font-black text-white hover:bg-sky-500 uppercase tracking-widest text-[10px]">Execute Data Authorization</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const TAB_NAME = 'Operational Detail';
        let rawOpData = [], activeUnit = null, bulkData = [], currentMode = 'single';

        const PRIORITY = { 'Top Urgent': 0, 'Highlighted': 1, 'Open': 2, 'Progress': 3, 'Closed': 4 };

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, opRes] = await Promise.all([API.get('UNIT'), API.get(TAB_NAME)]);
                rawOpData = opRes.data || [];
                document.getElementById('UnitCode').innerHTML = unitRes.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                renderTabs(unitRes.data);
                if(!activeUnit && unitRes.data.length > 0) activeUnit = unitRes.data[0].UnitCode;
                renderCards();
            } catch (e) { Swal.fire('Error', 'Communication Failed', 'error'); } finally { loader.style.display = 'none'; }
        }

        function renderTabs(units) {
            document.getElementById('unit-tabs').innerHTML = units.map(u => `<button onclick="switchUnit('${u.UnitCode}')" class="unit-tab ${u.UnitCode === activeUnit ? 'active' : ''}">${u.UnitCode}</button>`).join('');
        }

        function scrollNav(amt) { document.getElementById('unit-tabs').scrollLeft += amt; }

        function switchUnit(uCode) {
            activeUnit = uCode;
            document.querySelectorAll('.unit-tab').forEach(t => t.classList.toggle('active', t.innerText === uCode));
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('op-container');
            const items = rawOpData.filter(i => i.UnitCode === activeUnit).sort((a, b) => PRIORITY[a.Status] - PRIORITY[b.Status]);
            
            if(!activeUnit) { container.innerHTML = `<div class="py-20 text-center opacity-20 font-mono uppercase tracking-[0.5em]">SELECT_NODE_TO_BEGIN</div>`; return; }

            const stats = { total: items.length, urgent: items.filter(i => i.Status === 'Top Urgent').length, high: items.filter(i => i.Status === 'Highlighted').length, open: items.filter(i => i.Status === 'Open').length, pro: items.filter(i => i.Status === 'Progress').length, done: items.filter(i => i.Status === 'Closed').length };

            container.innerHTML = `
                <div class="op-card animate-in fade-in duration-500">
                    <div class="flex flex-col xl:flex-row justify-between items-center gap-6 mb-8">
                        <div class="w-full xl:w-auto">
                            <span class="label-style">Active Production Node</span>
                            <h2 class="text-4xl font-black text-white tracking-tighter">${activeUnit}</h2>
                        </div>
                        <div class="flex flex-wrap gap-2 w-full xl:w-auto">
                            <div class="stat-box"><span class="stat-val">${stats.total}</span><span class="stat-lab">Total</span></div>
                            <div class="stat-box border-red-500/30"><span class="stat-val text-red-500">${stats.urgent}</span><span class="stat-lab">Urgent</span></div>
                            <div class="stat-box border-purple-500/20"><span class="stat-val text-purple-400">${stats.high}</span><span class="stat-lab">High</span></div>
                            <div class="stat-box border-slate-500/20"><span class="stat-val text-slate-400">${stats.open}</span><span class="stat-lab">Open</span></div>
                            <div class="stat-box border-emerald-500/20"><span class="stat-val text-emerald-400">${stats.done}</span><span class="stat-lab">Done</span></div>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="master-table">
                            <thead><tr><th>AC Reg</th><th>Order No</th><th>Description</th><th>Status</th><th class="text-right">Action</th></tr></thead>
                            <tbody>
                                ${items.map(item => {
                                    let borderStyle = item.Status === 'Top Urgent' ? "border-l-4 border-l-red-500 bg-red-500/5" : (item.Status === 'Highlighted' ? "border-l-4 border-l-purple-500 bg-purple-500/5" : "");
                                    return `
                                    <tr class="group/row hover:bg-white/5 ${borderStyle}">
                                        <td class="font-black text-white uppercase text-[10px]">${item.ACReg}</td>
                                        <td class="font-mono text-sky-400 text-[10px]">${item.OrderNo}</td>
                                        <td class="text-white/60 leading-tight">${item.Description}</td>
                                        <td>
                                            <select onchange="updateStatus('${activeUnit}', '${item.OrderNo}', this.value)" class="bg-transparent border-none text-[10px] font-bold outline-none cursor-pointer">
                                                ${['Top Urgent', 'Highlighted', 'Open', 'Progress', 'Closed'].map(s => `<option ${item.Status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                            </select>
                                        </td>
                                        <td class="text-right">
                                            <div class="flex gap-2 justify-end opacity-0 group-hover/row:opacity-100 transition">
                                                <button onclick="editOrder('${item.OrderNo}')" class="text-sky-500/50 hover:text-sky-400"><i data-lucide="edit-3" size="14"></i></button>
                                                <button onclick="deleteOrder('${item.OrderNo}')" class="text-red-500/30 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                                            </div>
                                        </td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        // --- CORE LOGIC ---
        function openModal(mode) {
            currentMode = mode; document.getElementById('op-modal').classList.remove('hidden');
            const title = document.getElementById('modal-title');
            const submitBtn = document.getElementById('submit-btn');
            
            if(mode === 'bulk') { title.innerText = 'Bulk Grid Processor'; submitBtn.innerText = 'Execute Commit'; document.getElementById('single-container').classList.add('hidden'); document.getElementById('bulk-container').classList.remove('hidden'); focusBuffer(); }
            else if(mode === 'edit') { title.innerText = 'Update Node Entry'; submitBtn.innerText = 'Save Changes'; document.getElementById('single-container').classList.remove('hidden'); document.getElementById('bulk-container').classList.add('hidden'); document.getElementById('s-order').disabled = true; }
            else { title.innerText = 'Single Entry'; submitBtn.innerText = 'Execute Commit'; document.getElementById('single-container').classList.remove('hidden'); document.getElementById('bulk-container').classList.add('hidden'); document.getElementById('s-order').disabled = false; }
        }

        function editOrder(orderNo) {
            const item = rawOpData.find(d => d.OrderNo === orderNo);
            if(!item) return; openModal('edit');
            document.getElementById('UnitCode').value = item.UnitCode;
            document.getElementById('primaryId').value = item.OrderNo;
            document.getElementById('s-ac').value = item.ACReg;
            document.getElementById('s-order').value = item.OrderNo;
            document.getElementById('s-desc').value = item.Description;
            document.getElementById('s-status').value = item.Status;
        }

        function closeModal() { document.getElementById('op-modal').classList.add('hidden'); bulkData = []; document.getElementById('primaryId').value = ''; renderBulkTable(); }
        function focusBuffer() { document.getElementById('paste-buffer').focus(); }

        document.getElementById('paste-buffer').addEventListener('paste', (e) => {
            e.preventDefault();
            const raw = (e.clipboardData || window.clipboardData).getData('text');
            const rows = raw.split(/\r\n|\n/).filter(r => r.trim() !== "");
            bulkData = rows.map(r => { const cols = r.split('\t'); return { ac: cols[0] || '', order: cols[1] || '', desc: cols[2] || '' }; });
            renderBulkTable();
        });

        function renderBulkTable() {
            document.getElementById('bulk-table-body').innerHTML = bulkData.length ? bulkData.map((d, i) => `<tr><td><input value="${d.ac}" oninput="bulkData[${i}].ac=this.value" class="bg-transparent border-none outline-none w-full"></td><td><input value="${d.order}" oninput="bulkData[${i}].order=this.value" class="bg-transparent border-none outline-none w-full text-sky-400"></td><td><input value="${d.desc}" oninput="bulkData[${i}].desc=this.value" class="bg-transparent border-none outline-none w-full opacity-60"></td><td><button onclick="bulkData.splice(${i},1);renderBulkTable()" class="text-red-500/20 hover:text-red-500"><i data-lucide="x" size="14"></i></button></td></tr>`).join('') : '<tr><td colspan="4" class="text-center py-10 opacity-20 italic">Awaiting data...</td></tr>';
            lucide.createIcons();
        }

        async function submitData() {
            loader.style.display = 'flex';
            const unit = document.getElementById('UnitCode').value;
            const action = (currentMode === 'edit' ? 'update' : 'add');
            try {
                if(currentMode === 'single' || currentMode === 'edit') {
                    await API.post({ tab: TAB_NAME, action: action, UnitCode: unit, ACReg: document.getElementById('s-ac').value, OrderNo: document.getElementById('s-order').value, Description: document.getElementById('s-desc').value, Status: document.getElementById('s-status').value, primaryId: document.getElementById('s-order').value });
                } else {
                    for(let d of bulkData) await API.post({ tab: TAB_NAME, action: 'add', UnitCode: unit, ACReg: d.ac, OrderNo: d.order, Description: d.desc, Status: 'Open', primaryId: d.order });
                }
                closeModal(); await init();
                Swal.fire({ icon: 'success', title: 'Data Committed', background: '#151921', color: '#fff', timer: 1500, showConfirmButton: false });
            } catch(e) { loader.style.display = 'none'; Swal.fire('Error', 'Transaction Failed', 'error'); }
        }

        async function updateStatus(uCode, oNo, status) {
            loader.style.display = 'flex';
            try { await API.post({ tab: TAB_NAME, action: 'update', primaryId: oNo, Status: status }); await init(); } catch(e) { loader.style.display = 'none'; }
        }

        async function deleteOrder(orderNo) {
            const res = await Swal.fire({ title: 'Purge Entry?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', background: '#151921', color: '#fff' });
            if(res.isConfirmed) { loader.style.display = 'flex'; try { await API.post({ tab: TAB_NAME, action: 'delete', primaryId: orderNo }); await init(); } catch(e) { loader.style.display = 'none'; } }
        }

        init();
    </script>
</body>
</html>
