<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../api.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --panel: #151921; 
            --border: rgba(255, 255, 255, 0.1); 
            --accent: #0ea5e9; 
        }
        body { background: transparent; color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Industrial Card */
        .industrial-card {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        .industrial-card:hover { border-color: rgba(14, 165, 233, 0.3); }

        .shift-item {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.25rem;
            padding: 1.25rem;
            position: relative;
            margin-bottom: 1rem;
        }

        /* Standard CSS for Input Fields */
        .input-field {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem;
            outline: none;
            color: white;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            border-color: var(--accent);
            background-color: rgba(255, 255, 255, 0.08);
        }
        
        .label-style {
            text-transform: uppercase;
            font-size: 10px;
            font-weight: 700;
            opacity: 0.4;
            margin-bottom: 0.25rem;
            display: block;
            letter-spacing: 0.1em;
        }
        
        /* Modal Container Style */
        .modal-container {
            background-color: #151921;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 36rem; 
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        #local-loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(11, 14, 20, 0.9);
            backdrop-filter: blur(8px);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #262c36; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-10 h-10 border-4 border-sky-500/20 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.3em] text-sky-500 animate-pulse text-center">Syncing_Shift_Matrix...</span>
        </div>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tight uppercase">Shift Configuration</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Operational Work-Cycles & Resource Logic</p>
        </div>
        <button onclick="openModal('add')" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 shadow-lg shadow-sky-600/20 transition-all active:scale-95">
            <i data-lucide="plus-circle" size="18"></i> CONFIGURE SHIFT
        </button>
    </div>

    <div id="shift-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>

    <!-- MODAL -->
    <div id="shift-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center z-[110] p-4">
        <div class="modal-container">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <div>
                    <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest">Shift Data Entry</h3>
                    <p class="text-[10px] opacity-40 uppercase tracking-tighter">Set cycle parameters & leadership</p>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <form id="shift-form" class="p-8 grid grid-cols-1 sm:grid-cols-2 gap-5 overflow-y-auto">
                <input type="hidden" id="primaryId" name="primaryId">
                
                <div class="sm:col-span-2">
                    <label class="label-style">Target Operational Unit</label>
                    <select id="UnitCode" name="UnitCode" required class="input-field"></select>
                </div>

                <div>
                    <label class="label-style">Shift Category Name</label>
                    <input id="ShiftCategory" name="ShiftCategory" required placeholder="e.g. Night Shift" class="input-field">
                </div>

                <div>
                    <label class="label-style">Total Manpower (Pax)</label>
                    <input type="number" id="TotalManpower" name="TotalManpower" required placeholder="0" class="input-field">
                </div>

                <div>
                    <label class="label-style">Time Start (24H)</label>
                    <input type="time" id="TimeStart" name="TimeStart" required class="input-field">
                </div>

                <div>
                    <label class="label-style">Time End (24H)</label>
                    <input type="time" id="TimeEnd" name="TimeEnd" required class="input-field">
                </div>

                <div>
                    <label class="label-style">Effective From</label>
                    <input type="date" id="EffectiveFrom" name="EffectiveFrom" required class="input-field">
                </div>

                <div>
                    <label class="label-style">Effective Until</label>
                    <input type="date" id="EffectiveUntil" name="EffectiveUntil" required class="input-field">
                </div>

                <div class="sm:col-span-2">
                    <label class="label-style">Shift Leader Name</label>
                    <div class="relative">
                        <i data-lucide="shield-check" size="16" class="absolute left-3 top-3.5 opacity-30 text-white"></i>
                        <input id="LeaderName" name="LeaderName" required placeholder="Full Name" class="input-field pl-10">
                    </div>
                </div>

                <div class="sm:col-span-2 flex gap-3 pt-4 border-t border-white/5 mt-2">
                    <button type="submit" class="flex-1 bg-sky-600 py-4 rounded-2xl font-bold text-white hover:bg-sky-500 transition-all shadow-lg shadow-sky-600/10 uppercase tracking-widest text-xs">Commit Cycle</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-white/5 py-4 rounded-2xl font-bold text-white/50 hover:bg-white/10 transition-all uppercase tracking-widest text-xs">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        let currentUnits = [];
        let rawShifts = [];
        let currentAction = 'add';

        function toTitleCase(str) {
            if (!str) return '';
            return str.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        const formatDate = (dateStr) => {
            if (!dateStr) return "-";
            const options = { day: '2-digit', month: 'short', year: 'numeric' };
            return new Date(dateStr).toLocaleDateString('en-GB', options);
        };

        async function init() {
            loader.style.display = 'flex';
            try {
                const [unitRes, shiftRes] = await Promise.all([
                    API.get('UNIT'),
                    API.get('SHIFTS')
                ]);
                
                currentUnits = unitRes.data || [];
                rawShifts = shiftRes.data || [];

                const unitSelect = document.getElementById('UnitCode');
                unitSelect.innerHTML = '<option value="" disabled selected>Select Active Unit...</option>' + 
                    currentUnits.map(u => `<option value="${u.UnitCode}">${u.UnitCode} - ${toTitleCase(u.UnitDesc)}</option>`).join('');

                renderGroupedShifts(rawShifts);
            } catch (e) {
                Swal.fire({ title: 'Sync Error', text: e.message, icon: 'error', background: '#151921', color: '#fff' });
            } finally {
                loader.style.display = 'none';
            }
        }

        // --- FIXED GROUPING LOGIC ---
        function renderGroupedShifts(shifts) {
            const grid = document.getElementById('shift-grid');
            const grouped = shifts.reduce((acc, s) => {
                if (!acc[s.UnitCode]) acc[s.UnitCode] = [];
                acc[s.UnitCode].push(s);
                return acc;
            }, {});

            if (Object.keys(grouped).length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center opacity-30 uppercase tracking-widest text-sm font-mono">NO_SHIFT_DATA_BUFFERED</div>`;
                return;
            }

            grid.innerHTML = Object.keys(grouped).map(unitCode => {
                const unitShifts = grouped[unitCode];
                return `
                    <div class="industrial-card">
                        <div class="flex justify-between items-center mb-6">
                            <div class="flex items-center gap-3">
                                <div class="bg-sky-500/20 p-2 rounded-xl text-sky-400"><i data-lucide="factory" size="18"></i></div>
                                <div>
                                    <h2 class="text-white font-black text-lg leading-none uppercase">${unitCode}</h2>
                                    <p class="text-[9px] opacity-40 uppercase tracking-widest mt-1">Operational Nodes</p>
                                </div>
                            </div>
                            <div class="bg-white/5 px-3 py-1 rounded-full text-[10px] font-mono text-sky-500 border border-white/5">${unitShifts.length} CYCLES</div>
                        </div>

                        <div class="space-y-4">
                            ${unitShifts.map(s => `
                                <div class="shift-item group">
                                    <div class="flex justify-between items-center mb-3">
                                        <span class="text-xs font-bold text-white/80">${toTitleCase(s.ShiftCategory)}</span>
                                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-all">
                                            <button onclick="editData('${s.UnitCode}', '${s.ShiftCategory}')" class="text-sky-500/40 hover:text-sky-400 transition"><i data-lucide="edit-3" size="14"></i></button>
                                            <button onclick="deleteData('${s.UnitCode}', '${s.ShiftCategory}')" class="text-red-500/40 hover:text-red-400 transition"><i data-lucide="trash-2" size="14"></i></button>
                                        </div>
                                    </div>
                                    
                                    <div class="flex items-center gap-4 text-white mb-3">
                                        <div class="flex flex-col">
                                            <span class="text-[9px] opacity-40 uppercase">Time Block</span>
                                            <span class="text-sm font-mono font-bold tracking-tighter">${s.TimeStart} - ${s.TimeEnd}</span>
                                        </div>
                                        <div class="w-px h-6 bg-white/10"></div>
                                        <div class="flex flex-col">
                                            <span class="text-[9px] opacity-40 uppercase">Personnel</span>
                                            <span class="text-sm font-bold tracking-tighter">${s.TotalManpower} PAX</span>
                                        </div>
                                    </div>

                                    <div class="flex justify-between items-end border-t border-white/5 pt-3 mt-1">
                                        <div>
                                            <span class="text-[9px] opacity-40 uppercase block mb-0.5">Assigned Leader</span>
                                            <span class="text-[11px] text-sky-400 font-semibold">${toTitleCase(s.LeaderName)}</span>
                                        </div>
                                        <div class="text-right">
                                            <span class="text-[8px] opacity-30 block">EFFECTIVE</span>
                                            <span class="text-[9px] opacity-60 font-mono">${formatDate(s.EffectiveFrom)} - ${formatDate(s.EffectiveUntil)}</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function openModal(action) {
            currentAction = action;
            document.getElementById('shift-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = action === 'add' ? 'New Shift Entry' : 'Update Shift Config';
            document.getElementById('UnitCode').disabled = (action !== 'add');
        }

        function closeModal() {
            document.getElementById('shift-modal').classList.add('hidden');
            document.getElementById('shift-form').reset();
        }

        function editData(unitCode, shiftCat) {
            const data = rawShifts.find(s => s.UnitCode === unitCode && s.ShiftCategory === shiftCat);
            if (!data) return;

            openModal('update');
            document.getElementById('primaryId').value = data.UnitCode;
            document.getElementById('UnitCode').value = data.UnitCode;
            document.getElementById('ShiftCategory').value = data.ShiftCategory;
            document.getElementById('TotalManpower').value = data.TotalManpower;
            document.getElementById('TimeStart').value = data.TimeStart;
            document.getElementById('TimeEnd').value = data.TimeEnd;
            document.getElementById('EffectiveFrom').value = data.EffectiveFrom;
            document.getElementById('EffectiveUntil').value = data.EffectiveUntil;
            document.getElementById('LeaderName').value = data.LeaderName;
        }

        document.getElementById('shift-form').onsubmit = async (e) => {
            e.preventDefault();
            loader.style.display = 'flex';
            
            const formData = new FormData(e.target);
            const payload = {
                tab: 'SHIFTS',
                action: currentAction,
                primaryId: document.getElementById('primaryId').value || formData.get('UnitCode')
            };
            
            formData.forEach((value, key) => {
                if(key !== 'primaryId') payload[key] = value;
            });

            try {
                const res = await API.post(payload);
                if (res.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'Data Committed', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: '#151921', color: '#fff' });
                    closeModal();
                    init();
                } else {
                    throw new Error(res.message);
                }
            } catch (err) {
                Swal.fire({ title: 'Error', text: err.message, icon: 'error', background: '#151921', color: '#fff' });
                loader.style.display = 'none';
            }
        };

        async function deleteData(unitId, shiftCat) {
            const confirm = await Swal.fire({
                title: 'Delete Shift?',
                text: `Removing "${shiftCat}" from unit ${unitId}`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                background: '#151921',
                color: '#fff'
            });

            if (confirm.isConfirmed) {
                loader.style.display = 'flex';
                try {
                    // Berdasarkan p.primaryId (UnitCode)
                    await API.post({ tab: 'SHIFTS', action: 'delete', primaryId: unitId });
                    init();
                } catch (e) {
                    Swal.fire({ title: 'Error', text: e.message, icon: 'error', background: '#151921', color: '#fff' });
                    loader.style.display = 'none';
                }
            }
        }

        init();
    </script>
</body>
</html>
