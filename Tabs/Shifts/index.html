<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        :root { --bg: #0b0e14; --panel: #151921; --border: #262c36; --accent: #0ea5e9; }
        .light { --bg: #f8fafc; --panel: #ffffff; --border: #e2e8f0; --accent: #0284c7; }
        body { background: transparent; color: #94a3b8; font-family: 'Inter', sans-serif; transition: 0.3s; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Industrial Card Styling */
        .unit-card { @apply bg-white/5 border border-white/10 rounded-3xl overflow-hidden hover:border-sky-500/30 transition-all duration-300 shadow-xl; }
        .shift-row { @apply border-t border-white/5 p-4 flex flex-wrap justify-between items-center hover:bg-white/[0.02] transition-colors; }
        
        /* Modal & Form */
        .modal-bg { background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(8px); }
        .input-group { @apply space-y-1; }
        input, select { @apply w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-sky-500 text-sm text-white transition-all; }
        label { @apply text-[10px] uppercase font-bold opacity-40 ml-1 tracking-widest; }

        /* Local Loader */
        #local-loader { @apply absolute inset-0 z-50 flex items-center justify-center bg-[#0b0e14]/80 transition-opacity duration-300; }
        .spinner { @apply w-8 h-8 border-4 border-sky-500/20 border-t-sky-500 rounded-full animate-spin; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- BLOCK LOADER -->
    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="spinner"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.2em] text-sky-500 animate-pulse">Syncing_Nodes</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tighter uppercase">Shift Configuration</h1>
            <p class="text-[10px] font-mono text-sky-500">TAB_STATUS: READY // GROUP_BY_UNIT: ENABLED</p>
        </div>
        <button onclick="openModal()" class="bg-sky-500 hover:bg-sky-400 text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-3 text-sm shadow-lg shadow-sky-500/20 transition-all active:scale-95">
            <i data-lucide="plus-circle" size="20"></i> ADD NEW SHIFT
        </button>
    </div>

    <!-- GRID CONTAINER -->
    <div id="shift-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-6">
        <!-- Rendered Unit Cards will appear here -->
    </div>

    <!-- MODAL FORM -->
    <div id="modal" class="fixed inset-0 z-[100] modal-bg hidden flex items-center justify-center p-4">
        <div class="bg-[#151921] border border-white/10 w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="p-8 border-b border-white/5 flex justify-between items-center">
                <h3 class="text-xl font-bold text-white uppercase tracking-widest">Shift Entry</h3>
                <button onclick="closeModal()" class="text-white/30 hover:text-white transition-colors"><i data-lucide="x"></i></button>
            </div>
            
            <form id="shift-form" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="hidden" id="primaryId">
                
                <div class="input-group md:col-span-2">
                    <label>Assigned Unit</label>
                    <select id="f-UnitCode" required class="cursor-pointer"></select>
                </div>

                <div class="input-group">
                    <label>Shift Name / Category</label>
                    <input id="f-ShiftCategory" placeholder="e.g. Day Shift, Night A" required>
                </div>

                <div class="input-group">
                    <label>Manpower Count</label>
                    <input type="number" id="f-TotalManpower" placeholder="0" required>
                </div>

                <div class="input-group">
                    <label>Time Start (24H)</label>
                    <input type="time" id="f-TimeStart" required>
                </div>

                <div class="input-group">
                    <label>Time End (24H)</label>
                    <input type="time" id="f-TimeEnd" required>
                </div>

                <div class="input-group">
                    <label>Effective From</label>
                    <input type="date" id="f-EffectiveFrom" required>
                </div>

                <div class="input-group">
                    <label>Effective Until</label>
                    <input type="date" id="f-EffectiveUntil" required>
                </div>

                <div class="input-group md:col-span-2">
                    <label>Leader Name</label>
                    <input id="f-LeaderName" placeholder="Enter Full Name" required>
                </div>

                <div class="md:col-span-2 flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-sky-500 py-4 rounded-2xl font-bold text-white hover:bg-sky-400 transition-all">PROCESS RECORD</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-white/5 py-4 rounded-2xl font-bold text-white/50 hover:bg-white/10 transition-all">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        let units = [];
        let shifts = [];

        // Formatting Helpers
        const displayTime = (t) => t || '--:--';
        const displayDate = (d) => {
            if(!d) return 'N/A';
            const date = new Date(d);
            return date.toLocaleDateString('en-GB', { day: '2d', month: 'short', year: 'numeric' });
        };

        async function init() {
            loader.style.opacity = "1";
            loader.style.display = "flex";
            
            try {
                // Load Units for the dropdown
                const resUnits = await API.get('UNIT');
                units = resUnits.data || [];
                const select = document.getElementById('f-UnitCode');
                select.innerHTML = '<option value="" disabled selected>Select Unit...</option>' + 
                    units.map(u => `<option value="${u.UnitCode}">${u.UnitCode} - ${u.UnitDesc}</option>`).join('');

                // Load Shift Records
                const resShifts = await API.get('SHIFTS');
                shifts = resShifts.data || [];
                renderShifts();
            } catch (e) {
                console.error(e);
                Swal.fire('Error', 'Failed to fetch node data', 'error');
            } finally {
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 300);
            }
        }

        function renderShifts() {
            const grid = document.getElementById('shift-grid');
            
            // GROUPING LOGIC: Merge shifts by UnitCode
            const grouped = shifts.reduce((acc, shift) => {
                if (!acc[shift.UnitCode]) acc[shift.UnitCode] = [];
                acc[shift.UnitCode].push(shift);
                return acc;
            }, {});

            if (Object.keys(grouped).length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center opacity-30 font-mono italic">NO_RECORDS_FOUND</div>`;
                return;
            }

            grid.innerHTML = Object.entries(grouped).map(([unitCode, unitShifts]) => {
                const unitInfo = units.find(u => u.UnitCode === unitCode) || { UnitDesc: 'External Unit' };
                
                return `
                    <div class="unit-card">
                        <div class="p-6 flex justify-between items-center">
                            <div>
                                <span class="text-[10px] font-mono text-sky-500 uppercase tracking-widest">Unit_Identifier</span>
                                <h3 class="text-xl font-bold text-white uppercase">${unitCode}</h3>
                                <p class="text-[10px] opacity-40">${unitInfo.UnitDesc}</p>
                            </div>
                            <div class="bg-sky-500/10 h-10 w-10 rounded-xl flex items-center justify-center">
                                <i data-lucide="component" class="text-sky-500 w-5 h-5"></i>
                            </div>
                        </div>
                        
                        <div class="space-y-0">
                            ${unitShifts.map((s, idx) => `
                                <div class="shift-row group">
                                    <div class="flex items-center gap-4">
                                        <div class="h-8 w-8 rounded-lg bg-white/5 flex items-center justify-center font-mono text-[10px] border border-white/5">${idx + 1}</div>
                                        <div>
                                            <p class="text-sm font-bold text-white">${s.ShiftCategory}</p>
                                            <p class="text-[10px] font-mono text-sky-500">${displayTime(s.TimeStart)} - ${displayTime(s.TimeEnd)}</p>
                                        </div>
                                    </div>
                                    
                                    <div class="hidden sm:block text-right">
                                        <p class="text-[10px] uppercase font-bold opacity-30 leading-none mb-1">Shift Leader</p>
                                        <p class="text-xs font-semibold text-white/80">${s.LeaderName}</p>
                                    </div>

                                    <div class="hidden md:block text-right">
                                        <p class="text-[10px] uppercase font-bold opacity-30 leading-none mb-1">Effective Period</p>
                                        <p class="text-[10px] font-mono text-white/50">${displayDate(s.EffectiveFrom)} — ${displayDate(s.EffectiveUntil)}</p>
                                    </div>

                                    <div class="flex gap-2">
                                        <button onclick="editShift('${s.UnitCode}', '${s.ShiftCategory}')" class="p-2 rounded-lg hover:bg-sky-500/20 text-sky-400 transition-all">
                                            <i data-lucide="edit-3" size="14"></i>
                                        </button>
                                        <button onclick="deleteShift('${s.UnitCode}', '${s.ShiftCategory}')" class="p-2 rounded-lg hover:bg-red-500/20 text-red-500 transition-all">
                                            <i data-lucide="trash-2" size="14"></i>
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        // Form Actions
        async function deleteShift(unitCode, category) {
            const confirm = await Swal.fire({
                title: 'Terminate Record?',
                text: `Removing ${category} from ${unitCode}`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                background: '#151921',
                color: '#fff'
            });

            if(confirm.isConfirmed) {
                loader.style.display = "flex";
                // Using UnitCode as primaryId (matches GAS logic)
                // Note: For actual specific deletion in rows, we match UnitCode.
                const res = await API.post({ tab: 'SHIFTS', action: 'delete', primaryId: unitCode });
                if(res.status === 'success') {
                    Swal.fire('Deleted', 'Node synchronization complete', 'success');
                    init();
                }
            }
        }

        document.getElementById('shift-form').onsubmit = async (e) => {
            e.preventDefault();
            loader.style.display = "flex";
            
            const payload = {
                tab: 'SHIFTS',
                action: document.getElementById('primaryId').value ? 'update' : 'add',
                primaryId: document.getElementById('primaryId').value || document.getElementById('f-UnitCode').value,
                UnitCode: document.getElementById('f-UnitCode').value,
                ShiftCategory: document.getElementById('f-ShiftCategory').value,
                TimeStart: document.getElementById('f-TimeStart').value,
                TimeEnd: document.getElementById('f-TimeEnd').value,
                EffectiveFrom: document.getElementById('f-EffectiveFrom').value,
                EffectiveUntil: document.getElementById('f-EffectiveUntil').value,
                LeaderName: document.getElementById('f-LeaderName').value,
                TotalManpower: document.getElementById('f-TotalManpower').value
            };

            const res = await API.post(payload);
            if(res.status === 'success') {
                closeModal();
                Swal.fire({ icon: 'success', title: 'Committed', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
                init();
            } else {
                Swal.fire('Failed', res.message, 'error');
                loader.style.display = "none";
            }
        };

        function editShift(unitCode, category) {
            const data = shifts.find(s => s.UnitCode === unitCode && s.ShiftCategory === category);
            if(!data) return;

            document.getElementById('primaryId').value = unitCode;
            document.getElementById('f-UnitCode').value = data.UnitCode;
            document.getElementById('f-UnitCode').disabled = true;
            document.getElementById('f-ShiftCategory').value = data.ShiftCategory;
            document.getElementById('f-TotalManpower').value = data.TotalManpower;
            document.getElementById('f-TimeStart').value = data.TimeStart;
            document.getElementById('f-TimeEnd').value = data.TimeEnd;
            document.getElementById('f-EffectiveFrom').value = data.EffectiveFrom;
            document.getElementById('f-EffectiveUntil').value = data.EffectiveUntil;
            document.getElementById('f-LeaderName').value = data.LeaderName;
            
            document.getElementById('modal').classList.remove('hidden');
        }

        function openModal() {
            document.getElementById('shift-form').reset();
            document.getElementById('primaryId').value = "";
            document.getElementById('f-UnitCode').disabled = false;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        init();
    </script>
</body>
</html>
