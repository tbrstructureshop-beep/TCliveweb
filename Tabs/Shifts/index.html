<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shifts Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../api.js"></script>
    <style>
        :root {
            --bg: #0b0e14; --panel: #151921; --border: #262c36; --accent: #0ea5e9;
        }
        body { background: transparent; color: #94a3b8; font-family: 'Inter', sans-serif; }
        .industrial-card { 
            background: rgba(21, 25, 33, 0.6);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .shift-row { border-bottom: 1px solid rgba(255,255,255,0.03); }
        .shift-row:last-child { border-bottom: none; }
        
        input, select { 
            @apply w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-sky-500 transition-all text-white text-sm;
        }
        label { @apply text-[10px] uppercase font-bold opacity-40 tracking-widest mb-1 block; }

        /* Local Loader */
        #local-loader {
            display: none; background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(4px); z-index: 100;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- LOCAL BLOCKING LOADER -->
    <div id="local-loader" class="fixed inset-0 flex items-center justify-center">
        <div class="flex flex-col items-center gap-3">
            <div class="w-10 h-10 border-4 border-sky-500/20 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.3em] text-sky-500">Syncing_Data</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
        <div>
            <h1 class="text-2xl font-bold text-white uppercase tracking-tighter">Shift Schedules</h1>
            <p class="text-xs opacity-50 font-mono">NODE_02 // MANPOWER_LOGISTICS</p>
        </div>
        <button onclick="openModal('add')" class="bg-sky-500 hover:bg-sky-400 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-sky-500/20 transition-all active:scale-95">
            <i data-lucide="plus" size="16"></i> CREATE NEW SHIFT
        </button>
    </div>

    <!-- DATA GRID (Merged by Unit) -->
    <div id="shift-grid" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
        <!-- Rendered via JS -->
    </div>

    <!-- MODAL FORM -->
    <div id="shift-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden items-center justify-center z-[110] p-4">
        <div class="industrial-card w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl border-sky-500/20">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h3 id="modal-title" class="text-lg font-bold text-white uppercase tracking-widest">New Shift Entry</h3>
                <button onclick="closeModal()" class="text-white/30 hover:text-white transition"><i data-lucide="x"></i></button>
            </div>
            
            <form id="shift-form" class="p-8 space-y-4">
                <input type="hidden" id="primaryId">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label>Target Unit</label>
                        <select id="UnitCode" name="UnitCode" required></select>
                    </div>
                    <div>
                        <label>Shift Name (e.g. Night)</label>
                        <input type="text" id="ShiftCategory" name="ShiftCategory" placeholder="SHIFT NAME" required>
                    </div>
                    <div>
                        <label>Total Manpower</label>
                        <input type="number" id="TotalManpower" name="TotalManpower" placeholder="0" required>
                    </div>
                    <div>
                        <label>Time Start</label>
                        <input type="time" id="TimeStart" name="TimeStart" required>
                    </div>
                    <div>
                        <label>Time End</label>
                        <input type="time" id="TimeEnd" name="TimeEnd" required>
                    </div>
                    <div>
                        <label>Effective From</label>
                        <input type="date" id="EffectiveFrom" name="EffectiveFrom" required>
                    </div>
                    <div>
                        <label>Effective Until</label>
                        <input type="date" id="EffectiveUntil" name="EffectiveUntil" required>
                    </div>
                    <div class="col-span-2">
                        <label>Shift Leader Name</label>
                        <input type="text" id="LeaderName" name="LeaderName" placeholder="ENTER FULL NAME" required>
                    </div>
                </div>

                <div class="flex gap-3 pt-6">
                    <button type="submit" class="flex-1 bg-sky-500 hover:bg-sky-400 py-4 rounded-2xl font-bold text-white text-xs shadow-lg shadow-sky-500/20 transition-all">
                        CONFIRM DATA
                    </button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-white/5 py-4 rounded-2xl font-bold text-xs hover:bg-white/10 transition-all">
                        CANCEL
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentAction = 'add';
        let units = [];

        const showLoader = (show) => document.getElementById('local-loader').style.display = show ? 'flex' : 'none';

        // Helper: Format Date
        const fmtDate = (d) => {
            if(!d) return '-';
            const date = new Date(d);
            return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        };

        async function init() {
            showLoader(true);
            try {
                // Load Units for Dropdown
                const unitRes = await API.get('UNIT');
                units = unitRes.data;
                const unitSelect = document.getElementById('UnitCode');
                unitSelect.innerHTML = units.map(u => `<option value="${u.UnitCode}">${u.UnitCode} - ${u.UnitDesc}</option>`).join('');

                await loadShifts();
            } catch (e) {
                Swal.fire('Error', 'Failed to initialize session', 'error');
            } finally {
                showLoader(false);
                lucide.createIcons();
            }
        }

        async function loadShifts() {
            const res = await API.get('SHIFTS');
            const grid = document.getElementById('shift-grid');
            
            // Merging Logic by UnitCode
            const grouped = res.data.reduce((acc, shift) => {
                if (!acc[shift.UnitCode]) acc[shift.UnitCode] = [];
                acc[shift.UnitCode].push(shift);
                return acc;
            }, {});

            grid.innerHTML = Object.keys(grouped).map(unitCode => {
                const unitShifts = grouped[unitCode];
                const unitInfo = units.find(u => u.UnitCode === unitCode) || { UnitDesc: 'Unknown Unit' };

                return `
                <div class="industrial-card rounded-3xl overflow-hidden flex flex-col">
                    <div class="p-6 bg-white/5 border-b border-white/5 flex justify-between items-center">
                        <div>
                            <h3 class="text-white font-bold text-lg leading-none mb-1">${unitCode}</h3>
                            <p class="text-[10px] opacity-40 uppercase font-bold tracking-widest">${unitInfo.UnitDesc}</p>
                        </div>
                        <div class="h-10 w-10 rounded-full bg-sky-500/10 flex items-center justify-center border border-sky-500/20">
                            <i data-lucide="layers" class="w-4 h-4 text-sky-400"></i>
                        </div>
                    </div>
                    
                    <div class="flex-1">
                        ${unitShifts.map(s => `
                        <div class="shift-row p-6 group hover:bg-sky-500/[0.02] tr
