<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .industrial-card { @apply bg-white/5 border border-white/10 rounded-2xl p-5 hover:border-sky-500/50 transition-all; }
    </style>
</head>
<body class="p-6 bg-transparent text-slate-300">
    
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
        <div><h1 class="text-2xl font-bold text-white">Units</h1><p class="text-xs opacity-50">Manage your production units</p></div>
        <button onclick="openModal('add')" class="bg-sky-600 hover:bg-sky-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-lg shadow-sky-600/20">
            <i data-lucide="plus" size="18"></i> ADD NEW UNIT
        </button>
    </div>

    <div id="data-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
        <!-- Cards loaded here -->
    </div>

    <!-- MODAL FORM -->
    <div id="modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-gray-900 border border-white/10 rounded-3xl w-full max-w-md shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold">New Unit</h3>
                <button onclick="closeModal()" class="opacity-50 hover:opacity-100"><i data-lucide="x"></i></button>
            </div>
            <form id="main-form" class="p-6 space-y-4">
                <input type="hidden" id="primaryId">
                <div><label class="text-[10px] uppercase font-bold opacity-50 ml-1">Unit Code</label>
                <input id="UnitCode" required class="w-full bg-white/5 border border-white/10 p-3 rounded-xl focus:border-sky-500 outline-none"></div>
                <div><label class="text-[10px] uppercase font-bold opacity-50 ml-1">Description</label>
                <input id="UnitDesc" required class="w-full bg-white/5 border border-white/10 p-3 rounded-xl focus:border-sky-500 outline-none"></div>
                <div><label class="text-[10px] uppercase font-bold opacity-50 ml-1">Leader Name</label>
                <input id="UnitLeader" required class="w-full bg-white/5 border border-white/10 p-3 rounded-xl focus:border-sky-500 outline-none"></div>
                
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 bg-sky-600 py-3 rounded-xl font-bold hover:bg-sky-500 transition">SAVE DATA</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-white/5 py-3 rounded-xl font-bold">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentAction = 'add';
        
        async function loadData() {
            const res = await API.get('UNIT');
            const grid = document.getElementById('data-grid');
            grid.innerHTML = res.data.map(item => `
                <div class="industrial-card group">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-mono text-sky-400 bg-sky-400/10 px-3 py-1 rounded-full">${item.UnitCode}</span>
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-all">
                            <button onclick="openModal('update', '${item.UnitCode}')" class="p-2 hover:bg-white/10 rounded-lg text-sky-400"><i data-lucide="edit-3" size="16"></i></button>
                            <button onclick="deleteData('${item.UnitCode}')" class="p-2 hover:bg-red-500/10 rounded-lg text-red-500"><i data-lucide="trash-2" size="16"></i></button>
                        </div>
                    </div>
                    <h2 class="text-lg font-bold text-white">${item.UnitDesc}</h2>
                    <p class="text-sm opacity-50 mt-1 flex items-center gap-2"><i data-lucide="user" size="14"></i> ${item.UnitLeader}</p>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openModal(action, id = null) {
            currentAction = action;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = action === 'add' ? 'Add New Unit' : 'Update Unit';
            if(id) {
                // Fetch data for edit logic (simulated with current grid find)
                document.getElementById('primaryId').value = id;
                document.getElementById('UnitCode').value = id;
            }
        }

        document.getElementById('main-form').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                tab: 'UNIT',
                action: currentAction,
                primaryId: document.getElementById('primaryId').value,
                UnitCode: document.getElementById('UnitCode').value,
                UnitDesc: document.getElementById('UnitDesc').value,
                UnitLeader: document.getElementById('UnitLeader').value
            };
            const res = await API.post(payload);
            if(res.status === 'success') { closeModal(); loadData(); }
        };

        async function deleteData(id) {
            if(!confirm('Archive this record?')) return;
            const res = await API.post({ tab: 'UNIT', action: 'delete', primaryId: id });
            if(res.status === 'success') loadData();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('main-form').reset(); }
        loadData();
    </script>
</body>
</html>
