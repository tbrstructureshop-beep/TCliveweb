<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../api.js"></script>
    <style>
        :root { --bg: #0b0e14; --panel: #151921; --border: #262c36; --accent: #0ea5e9; }
        body { background: transparent; color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .industrial-card { @apply bg-white/[0.03] border border-white/5 rounded-3xl p-6 hover:border-sky-500/30 transition-all duration-300 shadow-xl; }
        .input-field { @apply w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-sky-500 text-white text-sm transition-all; }
        .label-style { @apply text-[10px] uppercase font-bold opacity-40 mb-1 block tracking-widest; }
        
        /* Blocking Loading Overlay */
        #local-loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #262c36; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- BLOCKING LOCAL LOADER -->
    <div id="local-loader">
        <div class="flex flex-col items-center gap-3">
            <div class="w-10 h-10 border-4 border-sky-500/20 border-t-sky-500 rounded-full animate-spin"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.3em] text-sky-500 animate-pulse">Syncing_Nodes...</span>
        </div>
    </div>

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-tight uppercase">Unit Management</h1>
            <p class="text-xs opacity-50 font-mono mt-1 uppercase tracking-tighter">Operational Node Administration</p>
        </div>
        <button onclick="openModal('add')" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 shadow-lg shadow-sky-600/20 transition-all active:scale-95">
            <i data-lucide="plus-circle" size="18"></i> ADD NEW UNIT
        </button>
    </div>

    <!-- GRID CONTAINER -->
    <div id="unit-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <!-- Cards injected here -->
    </div>

    <!-- MODAL FORM -->
    <div id="unit-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-[#151921] border border-white/10 rounded-[2rem] w-full max-w-md shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <div>
                    <h3 id="modal-title" class="text-xl font-bold text-white uppercase tracking-widest">Unit Entry</h3>
                    <p class="text-[10px] opacity-40 uppercase tracking-tighter">Define operational identifier</p>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded-full transition text-white/50 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <form id="unit-form" class="p-8 space-y-5">
                <input type="hidden" id="primaryId">
                
                <div>
                    <label class="label-style">Unit Identifier (Code)</label>
                    <input id="UnitCode" name="UnitCode" required placeholder="e.g. UN-01" class="input-field font-mono">
                </div>

                <div>
                    <label class="label-style">Description</label>
                    <input id="UnitDesc" name="UnitDesc" required placeholder="e.g. Assembly Line A" class="input-field">
                </div>

                <div>
                    <label class="label-style">Unit Leader Name</label>
                    <div class="relative">
                        <i data-lucide="user" size="16" class="absolute left-3 top-3.5 opacity-30"></i>
                        <input id="UnitLeader" name="UnitLeader" required placeholder="Full Name" class="input-field pl-10">
                    </div>
                </div>

                <div class="flex gap-3 pt-4 border-t border-white/5 mt-2">
                    <button type="submit" class="flex-1 bg-sky-600 py-4 rounded-2xl font-bold text-white hover:bg-sky-500 transition-all shadow-lg shadow-sky-600/10 uppercase tracking-widest text-xs">Commit Node</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-white/5 py-4 rounded-2xl font-bold text-white/50 hover:bg-white/10 transition-all uppercase tracking-widest text-xs">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        let currentAction = 'add';

        async function init() {
            loader.style.display = 'flex';
            try {
                const res = await API.get('UNIT');
                if (res.status === 'success') {
                    renderUnits(res.data);
                } else {
                    throw new Error(res.message);
                }
            } catch (e) {
                Swal.fire('Sync Failed', e.message, 'error');
            } finally {
                loader.style.display = 'none';
            }
        }

        function renderUnits(data) {
            const grid = document.getElementById('unit-grid');
            if (!data || data.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center opacity-30 uppercase tracking-widest text-sm">No Operational Units Registered</div>`;
                return;
            }

            grid.innerHTML = data.map(u => `
                <div class="industrial-card group">
                    <div class="flex justify-between items-start mb-6">
                        <div class="bg-sky-500/10 text-sky-400 px-3 py-1 rounded-lg text-[10px] font-mono font-bold uppercase tracking-tighter border border-sky-500/20">${u.UnitCode}</div>
                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                            <button onclick="editItem('${u.UnitCode}', '${u.UnitDesc}', '${u.UnitLeader}')" class="p-2 hover:bg-sky-500/10 rounded-lg text-sky-500 transition-colors">
                                <i data-lucide="edit-3" size="14"></i>
                            </button>
                            <button onclick="deleteItem('${u.UnitCode}')" class="p-2 hover:bg-red-500/10 rounded-lg text-red-500 transition-colors">
                                <i data-lucide="trash-2" size="14"></i>
                            </button>
                        </div>
                    </div>
                    
                    <h3 class="text-white font-bold text-lg leading-tight mb-2 uppercase">${u.UnitDesc}</h3>
                    
                    <div class="flex items-center gap-2 pt-4 border-t border-white/5 mt-4">
                        <div class="h-6 w-6 rounded-full bg-white/5 flex items-center justify-center">
                            <i data-lucide="shield-check" size="12" class="text-sky-500"></i>
                        </div>
                        <span class="text-[11px] font-semibold text-white/60 tracking-wide truncate">${u.UnitLeader}</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openModal(action) {
            currentAction = action;
            document.getElementById('unit-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = action === 'add' ? 'New Unit Entry' : 'Update Unit Config';
            if (action === 'add') {
                document.getElementById('UnitCode').disabled = false;
            }
        }

        function closeModal() {
            document.getElementById('unit-modal').classList.add('hidden');
            document.getElementById('unit-form').reset();
            document.getElementById('primaryId').value = '';
        }

        function editItem(code, desc, leader) {
            openModal('update');
            document.getElementById('primaryId').value = code;
            document.getElementById('UnitCode').value = code;
            document.getElementById('UnitCode').disabled = true; // Code is primaryId, usually not editable
            document.getElementById('UnitDesc').value = desc;
            document.getElementById('UnitLeader').value = leader;
        }

        document.getElementById('unit-form').onsubmit = async (e) => {
            e.preventDefault();
            loader.style.display = 'flex';
            
            const formData = new FormData(e.target);
            const payload = {
                tab: 'UNIT',
                action: currentAction,
                primaryId: document.getElementById('primaryId').value || formData.get('UnitCode')
            };
            
            formData.forEach((value, key) => payload[key] = value);

            try {
                const res = await API.post(payload);
                if (res.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'Data Committed', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: '#151921', color: '#fff' });
                    closeModal();
                    init();
                } else {
                    throw new Error(res.message);
                }
            } catch (err) {
                Swal.fire('Operation Failed', err.message, 'error');
                loader.style.display = 'none';
            }
        };

        async function deleteItem(id) {
            const confirm = await Swal.fire({
                title: 'Confirm Deletion',
                text: `Archiving unit ${id} will disconnect associated shifts.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#0ea5e9',
                cancelButtonColor: '#ef4444',
                background: '#151921',
                color: '#fff'
            });

            if (confirm.isConfirmed) {
                loader.style.display = 'flex';
                try {
                    const res = await API.post({ tab: 'UNIT', action: 'delete', primaryId: id });
                    if(res.status === 'success') init();
                } catch (e) {
                    Swal.fire('Error', e.message, 'error');
                    loader.style.display = 'none';
                }
            }
        }

        init();
    </script>
</body>
</html>
