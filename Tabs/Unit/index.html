<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        body { background: transparent; color: #c9d1d9; font-family: 'Inter', sans-serif; }
        .industrial-card { @apply bg-white/5 border border-white/10 rounded-2xl p-5 hover:border-sky-500/50 transition-all shadow-xl; }
        input, select, textarea { @apply w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-sky-500 text-sm text-white; }
        .loader-overlay { @apply fixed inset-0 z-[200] flex items-center justify-center bg-[#0d1117]; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="local-loader" class="loader-overlay">
        <div class="w-10 h-10 border-4 border-sky-500/20 border-t-sky-500 rounded-full animate-spin"></div>
    </div>

    <div class="flex justify-between items-center mb-8">
        <div><h1 class="text-2xl font-bold uppercase tracking-tighter">Unit Registry</h1></div>
        <button onclick="openModal('add')" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-sky-600/20">
            <i data-lucide="plus"></i> <span class="hidden sm:inline">NEW UNIT</span>
        </button>
    </div>

    <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- MODAL -->
    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-[#161b22] border border-white/10 rounded-3xl w-full max-w-md p-8">
            <h2 id="modal-title" class="text-xl font-bold mb-6">Add Unit</h2>
            <form id="main-form" class="space-y-4">
                <input type="hidden" id="primaryId">
                <div><label class="text-[10px] font-bold opacity-50 ml-1">UNIT CODE</label><input id="UnitCode" required></div>
                <div><label class="text-[10px] font-bold opacity-50 ml-1">DESCRIPTION</label><input id="UnitDesc" required></div>
                <div><label class="text-[10px] font-bold opacity-50 ml-1">LEADER NAME</label><input id="UnitLeader" required></div>
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 bg-sky-600 py-3 rounded-xl font-bold">SAVE</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-white/5 py-3 rounded-xl font-bold">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentAction = 'add';
        async function load() {
            document.getElementById('local-loader').classList.remove('hidden');
            const res = await API.get('UNIT');
            document.getElementById('grid').innerHTML = res.data.map(u => `
                <div class="industrial-card group">
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-sky-500/10 text-sky-400 px-3 py-1 rounded-lg font-mono text-[10px] font-bold">${u.UnitCode}</span>
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-all">
                            <button onclick="openModal('update', ${JSON.stringify(u).replace(/"/g, '&quot;')})" class="text-sky-400 p-2 hover:bg-white/5 rounded-lg"><i data-lucide="edit-3" size="16"></i></button>
                            <button onclick="del('${u.UnitCode}')" class="text-red-500 p-2 hover:bg-white/5 rounded-lg"><i data-lucide="trash-2" size="16"></i></button>
                        </div>
                    </div>
                    <h3 class="text-white font-bold text-lg">${u.UnitDesc}</h3>
                    <p class="text-xs opacity-50 mt-2 flex items-center gap-2"><i data-lucide="user" size="14"></i> ${u.UnitLeader}</p>
                </div>
            `).join('');
            lucide.createIcons();
            document.getElementById('local-loader').classList.add('hidden');
        }

        async function del(id) {
            const conf = await Swal.fire({ title: 'Delete Unit?', text: id, icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
            if(conf.isConfirmed) {
                Swal.fire({ title: 'Processing...', didOpen: () => Swal.showLoading() });
                await API.post({ tab: 'UNIT', action: 'delete', primaryId: id });
                load(); Swal.fire('Deleted', '', 'success');
            }
        }

        function openModal(action, data = null) {
            currentAction = action;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = action === 'add' ? 'Register Unit' : 'Update Unit';
            document.getElementById('UnitCode').disabled = (action === 'update');
            if(data) {
                document.getElementById('primaryId').value = data.UnitCode;
                document.getElementById('UnitCode').value = data.UnitCode;
                document.getElementById('UnitDesc').value = data.UnitDesc;
                document.getElementById('UnitLeader').value = data.UnitLeader;
            }
        }

        document.getElementById('main-form').onsubmit = async (e) => {
            e.preventDefault();
            Swal.fire({ title: 'Saving...', didOpen: () => Swal.showLoading() });
            const payload = {
                tab: 'UNIT', action: currentAction, primaryId: document.getElementById('primaryId').value,
                UnitCode: document.getElementById('UnitCode').value,
                UnitDesc: document.getElementById('UnitDesc').value,
                UnitLeader: document.getElementById('UnitLeader').value
            };
            await API.post(payload);
            closeModal(); load(); Swal.fire('Success', 'Unit Synchronized', 'success');
        };

        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('main-form').reset(); }
        load();
    </script>
</body>
</html>
