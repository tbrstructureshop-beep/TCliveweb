<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../api.js"></script>
    <style>
        body { background: transparent; color: #f1f5f9; }
        .industrial-card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6">
    
    <div class="flex justify-between items-center mb-8">
        <div class="flex flex-col">
            <h1 class="text-2xl font-bold">List Units</h1>
            <p class="text-xs text-slate-500 font-mono">Master data for all organizational units</p>
        </div>
        <button onclick="openModal()" class="bg-sky-500 hover:bg-sky-600 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 font-bold transition shadow-lg shadow-sky-500/20">
            <i data-lucide="plus-circle" class="w-5 h-5"></i> Add New Unit
        </button>
    </div>

    <!-- Grid Container -->
    <div id="data-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <!-- Skeleton Loading -->
        <div class="industrial-card p-6 rounded-2xl animate-pulse h-40"></div>
        <div class="industrial-card p-6 rounded-2xl animate-pulse h-40"></div>
    </div>

    <script>
        lucide.createIcons();
        let allData = [];

        async function refreshData() {
            const res = await API.get('UNIT');
            allData = res.data;
            render();
        }

        function render() {
            const grid = document.getElementById('data-grid');
            grid.innerHTML = allData.map((item, index) => `
                <div class="industrial-card p-6 rounded-2xl group hover:border-sky-500/50 transition duration-300 relative">
                    <div class="flex justify-between items-start mb-4">
                        <div class="bg-sky-500/10 text-sky-400 font-mono text-[10px] px-2 py-1 rounded border border-sky-500/20">
                            ${item.UnitCode}
                        </div>
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                            <button onclick="editItem(${index})" class="p-1.5 hover:bg-white/5 rounded text-slate-400 hover:text-white"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="deleteItem(${index})" class="p-1.5 hover:bg-white/5 rounded text-red-400/50 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <h3 class="text-lg font-bold mb-1 truncate">${item.UnitDesc}</h3>
                    <div class="flex items-center gap-2 text-slate-500 text-sm">
                        <i data-lucide="user-check" class="w-4 h-4 text-sky-500/50"></i>
                        <span>${item.UnitLeader}</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function openModal(isEdit = false, index = null) {
            const { value: formValues } = await Swal.fire({
                title: isEdit ? 'Update Unit' : 'New Unit Entry',
                background: '#0f172a',
                color: '#f1f5f9',
                html: `
                    <input id="swal-input1" class="swal2-input bg-slate-800 border-slate-700 text-white" placeholder="Unit Code" value="${isEdit ? allData[index].UnitCode : ''}">
                    <input id="swal-input2" class="swal2-input bg-slate-800 border-slate-700 text-white" placeholder="Unit Description" value="${isEdit ? allData[index].UnitDesc : ''}">
                    <input id="swal-input3" class="swal2-input bg-slate-800 border-slate-700 text-white" placeholder="Unit Leader Name" value="${isEdit ? allData[index].UnitLeader : ''}">
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'Submit Data',
                confirmButtonColor: '#0ea5e9',
                preConfirm: () => {
                    return {
                        UnitCode: document.getElementById('swal-input1').value,
                        UnitDesc: document.getElementById('swal-input2').value,
                        UnitLeader: document.getElementById('swal-input3').value
                    }
                }
            });

            if (formValues) {
                Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                const res = await API.post({
                    tab: 'UNIT',
                    action: isEdit ? 'edit' : 'add',
