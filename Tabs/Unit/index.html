<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../api.js"></script>
</head>
<body class="bg-transparent p-6 text-slate-300">
    
    <div id="unit-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Dynamic Cards -->
    </div>

    <script>
        async function init() {
            const res = await IndustrialAPI.fetch('getUnit');
            if(res.status === 'success') {
                const container = document.getElementById('unit-grid');
                container.innerHTML = res.data.map(item => `
                    <div class="bg-white/5 border border-white/10 rounded-2xl p-6 hover:border-sky-500/50 transition-all group">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-xs font-mono text-sky-400 bg-sky-400/10 px-2 py-1 rounded">${item.UnitCode}</span>
                            <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                                <button class="text-slate-500 hover:text-white"><i data-lucide="edit-2"></i></button>
                                <button class="text-red-500/50 hover:text-red-500"><i data-lucide="trash-2"></i></button>
                            </div>
                        </div>
                        <h3 class="text-xl font-bold mb-1">${item.UnitDesc}</h3>
                        <p class="text-slate-500 text-sm flex items-center gap-2">
                             Leader: <span class="text-slate-300">${item.UnitLeader}</span>
                        </p>
                    </div>
                `).join('');
                parent.lucide.createIcons();
            }
        }
        init();
    </script>
</body>
</html>
