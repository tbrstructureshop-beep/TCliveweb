<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC WEB LIVE | Industrial OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #38bdf8; --bg-dark: #0f172a; --bg-light: #f8fafc; }
        body { transition: background 0.3s, color 0.3s; font-family: 'Inter', sans-serif; }
        .sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .loading-overlay { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); z-index: 50; }
        .nav-active { background: rgba(56, 189, 248, 0.15); color: var(--accent); border-right: 4px solid var(--accent); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen flex overflow-hidden">

    <!-- Loading Spinner Global -->
    <div id="global-loader" class="loading-overlay fixed inset-0 flex flex-col items-center justify-center hidden">
        <div class="w-12 h-12 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-sky-400 font-mono text-xs tracking-widest animate-pulse">SYNCHRONIZING DATA...</p>
    </div>

    <!-- Sidebar (Hidden on mobile, drawer style logic) -->
    <aside class="sidebar w-64 bg-slate-900/50 border-r border-white/5 flex flex-col hidden md:flex">
        <div class="p-6 flex items-center gap-3 border-b border-white/5">
            <div class="p-2 bg-sky-500 rounded-lg shadow-lg shadow-sky-500/20">
                <i data-lucide="factory" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="font-bold tracking-tighter text-xl">TC_WEB<span class="text-sky-500">LIVE</span></h1>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 space-y-1">
            <div onclick="switchTab('Unit', this)" class="nav-item p-4 flex items-center gap-4 cursor-pointer hover:bg-white/5 nav-active">
                <i data-lucide="layers" class="w-5 h-5"></i> <span class="text-sm font-medium">UNIT</span>
            </div>
            <div onclick="switchTab('Shifts', this)" class="nav-item p-4 flex items-center gap-4 cursor-pointer hover:bg-white/5">
                <i data-lucide="clock" class="w-5 h-5"></i> <span class="text-sm font-medium">SHIFTS</span>
            </div>
            <div onclick="switchTab('Safety', this)" class="nav-item p-4 flex items-center gap-4 cursor-pointer hover:bg-white/5">
                <i data-lucide="shield-check" class="w-5 h-5"></i> <span class="text-sm font-medium">SAFETY</span>
            </div>
            <div onclick="switchTab('Attendance', this)" class="nav-item p-4 flex items-center gap-4 cursor-pointer hover:bg-white/5">
                <i data-lucide="users" class="w-5 h-5"></i> <span class="text-sm font-medium">ATTENDANCE</span>
            </div>
            <div onclick="switchTab('Operational Detail', this)" class="nav-item p-4 flex items-center gap-4 cursor-pointer hover:bg-white/5">
                <i data-lucide="cpu" class="w-5 h-5"></i> <span class="text-sm font-medium">OPERATIONAL</span>
            </div>
            <div onclick="switchTab('Equipment', this)" class="nav-item p-4 flex items-center gap-4 cursor-pointer hover:bg-white/5">
                <i data-lucide="wrench" class="w-5 h-5"></i> <span class="text-sm font-medium">EQUIPMENT</span>
            </div>
            <div onclick="switchTab('Issue', this)" class="nav-item p-4 flex items-center gap-4 cursor-pointer hover:bg-white/5">
                <i data-lucide="alert-triangle" class="w-5 h-5"></i> <span class="text-sm font-medium">ISSUE</span>
            </div>
            <div onclick="switchTab('Next Plan', this)" class="nav-item p-4 flex items-center gap-4 cursor-pointer hover:bg-white/5">
                <i data-lucide="calendar-range" class="w-5 h-5"></i> <span class="text-sm font-medium">NEXT PLAN</span>
            </div>
        </nav>

        <div class="p-4 border-t border-white/5 flex items-center justify-between">
            <button onclick="toggleTheme()" class="p-2 rounded-lg bg-white/5 hover:bg-white/10 transition">
                <i data-lucide="sun" id="theme-icon"></i>
            </button>
            <span class="text-[10px] text-slate-500 font-mono">v2.4.0-PRO</span>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header class="h-16 border-b border-white/5 flex items-center justify-between px-6 bg-slate-900/20 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <button class="md:hidden p-2"><i data-lucide="menu"></i></button>
                <h2 id="current-tab-name" class="font-semibold text-lg tracking-tight">Unit Management</h2>
            </div>
            <div class="flex items-center gap-4">
                <div class="px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-[10px] font-bold text-emerald-500 uppercase">Live Database</span>
                </div>
            </div>
        </header>

        <section class="flex-1 overflow-hidden relative">
            <iframe id="content-iframe" src="Tabs/Unit/index.html" class="w-full h-full"></iframe>
        </section>
    </main>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('global-loader');
        const iframe = document.getElementById('content-iframe');

        function switchTab(tab, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active'));
            el.classList.add('nav-active');
            document.getElementById('current-tab-name').innerText = tab;
            
            loader.classList.remove('hidden');
            iframe.src = `Tabs/${tab}/index.html`;
        }

        iframe.onload = () => loader.classList.add('hidden');

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            if(html.classList.contains('dark')) {
                icon.setAttribute('data-lucide', 'sun');
                document.body.style.backgroundColor = '#020617';
            } else {
                icon.setAttribute('data-lucide', 'moon');
                document.body.style.backgroundColor = '#f8fafc';
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
