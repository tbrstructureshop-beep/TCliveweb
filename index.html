<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC WEB LIVE | Industrial Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --panel: #151921;
            --border: #262c36;
            --accent: #0ea5e9;
        }
        .light {
            --bg: #f8fafc;
            --panel: #ffffff;
            --border: #e2e8f0;
            --accent: #0284c7;
        }
        body { 
            background-color: var(--bg); 
            color: #94a3b8; 
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .sidebar { background-color: var(--panel); border-right: 1px solid var(--border); }
        .nav-active { 
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.15) 0%, transparent 100%);
            color: var(--accent);
            border-left: 3px solid var(--accent);
        }
        .glass-header {
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        /* Hide scrollbar */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR (Desktop & Tablet) -->
    <aside class="sidebar w-64 flex flex-col hidden md:flex z-50">
        <div class="p-6 flex items-center gap-3">
            <div class="bg-sky-500/20 p-2 rounded-lg">
                <i data-lucide="factory" class="text-sky-500 w-6 h-6"></i>
            </div>
            <span class="font-bold tracking-tighter text-white text-xl">TC_WEB<span class="text-sky-500">LIVE</span></span>
        </div>

        <nav class="flex-1 px-3 space-y-1 mt-4">
            <div onclick="loadTab('Unit', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all nav-active">
                <i data-lucide="layers" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Unit</span>
            </div>
            <div onclick="loadTab('Shifts', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="clock" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Shifts</span>
            </div>
            <div onclick="loadTab('Safety', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="shield-check" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Safety</span>
            </div>
            <div onclick="loadTab('Attendance', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="user-check" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Attendance</span>
            </div>
            <div onclick="loadTab('Operational Detail', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="cpu" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Operational</span>
            </div>
            <div onclick="loadTab('Equipment', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="wrench" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Equipment</span>
            </div>
            <div onclick="loadTab('Issue', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="alert-octagon" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Issue</span>
            </div>
            <div onclick="loadTab('Next Plan', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="rocket" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Next Plan</span>
            </div>
        </nav>

        <div class="p-4 border-t border-white/5">
            <button onclick="toggleTheme()" class="w-full flex items-center justify-center gap-2 p-3 bg-white/5 hover:bg-white/10 rounded-2xl transition">
                <i data-lucide="sun-moon" class="w-5 h-5"></i>
                <span class="text-xs font-bold uppercase tracking-widest">Toggle UI</span>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <div class="flex-1 flex flex-col min-w-0 relative">
        
        <!-- Mobile Header -->
        <header class="md:hidden glass-header p-4 flex justify-between items-center">
             <span class="font-bold tracking-tighter text-white">TC_WEB<span class="text-sky-500">LIVE</span></span>
             <i data-lucide="bell" class="w-5 h-5"></i>
        </header>

        <!-- Dynamic Title Bar -->
        <div class="glass-header hidden md:flex items-center justify-between px-8 py-4">
            <div>
                <h2 id="current-tab-title" class="text-white font-bold text-xl uppercase tracking-widest">Unit Management</h2>
                <p class="text-[10px] text-sky-500 font-mono">SYSTEM_STATUS: STABLE // NODE_01</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-[10px] uppercase font-bold opacity-40">Current Date</p>
                    <p id="clock" class="text-xs font-mono text-white">2024-06-30 16:50</p>
                </div>
                <div class="h-8 w-8 rounded-full bg-white/10 flex items-center justify-center">
                    <i data-lucide="user" class="w-4 h-4 text-white"></i>
                </div>
            </div>
        </div>

        <!-- Frame Container -->
        <main class="flex-1 overflow-hidden p-0 md:p-4">
            <div class="w-full h-full rounded-none md:rounded-3xl overflow-hidden bg-white/[0.02] border border-white/5">
                <iframe id="content-frame" src="Tabs/Unit/index.html" class="w-full h-full border-none"></iframe>
            </div>
        </main>

        <!-- Mobile Bottom Nav -->
        <nav class="md:hidden glass-header flex justify-around p-3 pb-6">
            <div onclick="loadTab('Unit', this)" class="text-sky-500"><i data-lucide="layers" class="w-6 h-6"></i></div>
            <div onclick="loadTab('Shifts', this)" class="opacity-40"><i data-lucide="clock" class="w-6 h-6"></i></div>
            <div onclick="loadTab('Safety', this)" class="opacity-40"><i data-lucide="shield-check" class="w-6 h-6"></i></div>
            <div onclick="loadTab('Attendance', this)" class="opacity-40"><i data-lucide="user-check" class="w-6 h-6"></i></div>
            <div onclick="loadTab('Issue', this)" class="opacity-40"><i data-lucide="alert-octagon" class="w-6 h-6"></i></div>
        </nav>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Navigation Engine
        function loadTab(tabName, element) {
            // Update Iframe Source
            const frame = document.getElementById('content-frame');
            frame.src = `Tabs/${tabName}/index.html`;

            // Update Header Title
            document.getElementById('current-tab-title').innerText = tabName + " Management";

            // Update Desktop Sidebar UI
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('nav-active');
                item.classList.add('opacity-60');
            });
            element.classList.add('nav-active');
            element.classList.remove('opacity-60');

            // Update Mobile Nav UI
            const mobileNavs = document.querySelectorAll('.md\\:hidden.glass-header div');
            mobileNavs.forEach(nav => {
                nav.classList.add('opacity-40');
                nav.classList.remove('text-sky-500');
            });
            if (element.tagName === 'DIV') { // Simple check for mobile icons
                element.classList.add('text-sky-500');
                element.classList.remove('opacity-40');
            }
        }

        // Dark/Light Mode Toggle
        function toggleTheme() {
            document.documentElement.classList.toggle('light');
        }

        // Live Clock
        setInterval(() => {
            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            const timeStr = now.toTimeString().split(' ')[0].substring(0, 5);
            document.getElementById('clock').innerText = `${dateStr} ${timeStr}`;
        }, 1000);
    </script>
</body>
</html>
