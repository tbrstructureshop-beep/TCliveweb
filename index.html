<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC WEB LIVE | DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0d1117; --side: #161b22; --border: #30363d; }
        .light { --bg: #f6f8fa; --side: #ffffff; --border: #d0d7de; }
        body { background: var(--bg); color: #c9d1d9; transition: 0.3s; }
        .light body { color: #1f2328; }
        .sidebar { background: var(--side); border-right: 1px solid var(--border); }
        .nav-link { @apply flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-all hover:bg-sky-500/10 opacity-60; }
        .nav-link.active { @apply opacity-100 bg-sky-500/20 text-sky-400 border-l-4 border-sky-500 rounded-l-none; }
        #loader { transition: 0.5s; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="sidebar w-64 flex flex-col p-4 hidden md:flex">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="bg-sky-500 p-2 rounded-lg text-white"><i data-lucide="factory"></i></div>
            <h1 class="font-bold tracking-tight text-lg">TC_WEB<span class="text-sky-500">LIVE</span></h1>
        </div>
        <nav class="space-y-1 flex-1 overflow-y-auto">
            <div onclick="route('Unit', this)" class="nav-link active"><i data-lucide="layers"></i> UNIT</div>
            <div onclick="route('Shifts', this)" class="nav-link"><i data-lucide="clock"></i> SHIFTS</div>
            <div onclick="route('Safety', this)" class="nav-link"><i data-lucide="shield-check"></i> SAFETY</div>
            <div onclick="route('Attendance', this)" class="nav-link"><i data-lucide="users"></i> ATTENDANCE</div>
            <div onclick="route('Operational Detail', this)" class="nav-link"><i data-lucide="cpu"></i> OPERATIONAL</div>
            <div onclick="route('Equipment', this)" class="nav-link"><i data-lucide="wrench"></i> EQUIPMENT</div>
            <div onclick="route('Issue', this)" class="nav-link"><i data-lucide="alert-triangle"></i> ISSUE</div>
            <div onclick="route('Next Plan', this)" class="nav-link"><i data-lucide="calendar-plus"></i> NEXT PLAN</div>
        </nav>
        <button onclick="document.documentElement.classList.toggle('light')" class="mt-4 p-3 rounded-xl border border-border hover:bg-sky-500/10 flex justify-center">
            <i data-lucide="sun-moon"></i>
        </button>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col relative">
        <header class="h-16 border-b border-border flex items-center justify-between px-6 bg-black/10 backdrop-blur-md">
            <h2 id="title" class="font-semibold text-lg">Unit Management</h2>
            <div class="flex items-center gap-3">
                <span class="text-[10px] uppercase tracking-widest opacity-40">System Stable</span>
                <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div>
            </div>
        </header>
        
        <div class="flex-1 relative">
            <!-- Loading Spinner -->
            <div id="loader" class="absolute inset-0 z-50 flex items-center justify-center bg-[#0d1117]/80">
                <div class="w-10 h-10 border-4 border-sky-500/20 border-t-sky-500 rounded-full animate-spin"></div>
            </div>
            <iframe id="frame" src="Tabs/Unit/index.html" class="w-full h-full border-none"></iframe>
        </div>
    </main>

    <script>
        lucide.createIcons();
        function route(path, el) {
            document.getElementById('loader').style.display = 'flex';
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('title').innerText = el.innerText;
            document.getElementById('frame').src = `Tabs/${path}/index.html`;
        }
        document.getElementById('frame').onload = () => {
            document.getElementById('loader').style.display = 'none';
        }
    </script>
</body>
</html>
