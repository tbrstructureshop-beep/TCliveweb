<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Assets/Tc%20Live%20Web%20Log.png">
    <title>TC WEB LIVE | Industrial Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --panel: #151921;
            --border: #262c36;
            --accent: #0ea5e9;
            --text-main: #94a3b8;
            --text-bold: #ffffff;
        }
        .light {
            --bg: #f1f5f9;
            --panel: #ffffff;
            --border: #e2e8f0;
            --accent: #0284c7;
            --text-main: #475569;
            --text-bold: #1e293b;
        }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .sidebar { 
            background-color: var(--panel); 
            border-right: 1px solid var(--border);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
            transform: translateX(-100%);
        }

        /* Responsive Text Scaling for Sidebar */
        .sidebar span { color: var(--text-main); transition: color 0.3s; }
        .sidebar .text-white { color: var(--text-bold) !important; }

        @media (min-width: 1024px) {
            .sidebar { transform: translateX(0); position: relative; }
            #sidebar-overlay { display: none !important; }
        }
        .sidebar.open { transform: translateX(0); }

        .nav-active { 
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.15) 0%, transparent 100%);
            color: var(--accent) !important;
            border-left: 3px solid var(--accent);
        }
        .nav-active span { color: var(--accent) !important; }

        .glass-header {
            background: var(--bg); /* Reactive to theme */
            opacity: 0.95;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        #current-tab-title { color: var(--text-bold); }

        #sidebar-overlay {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: none;
            position: fixed; inset: 0; z-index: 90;
        }
        #sidebar-overlay.open { display: block; }

        #loader { transition: opacity 0.3s ease; }
        #content-frame { transition: opacity 0.4s ease; opacity: 0; }
        #content-frame.loaded { opacity: 1; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR OVERLAY -->
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR DRAWER -->
    <aside id="main-sidebar" class="sidebar w-64 flex flex-col shrink-0">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-sky-500/20 p-2 rounded-lg text-sky-500">
                    <i data-lucide="factory"></i>
                </div>
                <span class="font-bold tracking-tighter text-white text-xl uppercase">TC_WEB<span class="text-sky-500">Live</span></span>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden opacity-50 hover:opacity-100 text-white">
                <i data-lucide="chevrons-left"></i>
            </button>
        </div>

        <nav class="flex-1 px-3 space-y-1 mt-2 overflow-y-auto">
            <div onclick="loadTab('Unit', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all nav-active">
                <i data-lucide="layers" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Unit</span>
            </div>
            <div onclick="loadTab('Shifts', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="clock" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Shifts</span>
            </div>
            <div onclick="loadTab('Safety', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="shield-check" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Safety</span>
            </div>
            <div onclick="loadTab('Attendance', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="user-check" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Attendance</span>
            </div>
            <div onclick="loadTab('Operational Detail', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="cpu" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Operational</span>
            </div>
            <div onclick="loadTab('Equipment', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="wrench" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Equipment</span>
            </div>
            <div onclick="loadTab('Issue', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="alert-octagon" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Issue</span>
            </div>
            <div onclick="loadTab('Next Plan', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="rocket" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Next Plan</span>
            </div>
            <div onclick="loadTab('Graph and Analythics', this)" class="nav-item flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all opacity-60">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                <span class="text-sm font-semibold uppercase tracking-wider">Analytics</span>
            </div>
        </nav>

        <div class="p-4 border-t border-white/5">
            <button onclick="toggleTheme()" class="w-full flex items-center justify-center gap-2 p-3 bg-white/5 hover:bg-white/10 rounded-2xl transition border border-white/5">
                <i data-lucide="sun-moon" class="w-5 h-5 text-sky-400"></i>
                <span class="text-[10px] font-bold uppercase tracking-widest text-white">Interface Mode</span>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <div class="flex-1 flex flex-col min-w-0 relative">
        
        <!-- HEADER -->
        <header class="glass-header px-4 md:px-8 py-4 flex justify-between items-center z-10">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 -ml-2 rounded-lg bg-white/5 text-white">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div>
                    <h2 id="current-tab-title" class="text-white font-bold text-lg md:text-xl uppercase tracking-widest leading-none">Unit Management</h2>
                    <p class="text-[9px] md:text-[10px] text-sky-500 font-mono hidden sm:block uppercase mt-1 tracking-tighter">Live Status: Authenticated // Node_01</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="clock" class="text-xs font-mono text-white leading-none mb-1">2024-06-30 16:50</p>
                    <p class="text-[9px] uppercase font-bold opacity-30 tracking-widest">Global Server Time</p>
                </div>
                <div onclick="toggleUserModal()" class="h-10 w-10 rounded-xl bg-sky-500/10 flex items-center justify-center border border-sky-500/20 shadow-lg shadow-sky-500/5 cursor-pointer hover:bg-sky-500/20 transition-all active:scale-95">
                    <i data-lucide="user" class="w-4 h-4 text-sky-400"></i>
                </div>
            </div>
        </header>

        <!-- Dynamic Frame Container -->
        <main class="flex-1 overflow-hidden p-0 sm:p-3 lg:p-4 relative">
            <!-- Internal Loader Spinner -->
            <div id="loader" class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
                <div class="w-10 h-10 border-4 border-sky-500/10 border-t-sky-500 rounded-full animate-spin"></div>
            </div>

            <div class="w-full h-full rounded-none sm:rounded-2xl lg:rounded-3xl overflow-hidden bg-white/[0.02] border border-white/5 shadow-2xl relative">
                <iframe id="content-frame" src="Tabs/Unit/index.html" class="w-full h-full border-none"></iframe>
            </div>
        </main>
    </div>

    <!-- USER MODAL OVERLAY -->
    <div id="user-modal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4">
        <!-- Dark Backdrop -->
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="toggleUserModal()"></div>
        
        <!-- Modal Container -->
        <div class="relative w-full max-w-lg bg-[#151921] border border-white/10 rounded-3xl overflow-hidden shadow-2xl transition-all transform scale-95 opacity-0" id="modal-content">
            <div class="p-4 border-b border-white/5 flex justify-between items-center bg-[#0b0e14]/50">
                <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-sky-500">Technician Command</h3>
                <button onclick="toggleUserModal()" class="text-white/30 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <!-- IMPORTANT: src must match your folder structure -->
            <iframe src="modal/option/index.html" class="w-full h-[400px] border-none"></iframe>
        </div>
    </div>

    <script>

        window.GLOBAL_CACHE = {}; 

        // Fungsi untuk menghapus cache (dipanggil otomatis oleh api.js saat ada input data)
        window.clearCache = (tabName = null) => { 
            if (tabName) {
                delete window.GLOBAL_CACHE[tabName];
                console.log(`%c[CACHE] Invalidation: ${tabName}`, "color: #ef4444; font-weight: bold;");
            } else {
                window.GLOBAL_CACHE = {};
                console.log("%c[CACHE] Global Memory Reset", "color: #ef4444; font-weight: bold;");
            }
        };

        
        lucide.createIcons();

        function toggleSidebar() {
            const sidebar = document.getElementById('main-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        }

        const iframe = document.getElementById('content-frame');
        const loader = document.getElementById('loader');

        function loadTab(tabName, element) {
            // Show Loader and hide iframe
            loader.style.opacity = "1";
            iframe.classList.remove('loaded');
            
            // Set URL
            iframe.src = `Tabs/${tabName}/index.html`;

            // Update UI
            document.getElementById('current-tab-title').innerText = tabName;
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('nav-active');
                item.classList.add('opacity-60');
            });
            element.classList.add('nav-active');
            element.classList.remove('opacity-60');

            // Close on Mobile Selection
            if(window.innerWidth < 1024) toggleSidebar();
        }

        // Iframe Load Event
        iframe.onload = () => {
            loader.style.opacity = "0";
            iframe.classList.add('loaded');
            
            // Sync theme to iframe immediately upon loading a new tab
            const isLight = document.documentElement.classList.contains('light');
            if (iframe.contentWindow) {
                // Method 1: Direct class manipulation
                iframe.contentWindow.document.documentElement.classList.toggle('light', isLight);
                // Method 2: Call internal function if exists
                if (iframe.contentWindow.applyTheme) {
                    iframe.contentWindow.applyTheme(isLight);
                }
            }
        };

        function toggleTheme() {
            const isLight = document.documentElement.classList.toggle('light');
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.document.documentElement.classList.toggle('light', isLight);
                if (iframe.contentWindow.applyTheme) {
                    iframe.contentWindow.applyTheme(isLight);
                }
            }
        }

        function toggleUserModal() {
            const modal = document.getElementById('user-modal');
            const content = document.getElementById('modal-content');
            
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                // Small delay to allow CSS transitions to trigger
                setTimeout(() => {
                    content.classList.remove('scale-95', 'opacity-0');
                    content.classList.add('scale-100', 'opacity-100');
                }, 10);
            } else {
                content.classList.add('scale-95', 'opacity-0');
                content.classList.remove('scale-100', 'opacity-100');
                setTimeout(() => modal.classList.add('hidden'), 200);
            }
        }
        setInterval(() => {
            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            const timeStr = now.toTimeString().split(' ')[0].substring(0, 5);
            document.getElementById('clock').innerText = `${dateStr} ${timeStr}`;
        }, 1000);
    </script>
</body>
</html>
