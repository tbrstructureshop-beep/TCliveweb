<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC WEB LIVE | Industrial OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0c10; --panel: #161b22; --accent: #2f81f7; --text: #c9d1d9;
        }
        .light {
            --bg: #f6f8fa; --panel: #ffffff; --accent: #0969da; --text: #24292f;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        .sidebar { background: var(--panel); border-right: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { @apply flex items-center gap-3 p-3 rounded-lg transition-all cursor-pointer hover:bg-sky-500/10 opacity-70; }
        .nav-btn.active { @apply opacity-100 bg-sky-500/20 text-sky-400 border-l-4 border-sky-500; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 sidebar flex flex-col p-4 hidden md:flex">
        <div class="flex items-center gap-3 mb-8 px-2">
            <i data-lucide="factory" class="text-sky-500"></i>
            <span class="font-bold tracking-widest uppercase text-sm">TC Web Live</span>
        </div>

        <nav class="space-y-1 flex-1">
            <div onclick="route('Unit', this)" class="nav-btn active"><i data-lucide="layout-grid"></i> UNIT</div>
            <div onclick="route('Shifts', this)" class="nav-btn"><i data-lucide="clock"></i> SHIFTS</div>
            <div onclick="route('Safety', this)" class="nav-btn"><i data-lucide="shield-check"></i> SAFETY</div>
            <div onclick="route('Attendance', this)" class="nav-btn"><i data-lucide="users"></i> ATTENDANCE</div>
            <div onclick="route('OperationalDetail', this)" class="nav-btn"><i data-lucide="activity"></i> OPERATIONAL</div>
            <div onclick="route('Equipment', this)" class="nav-btn"><i data-lucide="wrench"></i> EQUIPMENT</div>
            <div onclick="route('Issue', this)" class="nav-btn"><i data-lucide="alert-circle"></i> ISSUE</div>
            <div onclick="route('NextPlan', this)" class="nav-btn"><i data-lucide="calendar-plus"></i> NEXT PLAN</div>
        </nav>

        <div class="pt-4 border-t border-white/5 flex justify-between">
            <button onclick="document.body.classList.toggle('light')" class="p-2 hover:bg-white/5 rounded"><i data-lucide="sun"></i></button>
            <span class="text-[10px] opacity-30 self-center">v2.0.4-STABLE</span>
        </div>
    </aside>

    <!-- CONTENT -->
    <main class="flex-1 flex flex-col">
        <header class="p-4 flex justify-between items-center bg-black/20 backdrop-blur-md">
            <h1 id="page-title" class="text-lg font-medium">Unit Management</h1>
            <div class="flex gap-2">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse mt-2"></div>
                <span class="text-xs opacity-50 uppercase tracking-widest">System Online</span>
            </div>
        </header>
        
        <div class="flex-1 p-4 overflow-hidden">
            <div class="w-full h-full rounded-xl overflow-hidden bg-white/5 border border-white/5">
                <iframe id="main-frame" src="Tabs/Unit/index.html"></iframe>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        function route(path, el) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('page-title').innerText = el.innerText;
            document.getElementById('main-frame').src = `Tabs/${path}/index.html`;
        }
    </script>
</body>
</html>
