<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #151921; --panel: #1c222c; --border: rgba(255, 255, 255, 0.05); 
            --accent: #0ea5e9; --text-main: #94a3b8; --text-bold: #ffffff;
        }
        body { background: transparent; color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 1.5rem; overflow: hidden; }
        .input-field {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            border-radius: 0.75rem; padding: 0.75rem 1rem; color: white; outline: none; transition: all 0.2s;
            font-size: 0.875rem;
        }
        
        .btn-primary { 
            background: var(--accent); color: white; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.05em; padding: 0.8rem; border-radius: 0.75rem; transition: all 0.2s;
        }
        .btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.1; cursor: not-allowed; filter: grayscale(1); }

        .hidden { display: none !important; }
        
        #local-loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .history-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); transition: all 0.3s; }
    </style>
</head>
<body class="p-4 bg-[#151921] min-h-screen">

    <div id="local-loader">
        <div class="w-8 h-8 border-4 border-sky-500/20 border-t-sky-500 rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-mono uppercase tracking-widest text-sky-500">Node_Syncing...</p>
    </div>

    <!-- HEADER -->
    <div class="max-w-md mx-auto mb-4 flex justify-between items-center">
        <button onclick="window.location.href='../option/index.html'" class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-sky-500">
            <i data-lucide="arrow-left" class="w-3 h-3"></i> Back
        </button>
        <div class="flex items-center gap-2">
            <div id="ip-status-dot" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
            <span id="ip-label" class="text-[9px] font-mono opacity-50 uppercase">Network_Check...</span>
        </div>
    </div>

    <!-- AUTH SECTION -->
    <div id="auth-section" class="max-w-md mx-auto space-y-6 hidden">
        <form id="login-form" class="glass-panel p-8 space-y-4">
            <h2 class="text-xl font-bold text-white uppercase text-center mb-6">Technician Login</h2>
            <input type="text" id="loginId" required class="input-field font-mono" placeholder="EMPLOYEE ID">
            <input type="password" id="loginPass" required class="input-field" placeholder="PASSWORD">
            <button type="submit" class="w-full btn-primary">Login</button>
            <p class="text-center text-[10px] uppercase font-bold tracking-widest opacity-50 pt-4">
                New User? <button type="button" onclick="showRegister()" class="text-sky-500">Register Phone</button>
            </p>
        </form>

        <form id="register-form" class="glass-panel p-8 space-y-4 hidden">
            <div class="grid grid-cols-2 gap-3">
                <select id="regUnit" required class="input-field text-xs"></select>
                <select id="regShift" required class="input-field text-xs"></select>
            </div>
            <select id="regClass" required class="input-field text-xs">
                <option value="" disabled selected>SELECT CLASS</option>
                <option value="Employee">Employee</option>
                <option value="Additional Employee">Additional Employee</option>
                <option value="OJT">OJT</option>
            </select>
            <input type="text" id="regName" required class="input-field" placeholder="FULL NAME">
            <input type="text" id="regJob" required class="input-field" placeholder="JOB TITLE">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="regId" required class="input-field font-mono" placeholder="ID">
                <input type="password" id="regPass" required class="input-field" placeholder="PASS">
            </div>
            <button type="submit" class="w-full btn-primary">Initialize Device Link</button>
            <button type="button" onclick="showLogin()" class="w-full text-[10px] opacity-50 uppercase">Cancel</button>
        </form>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="main-interface" class="max-w-md mx-auto hidden space-y-4">
        <div class="glass-panel p-6 flex flex-col items-center text-center">
            <p id="display-date" class="text-[10px] font-mono text-sky-500 uppercase mb-1"></p>
            <h1 id="display-clock" class="text-4xl font-bold text-white font-mono tracking-widest mb-4">00:00:00</h1>
            <div class="w-full pt-4 border-t border-white/5 flex items-center justify-between">
                <div class="text-left">
                    <p id="user-name" class="text-white font-bold text-sm"></p>
                    <p id="user-job" class="text-[10px] opacity-50 uppercase"></p>
                </div>
                <button onclick="logout()" class="p-2 bg-white/5 rounded-lg text-red-400"><i data-lucide="log-out" size="16"></i></button>
            </div>
        </div>

        <!-- OFFICE ONLY ACTION -->
        <div id="office-actions" class="grid grid-cols-2 gap-4 hidden">
            <button id="btn-f1" onclick="recordAttendance('F1')" class="glass-panel p-6 flex flex-col items-center gap-3 hover:border-sky-500 transition-all group">
                <div class="p-3 rounded-2xl bg-sky-500/10 text-sky-500 group-hover:bg-sky-500 group-hover:text-white">
                    <i data-lucide="play" size="24"></i>
                </div>
                <span class="text-[10px] font-bold uppercase">Clock In</span>
            </button>
            <button id="btn-f4" onclick="recordAttendance('F4')" class="glass-panel p-6 flex flex-col items-center gap-3 hover:border-red-500 transition-all group">
                <div class="p-3 rounded-2xl bg-red-500/10 text-red-500 group-hover:bg-red-500 group-hover:text-white">
                    <i data-lucide="square" size="24"></i>
                </div>
                <span class="text-[10px] font-bold uppercase">Clock Out</span>
            </button>
        </div>

        <!-- REMOTE ONLY ACTION -->
        <div id="remote-actions" class="glass-panel p-6 hidden">
            <div class="flex items-center gap-2 mb-4 text-amber-500 font-bold text-[10px] uppercase">
                <i data-lucide="map-pin-off" size="14"></i> Status Proposal (Outside IP)
            </div>
            <div class="flex gap-2">
                <select id="leaveType" class="input-field text-xs">
                    <option value="" disabled selected>-- SELECT STATUS --</option>
                    <option value="Sick">Sick</option>
                    <option value="Training">Training</option>
                    <option value="Annual Leave">Annual Leave</option>
                    <option value="Work Outside">Work Outside</option>
                </select>
                <button onclick="recordLeave()" class="btn-primary px-6 text-[10px] whitespace-nowrap">Send</button>
            </div>
        </div>

        <!-- HISTORY -->
        <div class="space-y-2 pb-10">
            <h3 class="text-[10px] font-bold uppercase opacity-30 ml-2">Recent Logs (Past 7 Days)</h3>
            <div id="history-container" class="space-y-2"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const loader = document.getElementById('local-loader');
        const ALLOWED_IPS = ["118.97.115.66", "118.97.70.226"]; 
        let currentUser = null;
        let isInsideOffice = false;
        let masterData = { users: [], attendance: [] };

        function getFingerprint() {
            return `${navigator.userAgent}-${screen.width}x${screen.height}`;
        }

        async function verifyNetwork() {
            try {
                const resp = await fetch('https://api.ipify.org?format=json');
                const data = await resp.json();
                isInsideOffice = ALLOWED_IPS.includes(data.ip);
                
                document.getElementById('ip-status-dot').className = `w-2 h-2 rounded-full ${isInsideOffice ? 'bg-green-500' : 'bg-amber-500 animate-pulse'}`;
                document.getElementById('ip-label').innerText = isInsideOffice ? 'OFFICE_NETWORK' : 'REMOTE_NETWORK';
                return true;
            } catch (e) { return false; }
        }

        async function init() {
            await verifyNetwork();
            try {
                const [u, s, usr, att] = await Promise.all([
                    API.get('UNIT'), API.get('SHIFTS'), API.get('USER'), API.get('ATTENDANCE_RECORD')
                ]);
                masterData.users = usr.data;
                masterData.attendance = att.data;
                
                document.getElementById('regUnit').innerHTML = u.data.map(u => `<option value="${u.UnitCode}">${u.UnitCode}</option>`).join('');
                document.getElementById('regUnit').onchange = (e) => {
                    const filtered = s.data.filter(sh => sh.UnitCode === e.target.value);
                    document.getElementById('regShift').innerHTML = filtered.map(sh => `<option value="${sh.ShiftCategory}">${sh.ShiftCategory}</option>`).join('');
                };
                document.getElementById('regUnit').dispatchEvent(new Event('change'));

                checkSession();
            } catch (e) { console.error(e); } 
            finally { loader.style.display = 'none'; }
        }

        function checkSession() {
            const saved = localStorage.getItem('tc_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                // The key in getDisplayValues is "DeviceId(phone)" due to header cleaning
                if (currentUser["DeviceId(phone)"] && currentUser["DeviceId(phone)"] !== getFingerprint()) {
                    logout();
                    Swal.fire({ icon: 'error', title: 'Device Mismatch', text: 'Account locked to another device.' });
                } else {
                    showMainInterface();
                }
            } else { showLogin(); }
        }

        function showMainInterface() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-interface').classList.remove('hidden');
            document.getElementById('user-name').innerText = currentUser.Name;
            document.getElementById('user-job').innerText = currentUser.JobTitle;
            
            const today = new Date().toISOString().split('T')[0];
            const todayRecord = masterData.attendance.find(r => r.Date === today && r.EmployeeId === currentUser.EmployeeId);

            // UI Logic based on IP
            if (isInsideOffice) {
                document.getElementById('office-actions').classList.remove('hidden');
                document.getElementById('remote-actions').classList.add('hidden'); // Hide status proposal if in office
                document.getElementById('btn-f1').disabled = !!todayRecord?.F1;
                document.getElementById('btn-f4').disabled = !!todayRecord?.F4;
            } else {
                document.getElementById('office-actions').classList.add('hidden');
                document.getElementById('remote-actions').classList.remove('hidden'); // Show only for remote
            }

            renderHistory();
            startClock();
            lucide.createIcons();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            const userRecords = masterData.attendance
                .filter(r => r.EmployeeId === currentUser.EmployeeId)
                .sort((a, b) => new Date(b.Date) - new Date(a.Date))
                .slice(0, 7);

            if (userRecords.length === 0) {
                container.innerHTML = '<div class="p-8 text-center text-[10px] opacity-20 uppercase">No history found</div>';
                return;
            }

            container.innerHTML = userRecords.map(r => `
                <div class="history-card p-4 rounded-2xl">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-mono text-sky-500 font-bold">${r.Date}</span>
                        <span class="text-[9px] px-2 py-0.5 rounded bg-white/5 border border-white/5 font-bold uppercase ${r.StatusApproval === 'Approved' ? 'text-green-500' : 'text-amber-500'}">${r.StatusApproval || 'Pending'}</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="bg-black/20 p-2 rounded-xl text-center">
                            <span class="text-[8px] uppercase opacity-40 block">In</span>
                            <span class="text-xs font-mono text-white">${r.F1 || '--:--'}</span>
                        </div>
                        <div class="bg-black/20 p-2 rounded-xl text-center">
                            <span class="text-[8px] uppercase opacity-40 block">Out</span>
                            <span class="text-xs font-mono text-white">${r.F4 || '--:--'}</span>
                        </div>
                        <div class="bg-black/20 p-2 rounded-xl text-center overflow-hidden">
                            <span class="text-[8px] uppercase opacity-40 block">Log</span>
                            <span class="text-[9px] font-bold text-sky-400 uppercase truncate block">${r.Leave || 'Present'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function recordAttendance(type) {
            loader.style.display = 'flex';
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toISOString().split('T')[0];

            const payload = {
                tab: 'ATTENDANCE_RECORD',
                action: 'add',
                EmployeeId: currentUser.EmployeeId,
                Date: dateStr,
                [type]: timeStr,
                StatusApproval: 'Pending'
            };

            const todayRec = masterData.attendance.find(r => r.Date === dateStr && r.EmployeeId === currentUser.EmployeeId);
            if (todayRec) {
                payload.action = 'update';
                payload.primaryId = todayRec.Timestamp;
            }

            try {
                const res = await API.post(payload);
                if (res.status === 'success') {
                    const att = await API.get('ATTENDANCE_RECORD');
                    masterData.attendance = att.data;
                    showMainInterface();
                    Swal.fire({ icon: 'success', title: 'Committed', text: `${type} at ${timeStr}`, background: '#151921', color: '#fff' });
                }
            } catch (e) { Swal.fire({ icon: 'error', title: 'Error', text: e.message }); } 
            finally { loader.style.display = 'none'; }
        }

        async function recordLeave() {
            const leave = document.getElementById('leaveType').value;
            if (!leave) return;
            loader.style.display = 'flex';
            const dateStr = new Date().toISOString().split('T')[0];

            const payload = {
                tab: 'ATTENDANCE_RECORD',
                action: 'add',
                EmployeeId: currentUser.EmployeeId,
                Date: dateStr,
                Leave: leave,
                StatusApproval: 'Pending'
            };

            const todayRec = masterData.attendance.find(r => r.Date === dateStr && r.EmployeeId === currentUser.EmployeeId);
            if (todayRec) {
                payload.action = 'update';
                payload.primaryId = todayRec.Timestamp;
            }
            try {
                await API.post(payload);
                const att = await API.get('ATTENDANCE_RECORD');
                masterData.attendance = att.data;
                showMainInterface();
                Swal.fire({ icon: 'success', title: 'Proposal Sent', background: '#151921', color: '#fff' });
            } catch (e) { Swal.fire({ icon: 'error', title: 'Error', text: e.message }); }
            finally { loader.style.display = 'none'; }
        }

        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('loginId').value;
            const pass = document.getElementById('loginPass').value;
            const user = masterData.users.find(u => u.EmployeeId === id && u.Password === pass);
            
            if (user) {
                const devKey = "DeviceId(phone)";
                if (user[devKey] && user[devKey] !== getFingerprint()) {
                    Swal.fire({ icon: 'error', title: 'Locked', text: 'This account belongs to another phone.' });
                    return;
                }
                currentUser = user;
                localStorage.setItem('tc_user', JSON.stringify(user));
                showMainInterface();
            } else { Swal.fire({ icon: 'error', title: 'Failed', text: 'Check Credentials' }); }
        };

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            loader.style.display = 'flex';
            const payload = {
                tab: 'USER', action: 'add',
                UnitCode: document.getElementById('regUnit').value,
                Shift: document.getElementById('regShift').value,
                Class: document.getElementById('regClass').value,
                EmployeeId: document.getElementById('regId').value,
                Name: document.getElementById('regName').value,
                JobTitle: document.getElementById('regJob').value,
                Password: document.getElementById('regPass').value,
                // Match the GAS cleaned header key: DeviceId(phone)
                "DeviceId(phone)": getFingerprint()
            };
            try {
                await API.post(payload);
                const usr = await API.get('USER');
                masterData.users = usr.data;
                showLogin();
                Swal.fire({ icon: 'success', title: 'Success', text: 'Device Linked' });
            } catch (err) { Swal.fire({ icon: 'error', title: 'Failed', text: err.message }); }
            finally { loader.style.display = 'none'; }
        };

        function showLogin() { document.getElementById('auth-section').classList.remove('hidden'); document.getElementById('main-interface').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); document.getElementById('register-form').classList.add('hidden'); }
        function showRegister() { document.getElementById('login-form').classList.add('hidden'); document.getElementById('register-form').classList.remove('hidden'); }
        function startClock() { setInterval(() => { document.getElementById('display-clock').innerText = new Date().toLocaleTimeString('en-GB'); document.getElementById('display-date').innerText = new Date().toDateString(); }, 1000); }
        function logout() { localStorage.removeItem('tc_user'); location.reload(); }

        init();
    </script>
</body>
</html>
