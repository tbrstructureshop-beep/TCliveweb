<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: transparent; font-family: 'Inter', sans-serif; overflow: hidden; margin:0; padding:0; }
        .option-card {
            background: linear-gradient(145deg, #1c222c, #151921);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-card:hover {
            border-color: #0ea5e9;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(14, 165, 233, 0.3);
        }
    </style>
</head>
<body class="p-6">
    
    <div id="main-options" class="space-y-4">
        <!-- FIXED: Redirects to the Attendance Module inside this same iframe -->
        <div onclick="window.location.href='../MyAttendance/index.html'" class="option-card p-5 rounded-2xl cursor-pointer flex items-center gap-5 group">
            <div class="bg-sky-500/10 p-4 rounded-xl text-sky-500 group-hover:bg-sky-500 group-hover:text-white transition-colors">
                <i data-lucide="map-pin" class="w-6 h-6"></i>
            </div>
            <div>
                <h4 class="text-white font-bold text-lg">Record My Attendance</h4>
                <p class="text-slate-500 text-sm">IP-Locked Office Check-in</p>
            </div>
        </div>

        <!-- KEEPING AS COMING SOON: Since Job Tracking isn't built yet -->
        <div onclick="window.parent.showGlobalComingSoon()" class="option-card p-5 rounded-2xl cursor-pointer flex items-center gap-5 group">
            <div class="bg-sky-500/10 p-4 rounded-xl text-sky-500 group-hover:bg-sky-500 group-hover:text-white transition-colors">
                <i data-lucide="timer" class="w-6 h-6"></i>
            </div>
            <div>
                <h4 class="text-white font-bold text-lg">Record My Job</h4>
                <p class="text-slate-500 text-sm">Live Time-Consumption Tracking</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
